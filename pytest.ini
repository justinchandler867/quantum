[pytest]
# Run from backend/ so the `app` package is importable by tests in tests/.
pythonpath = .
testpaths = tests
python_files = test_*.py
# `live` tests hit yfinance; excluded from the default run. Opt in with `-m live`.
addopts = -m "not live"
markers =
    live: test requires live network data (yfinance); deselected by default
