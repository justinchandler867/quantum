       {q:"A sell-side analyst is offered a lavish trip by a company he covers, with meals and first-class flights paid for. What is the BEST course of action under Standard I(B)?",opts:["Accept — gifts from covered companies are industry-standard practice","Pay for the trip himself or decline the trip outright, to preserve independence","Accept but issue a 'hold' rating to signal neutrality","Accept only if he discloses the trip to his employer and clients"],correct:1,explain:"Standard I(B) requires maintaining independence and objectivity; paying one's own way or declining preserves it, while accepting lavish benefits creates at minimum the appearance of bias. The trap in D is assuming disclosure cures the problem — disclosure informs but does not remove the compromised judgment."},
       {q:"An analyst overhears two executives of a covered company discussing an unannounced acquisition on a commuter train. What must the analyst do?",opts:["Treat the information as material nonpublic and not act or cause others to act on it","Trade immediately — the information was obtained in a public place","Share it with the compliance department and then trade","Publish it in a research note so it becomes public"],correct:0,explain:"Under Standard II(A), information is nonpublic until broadly disseminated to investors; accidentally overheard information is still MNPI. The trap in B conflates physical public place with public dissemination — the standard is investor-wide disclosure, not where the conversation occurred."},
       {q:"A portfolio manager discovers that executing a large client trade first will move the market and worsen his personal account's simultaneously-pending trade. Under Standard III(A), what is required?",opts:["Execute his personal trade first, then the client trade","Execute the client trade first; client interests have priority over personal interests","Execute both trades simultaneously using block trading","Cancel both trades and reconsider the strategy"],correct:1,explain:"Standard III(A) Loyalty, Prudence, and Care requires clients come first, reinforced by Standard VI(B) Priority of Transactions. The trap in A is the natural self-interested answer; C is also a violation because the personal trade would benefit from the client-moved market."},
       {q:"A firm publishes a change in recommendation from 'Buy' to 'Sell' on a stock. Which dissemination approach is MOST consistent with Standard III(B)?",opts:["Call the firm's largest institutional clients first, then release to all clients","Release to retail clients first since they are least informed","Delay release until the firm has covered its own position","Release to all clients simultaneously through the firm's standard channels"],correct:3,explain:"Fair Dealing requires treating all clients equitably when disseminating recommendations; simultaneous release through standard channels is the baseline. The trap in A is that large clients 'deserve' priority — client size is irrelevant to timing under the Standard."},
       {q:"A wealth manager takes on a new client with a conservative mandate and limited risk tolerance. The client requests a 40% allocation to emerging-market small caps. Under Standard III(C), the manager should:",opts:["Execute the request — the client is the ultimate decision-maker","Decline outright — the allocation violates suitability","Discuss the inconsistency with the mandate and update the IPS in writing if the client still wants the change","Execute partially, allocating 10% to balance the conflict"],correct:2,explain:"Suitability obligates acting consistent with the written IPS; the right response is to revisit and document, not override or refuse. The trap in A is 'the client is always right' — the IPS governs, not each verbal request. B is overly rigid; amendments with client consent are allowed."},
       {q:"A fund manager wishes to advertise a 12-year track record that includes three years from her previous firm. Under Standard III(D), what is required?",opts:["She may reference the prior firm's record only with the prior firm's written permission and proper attribution","She may claim the full 12-year record as her own","She must exclude the prior years; performance portability is never permitted","She must restate the prior years using her current firm's methodology"],correct:0,explain:"Standard III(D) Performance Presentation requires fair, accurate, and complete reporting, including disclosure of record source and written permission when claiming prior-firm performance. The trap in B is the common violation of casually claiming prior records; C wrongly assumes portability is never allowed."},
       {q:"An employee is preparing to leave her firm to start a competing advisory business. Before resignation, she secretly copies a list of her clients' contact details to solicit after she leaves. This violates:",opts:["No standard — client contacts are public information","Standard IV(A) Loyalty to Employers only","Standard III(E) Preservation of Confidentiality only","Both Standard IV(A) and Standard III(E)"],correct:3,explain:"Taking client records is both a breach of employer loyalty (appropriating employer property) and of client confidentiality (using non-public client information). The trap in B is catching only one violation; the fact that it's client data — not generic employer property — also invokes III(E)."},
       {q:"An analyst relies on a third-party research firm's valuation model for her buy recommendation without verifying any of its assumptions or methodology. Under Standard V(A):",opts:["She must make reasonable efforts to understand and verify the model before relying on it","This is acceptable as long as the third party is reputable","She must build her own model from scratch to meet diligence requirements","She may rely on the third party if she discloses the reliance in her note"],correct:0,explain:"Diligence and Reasonable Basis requires reasonable inquiry into third-party work — reviewing assumptions, methodology, and the provider's reputation — before using it as the basis for a recommendation. The trap in B conflates reputation with verification; reputation is a factor, not a substitute for inquiry."},
       {q:"An analyst is preparing research on a company in which her spouse owns a material position. The MOST appropriate action is:",opts:["Not disclose — spouse ownership is personal, not professional","Recuse herself and refuse to cover the company","Ask her spouse to sell the position before she publishes","Disclose the relationship prominently to her employer and in any research she publishes"],correct:3,explain:"Standard VI(A) requires full and fair disclosure of all matters that could reasonably impair independence and objectivity — disclosure satisfies the Code's minimum. The trap in B is over-correction: while many firms' compliance policies require recusal as a best practice, the Standard itself is met by prominent disclosure. C creates market-manipulation concerns and is not required."},
       {q:"A hedge fund places a series of small buy orders in a thinly traded stock to create the appearance of accumulating interest, intending to sell a large pre-existing position into the resulting rally. This is:",opts:["Acceptable — all the trades are legally executed","A violation of Standard II(B) Market Manipulation — transaction-based manipulation","A violation of Standard II(B) Market Manipulation — information-based manipulation","A violation of Standard II(A) Material Nonpublic Information"],correct:1,explain:"Transaction-based manipulation uses trades to distort price or volume and deceive other participants — 'painting the tape' is the textbook example. The trap in C is information-based manipulation, which requires spreading false information; here the deception is via the trades themselves, not any statement."},
       {q:"A supervisor at an investment firm delegates compliance monitoring to a junior staff member and does not review the junior's work. A violation by a subordinate goes undetected for months. Under Standard IV(C), the supervisor:",opts:["Bears no responsibility — the junior was tasked with compliance","Violates IV(C) only if the underlying violation is material","Violates IV(C) by failing to exercise reasonable supervision, regardless of materiality","Violates IV(C) only if the firm has not documented its policies"],correct:2,explain:"Standard IV(C) imposes a duty to make reasonable efforts to detect and prevent violations, including monitoring delegated work; delegation does not transfer the supervisor's responsibility. The trap in A is 'I delegated it' as a defense — explicitly rejected by the Standard. B and D invent conditions the Standard does not contain."},
       {q:"Jane Doe passed all three levels of the CFA exam and has the required work experience. Her firm's website bio reads: 'Jane Doe is a CFA with 10 years of experience.' Under Standard VII(B), this is:",opts:["A violation — charterholders may not use the designation in marketing materials","Acceptable — she is entitled to the designation","A violation — 'CFA' should be used as an adjective (e.g., 'CFA charterholder'), not as a noun","A violation — the designation must appear with all three letters spelled out"],correct:2,explain:"Standard VII(B) requires the CFA marks be used as adjectives modifying appropriate nouns — 'CFA charterholder,' 'CFA Level II candidate' — never as a noun themselves. Saying 'is a CFA' implies the mark is a license or status rather than a credential. The trap in B is that she has earned the designation; the question is about how she references it, not her entitlement to it."},
       {q:"A Level II CFA candidate posts on a study forum detailed descriptions of what topics were tested on her recent exam, including specific vignettes and answer choices, to help future candidates prepare. This is:",opts:["Permitted — sharing study experiences benefits the candidate community","Permitted if she does not reveal her exact score","A violation of Standard VII(A) — disclosing confidential exam content compromises program integrity","A violation of Standard VII(B) — misrepresenting the designation"],correct:2,explain:"Standard VII(A) prohibits disclosing confidential information about exam content; candidates sign a pledge to protect program integrity. The trap in A conflates helpful intent with permissibility; D confuses VII(A) (program conduct) with VII(B) (designation use) — this is about exam content, not credential reference."},
     ]},
    {id:"tvm",level:"L1",title:"Time Value of Money",topic:"Quantitative Methods",
     reading:{title:"Understanding Present and Future Value",content:"The Time Value of Money (TVM) is the foundational concept in all of finance. A dollar today is worth more than a dollar tomorrow because of its earning potential.\n\n<h3>Core Principles</h3>\n\nFuture Value (FV) tells you what an investment today will be worth later:\n<h4>FV = PV × (1 + r)^n</h4>\nWhere PV is present value, r is the interest rate per period, and n is the number of periods.\n\nPresent Value (PV) tells you what a future cash flow is worth today:\n<h4>PV = FV / (1 + r)^n</h4>\n\nThis is the basis of all discounted cash flow analysis. When you see a stock valued at $150 using DCF, someone computed the present value of all expected future cash flows.\n\n<h3>Compounding Frequency</h3>\n\nAnnual compounding: FV = PV × (1 + r)^n\nSemi-annual: FV = PV × (1 + r/2)^(2n)\nContinuous: FV = PV × e^(rn)\n\nMore frequent compounding produces higher effective rates. The Effective Annual Rate (EAR) converts any compounding frequency to an annual equivalent:\n<h4>EAR = (1 + r/m)^m − 1</h4>\n\n<h3>Application in Portfolio Management</h3>\n\nEvery metric in Quantex uses TVM implicitly. When we compute expected return, we're projecting future portfolio value. When we discount to find present value, we're answering: 'What is this future return stream worth paying for today?'"},
     quiz:[
       {q:"If you invest $10,000 at 8% annually for 5 years, what is the future value?",opts:["$14,693","$14,000","$15,000","$13,382"],correct:0,explain:"FV = 10,000 × (1.08)^5 = $14,693.28"},
       {q:"What is the present value of $50,000 received in 10 years at a 6% discount rate?",opts:["$27,919","$30,000","$25,000","$32,500"],correct:0,explain:"PV = 50,000 / (1.06)^10 = $27,919.74"},
       {q:"Which compounding frequency produces the highest effective annual rate for a stated 12% rate?",opts:["Annual","Quarterly","Monthly","Continuous"],correct:3,explain:"Continuous compounding: EAR = e^0.12 − 1 = 12.75%. More frequent compounding always produces a higher EAR."},
       {q:"An investment doubles in value over 7 years. What is the approximate annual return?",opts:["10.3%","7.0%","14.3%","8.0%"],correct:0,explain:"Using the Rule of 72: 72/7 ≈ 10.3%. Exact: (2)^(1/7) − 1 = 10.41%."},
       {q:"You deposit $2,000 at the END of each year for 10 years into an account earning 5% annually. The future value at the end of year 10 is approximately:",opts:["$25,156","$20,000","$26,414","$15,443"],correct:0,explain:"FV of an ordinary annuity = PMT × [((1+r)^n − 1)/r] = 2,000 × [(1.05^10 − 1)/0.05] = 2,000 × [(1.6289 − 1)/0.05] = 2,000 × 12.578 ≈ $25,156. Trap B ($20,000) sums nominal payments without any compounding (2,000 × 10). Trap C ($26,414) is the ANNUITY DUE answer: 25,156 × 1.05 — wrongly assumes payments occur at the start of each period. Trap D ($15,443) is the PRESENT value of this same annuity (2,000 × 7.7217), not the future value."},
       {q:"An annuity due and an ordinary annuity share the same payment amount, interest rate, and number of periods. The annuity due's present value will be:",opts:["Equal to the ordinary annuity's PV","Lower than the ordinary annuity's PV by a factor of (1+r)","Higher than the ordinary annuity's PV by a factor of (1+r) — because each payment occurs one period earlier","Higher by a factor of r"],correct:2,explain:"Annuity due payments occur at the BEGINNING of each period (t = 0, 1, 2, ...), while ordinary annuity payments occur at the END (t = 1, 2, 3, ...). Each annuity-due payment thus arrives one period earlier and is discounted one less period: PV(annuity due) = PV(ordinary annuity) × (1+r). The same relationship holds for FV. Trap A ignores the timing difference. Trap B reverses the direction — earlier payments are worth MORE, not less. Trap D uses the wrong factor (the correct multiplier is (1+r), not r alone). On a BAII Plus calculator, this corresponds to toggling BGN mode."},
       {q:"A preferred stock pays a constant dividend of $8 per year indefinitely. With a required return of 10%, its fair value is:",opts:["$0.80","$80","$8","$72"],correct:1,explain:"Level perpetuity PV = CF / r = $8 / 0.10 = $80. This formula is the limit of an infinite geometric series with constant cash flows. Trap A ($0.80) multiplies instead of divides (8 × 0.10). Trap C ($8) reports one period's cash flow as the PV of the entire stream. Trap D ($72) subtracts the rate from the CF, a nonsense operation. Preferred stock and consol bonds are the textbook applications — real-world preferred shares often include callability features that the simple formula ignores."},
       {q:"A stock just paid a dividend of $2.00. Dividends are expected to grow at 4% per year indefinitely. If the required return is 10%, the stock's fair value is approximately:",opts:["$20.00","$33.33","$14.86","$34.67"],correct:3,explain:"Gordon Growth Model: P₀ = D₁ / (r − g) = D₀ × (1+g) / (r − g) = 2.00 × 1.04 / (0.10 − 0.04) = 2.08 / 0.06 ≈ $34.67. Trap A ($20.00) ignores growth entirely (level-perpetuity formula: 2.00 / 0.10). Trap B ($33.33) uses D₀ instead of D₁ in the numerator (2.00 / 0.06 — forgets to grow the dividend one period). Trap C ($14.86) is a SIGN ERROR: 2.08 / (r+g) instead of (r−g). The model requires r > g, otherwise PV is undefined."},
       {q:"A loan has a stated annual rate (APR) of 12% with QUARTERLY compounding. The effective annual rate (EAR) is approximately:",opts:["12.00%","12.55%","48.00%","12.68%"],correct:1,explain:"EAR = (1 + APR/m)^m − 1 where m is the number of compounding periods per year. EAR = (1 + 0.12/4)^4 − 1 = (1.03)^4 − 1 ≈ 12.55%. Trap A reports the stated APR without adjusting for compounding — but compounding ALWAYS raises the effective rate above APR when m > 1. Trap C multiplies APR × m (= 48%), a common conceptual error. Trap D (12.68%) reports the MONTHLY compounding EAR — wrong frequency. The EAR ordering quarterly < monthly < daily < continuous captures the benefit of more frequent compounding."},
       {q:"$10,000 invested at 6% with CONTINUOUS compounding grows to what value after 5 years?",opts:["$13,000","$13,382","$13,488","$13,499"],correct:3,explain:"With continuous compounding, FV = PV × e^(rt) = 10,000 × e^(0.06×5) = 10,000 × e^0.30 ≈ 10,000 × 1.3499 = $13,499. Trap A ($13,000) reports SIMPLE interest (10,000 × (1 + 0.06×5)) — no compounding at all. Trap B ($13,382) uses ANNUAL compounding (10,000 × 1.06^5). Trap C ($13,488) uses MONTHLY compounding (10,000 × (1 + 0.06/12)^60) — very close to continuous but not the mathematical limit. The progression simple → annual → monthly → continuous illustrates how more frequent compounding monotonically raises FV, with continuous being the upper bound."},
       {q:"A project requires an initial investment of $1,000 today and produces cash flows of $400 at the end of year 1, $500 at end of year 2, and $300 at end of year 3. At a discount rate of 10%, the NPV is approximately:",opts:["$2","$200","$1,002","$1,200"],correct:0,explain:"NPV = −1,000 + 400/1.10 + 500/1.10² + 300/1.10³ = −1,000 + 363.64 + 413.22 + 225.39 ≈ $2. The project is barely positive-NPV at 10%, implying the IRR is just above 10%. Trap B ($200) ignores discounting entirely: 400 + 500 + 300 − 1,000. Trap C ($1,002) correctly discounts the inflows but forgets to subtract the $1,000 initial outflow. Trap D ($1,200) sums only the nominal inflows. NPV > 0 → accept; NPV < 0 → reject."},
       {q:"A 30-year fixed-rate mortgage of $300,000 at a 6% annual rate (0.5% monthly) has a monthly payment of $1,799. During the FIRST month, what portion of the payment goes to INTEREST (as opposed to principal)?",opts:["$299 — the bulk of each payment goes to principal","$1,799 — the entire first payment is interest","$1,500 — interest dominates early payments, and the principal portion grows as the balance shrinks","$900 — interest is split evenly with principal"],correct:2,explain:"Month 1 interest = outstanding balance × monthly rate = $300,000 × 0.005 = $1,500. Principal portion = $1,799 − $1,500 = $299 (just 17% of the payment). As the balance is paid down, interest shrinks and principal grows — by the final year, nearly the entire payment goes to principal. This asymmetry is a core feature of fixed-payment amortization. Trap A swaps the interest and principal portions. Trap B describes an INTEREST-ONLY loan, not a fully-amortizing one. Trap D assumes a linear split, but amortization is geometric — the schedule isn't 50/50 until roughly halfway through the loan's life."},
     ]},
    {id:"econ",level:"L1",title:"Economics",topic:"Economics",
     reading:{title:"Economics",content:"<h3>Reading Coming in Next Batch</h3>The full reading for this module is being prepared separately. For now, proceed to the Quiz tab (15 questions) to test your knowledge of micro (elasticity, substitutes), macro (GDP, CPI), policy (fiscal, monetary, Taylor rule), international parity, and growth theory."},
     quiz:[
       {q:"If the price of coffee rises and demand for tea increases as a result, coffee and tea are BEST described as:",opts:["Complements","Inferior goods","Giffen goods","Substitutes"],correct:3,explain:"Goods are substitutes when a price increase in one raises demand for the other (cross-price elasticity > 0). The trap in A is complements, where a price increase in one DECREASES demand for the other (e.g., cars and gasoline). Inferior goods describe income elasticity, not cross-price."},
       {q:"The price elasticity of demand for good X is -2.5. If the price of X increases by 4%, quantity demanded will:",opts:["Increase by 10%","Decrease by 6.5%","Decrease by 10%","Decrease by 2.5%"],correct:2,explain:"% change in Q = elasticity × % change in P = -2.5 × 4% = -10%, so quantity falls 10%. The trap in D confuses the elasticity coefficient (-2.5) with the % change in quantity; elasticity is the multiplier, not the output."},
       {q:"In the expenditure approach to GDP, which component is most likely to be NEGATIVE in a trade-deficit country?",opts:["Consumption (C)","Investment (I)","Government spending (G)","Net exports (NX)"],correct:3,explain:"GDP = C + I + G + NX. In a trade-deficit country, imports exceed exports, so NX = exports − imports is negative. The trap in B is that investment can be weak but rarely negative in the aggregate; only NX routinely turns negative in the identity. C and G are non-negative by definition."},
       {q:"Country A's nominal GDP grew 5% while inflation was 3%. The approximate real GDP growth rate is:",opts:["8%","5%","2%","-3%"],correct:2,explain:"Real growth ≈ Nominal growth − Inflation = 5% − 3% = 2%. The trap in A adds inflation instead of subtracting; B ignores inflation entirely. Real metrics always strip out price-level effects."},
       {q:"Which of the following is MOST consistent with the short-run Phillips curve?",opts:["Higher inflation is associated with higher unemployment (stagflation)","Higher inflation is associated with lower unemployment","Inflation and unemployment move together in the short run","Inflation and unemployment are unrelated in the short run"],correct:1,explain:"The short-run Phillips curve is inverse: central banks can trade higher inflation for lower unemployment temporarily. The trap in A is stagflation, which is a SHIFT of the curve (supply shock), not a point on it. D describes the LONG-run vertical Phillips curve, not the short-run."},
       {q:"A basket of goods costs $400 in the base year and $460 in the current year. What is the CPI in the current year?",opts:["60","87","15","115"],correct:3,explain:"CPI = (Current basket cost / Base basket cost) × 100 = (460/400) × 100 = 115. The trap in C reports the inflation rate (15%) instead of the index level; CPI is always indexed with base year = 100, not the rate of change."},
       {q:"A 1-year bond has a nominal yield of 7%. Inflation is expected to be 3% over the year. Using the Fisher approximation, the real interest rate is:",opts:["4%","10%","7%","3%"],correct:0,explain:"Fisher approximation: real rate ≈ nominal rate − expected inflation = 7% − 3% = 4%. (Exact: (1.07/1.03) − 1 = 3.88%.) The trap in B adds the two instead of subtracting; C and D are the input values, not the real rate."},
       {q:"If the required reserve ratio is 10%, the theoretical money multiplier is:",opts:["0.10","0.90","10","100"],correct:2,explain:"Money multiplier = 1 / reserve ratio = 1 / 0.10 = 10. Each $1 of reserves supports up to $10 of deposits in the banking system. The trap in A is the reserve ratio itself; B is (1 − reserve ratio), which doesn't correspond to any standard money multiplier formula."},
       {q:"Expansionary fiscal policy financed by government borrowing can 'crowd out' private investment PRIMARILY because:",opts:["Government spending reduces consumer confidence","Government spending always increases inflation","Taxes rise immediately to fund the spending","Government borrowing raises interest rates, making private borrowing more expensive"],correct:3,explain:"Crowding out occurs when government debt issuance increases demand for loanable funds, pushing up interest rates and reducing private-sector borrowing. The trap in A is a behavioral-sentiment story, not the textbook mechanism. B overstates the inflation link; C conflates Ricardian equivalence with crowding out."},
       {q:"A central bank lowers its policy rate by 25 basis points. The EXPECTED near-term transmission to the real economy is:",opts:["Immediate decrease in unemployment","Gradual stimulus via lower borrowing costs, weaker currency, and higher asset prices","Gradual rise in unemployment","Immediate increase in GDP"],correct:1,explain:"Monetary policy transmits through multiple channels — interest rate (lower borrowing costs), exchange rate (weaker currency stimulates exports), and asset price (wealth effect) — with lags of 6–18 months. The trap in A and D is the 'immediate' language; policy effects are diffuse and lagged, not mechanical."},
       {q:"The 1-year US interest rate is 4% and the 1-year Eurozone rate is 1%. Under covered interest rate parity, the 1-year EUR/USD forward rate relative to spot should:",opts:["Show the EUR at a forward premium of ~3%","Show the USD at a forward premium of ~3%","Show no forward premium or discount","Show the EUR at a forward discount of ~3%"],correct:0,explain:"Covered interest rate parity requires the currency with the lower interest rate (EUR at 1%) to trade at a forward premium vs the higher-yielding currency (USD at 4%) — otherwise riskless arbitrage would exist. Premium ≈ US rate − EU rate = 3%. The trap in B reverses direction; students often forget the low-yield currency is the forward winner."},
       {q:"Which of the following is BEST classified as a LEADING economic indicator?",opts:["Building permits","Average duration of unemployment","Corporate profits","Inventory-to-sales ratio"],correct:0,explain:"Leading indicators turn BEFORE the broader economy; building permits fall before construction activity drops, signaling slowdowns. The trap in B is that unemployment duration is a LAGGING indicator — it rises after recessions are well underway. C and D are coincident or lagging."},
       {q:"Using the CFA Taylor rule, if inflation is 3% (target 2%), the output gap is +1%, and the neutral real rate is 2%, the prescribed policy rate is approximately:",opts:["5.0%","6.0%","7.0%","3.0%"],correct:2,explain:"CFA Taylor rule: policy rate = neutral real rate + current inflation + 1.5 × (inflation − target) + 0.5 × output gap = 2 + 3 + 1.5(3−2) + 0.5(1) = 7.0%. The 1.5 coefficient on the inflation gap embodies the Taylor principle — policy must respond more than one-for-one to inflation to stabilize it. The trap in B (6.0%) uses 0.5 on the inflation gap instead of 1.5 — a common error from memorizing Taylor's original 1993 form rather than the CFA-taught version."},
       {q:"A basket of goods costs $100 in the US and 800 units in Country X. Under absolute purchasing power parity, the implied exchange rate is:",opts:["8 USD per unit","0.125 USD per unit","0.8 USD per unit","100 USD per unit"],correct:1,explain:"Absolute PPP: exchange rate (USD per unit) = Price_US / Price_X = 100/800 = 0.125 USD per unit (equivalently, 1 USD = 8 units of X). The trap in A reverses the ratio — reading '1 unit = 8 USD' instead of '1 USD = 8 units.' C and D are arithmetic errors."},
       {q:"In the Solow growth model's long-run steady state, sustained growth in per-capita output is driven PRIMARILY by:",opts:["Increases in the savings rate","Capital accumulation","Technological progress","Population growth"],correct:2,explain:"Solow shows that capital deepening (more capital per worker) produces temporary but not sustained per-capita growth due to diminishing returns; only exogenous technological progress drives long-run per-capita growth. The trap in B is the common-sense answer Solow explicitly refutes. A raises the level of output per worker but not the long-run GROWTH rate."},
     ]},
    {id:"fsa",level:"L1",title:"Financial Statement Analysis",topic:"Financial Reporting",
     reading:{title:"Financial Statement Analysis",content:"<h3>Reading Coming in Next Batch</h3>The full reading for this module is being prepared separately. For now, proceed to the Quiz tab (18 questions) to test your knowledge of the three financial statements, ratio analysis, DuPont, inventory methods, revenue recognition (ASC 606), leases (ASC 842), deferred taxes, EPS, treasury stock, pensions, and FX translation."},
     quiz:[
       {q:"A company reports total assets of $5M and total equity of $2M. Total liabilities are:",opts:["$7M","Cannot be determined","$3M","$2.5M"],correct:2,explain:"Accounting equation: Assets = Liabilities + Equity, so Liabilities = 5M − 2M = 3M. The trap in A adds the two values instead of subtracting; B wrongly implies the equation can't be solved, but it is always an identity that resolves from any two of the three inputs."},
       {q:"Under US GAAP (indirect method), depreciation expense is added back to net income in operating cash flow because:",opts:["Depreciation increases cash","Depreciation represents a real outflow","Depreciation is classified as a financing activity","Depreciation is a non-cash expense that reduced net income but did not reduce cash"],correct:3,explain:"The indirect method starts with net income and adjusts for non-cash items. Depreciation reduced accounting earnings but never involved a cash outflow this period, so it's added back for reconciliation. The trap in A treats the add-back as if depreciation itself generates cash; it doesn't — the line is a reconciliation, not an inflow."},
       {q:"A company has current assets of $600K and current liabilities of $200K. Its current ratio is:",opts:["0.33","3.0","$400K","$800K"],correct:1,explain:"Current ratio = current assets / current liabilities = 600 / 200 = 3.0. The trap in A inverts the ratio; C and D confuse a ratio with a dollar amount. A current ratio above 1 indicates short-term liquidity coverage; 3.0 is strong."},
       {q:"In a period of rising prices, which inventory method produces the HIGHEST reported net income?",opts:["LIFO","Weighted average","FIFO","Specific identification"],correct:2,explain:"FIFO expenses older (cheaper) inventory first, keeping newer (higher-cost) inventory on the balance sheet; COGS is lower and net income is higher under rising prices. The trap in A is LIFO, which does the opposite — expensing newer/higher-cost first, increasing COGS and lowering net income. Note that IFRS prohibits LIFO entirely; only US GAAP permits it, a standards-comparison point CFA exams test directly."},
       {q:"Revenue is $1,000K and COGS is $400K. Gross margin is:",opts:["40%","250%","$600K","60%"],correct:3,explain:"Gross margin = (Revenue − COGS) / Revenue = (1000 − 400) / 1000 = 60%. The trap in A reports the COGS percentage (40%) rather than the gross margin; C gives the dollar amount ($600K) instead of the required percentage."},
       {q:"A company has current assets of $800K, of which $300K is inventory. Current liabilities are $400K. The quick ratio is:",opts:["2.00","1.25","0.75","1.50"],correct:1,explain:"Quick ratio = (Current assets − Inventory) / Current liabilities = (800 − 300) / 400 = 1.25. The trap in A is the current ratio (800/400 = 2.00), which doesn't exclude inventory; the quick ratio is the stricter liquidity measure because inventory is hardest to convert to cash quickly."},
       {q:"Total liabilities are $1,500M and total equity is $500M. The debt-to-equity ratio is:",opts:["0.33","0.75","3.0","2.0"],correct:2,explain:"D/E = Total liabilities / Total equity = 1,500 / 500 = 3.0. The trap in A inverts the ratio (equity/debt = 0.33). A D/E of 3.0 means creditors finance 3× what equity holders contribute — high leverage."},
       {q:"Net profit margin is 10%, asset turnover is 1.2, and the equity multiplier is 2.5. Return on equity (3-step DuPont) is:",opts:["13.5%","12%","25%","30%"],correct:3,explain:"3-step DuPont: ROE = net margin × asset turnover × equity multiplier = 0.10 × 1.2 × 2.5 = 0.30 = 30%. The trap in B stops at margin × turnover (= ROA = 12%), forgetting the leverage multiplier; full ROE requires all three factors."},
       {q:"A company's net income is $100M and cash flow from operations is $30M. This pattern is BEST described as:",opts:["High-quality earnings — the company is highly profitable","High accruals component — earnings quality may be weak, warranting further scrutiny","Normal — NI and CFO are expected to differ materially","A violation of US GAAP"],correct:1,explain:"When net income substantially exceeds CFO, the gap reflects accruals (revenue booked but not yet collected, inventory buildup, etc.) — a yellow flag for earnings quality, not a GAAP violation. The accruals anomaly (Sloan, 1996) documents that firms with sustained high accruals relative to cash earnings systematically underperform in subsequent periods, which is why this gap warrants scrutiny rather than celebration. The trap in A reads high NI as high quality without checking whether it converts to cash."},
       {q:"Under updated US GAAP (ASC 842), a lessee with a long-term operating lease MUST recognize on the balance sheet:",opts:["Nothing — operating leases remain off-balance-sheet","A right-of-use asset and a lease liability","The full fair value of the leased asset","Only the rent payments as they occur"],correct:1,explain:"ASC 842 (effective 2019) requires lessees to capitalize nearly all leases — both finance and operating — via a right-of-use asset and a matching lease liability. The trap in A is the pre-2019 treatment, which left operating leases off-balance-sheet; the standard changed precisely to eliminate that loophole."},
       {q:"A deferred tax liability typically arises when:",opts:["A company pays more tax than it owes","Book depreciation exceeds tax depreciation","Tax depreciation exceeds book depreciation (accelerated tax methods)","Tax rates are expected to decrease"],correct:2,explain:"When tax depreciation exceeds book depreciation (e.g., accelerated tax methods), taxable income is temporarily lower than book income, so tax paid now is less than book tax expense — creating a future obligation, the DTL. The trap in B reverses the direction, which would create a deferred tax ASSET, not a liability."},
       {q:"Under ASC 606 (the 5-step model), revenue is recognized when:",opts:["Cash is received","The contract is signed","Control of the good or service transfers to the customer","Management believes revenue has been earned"],correct:2,explain:"ASC 606 recognizes revenue at the point when CONTROL of the good or service transfers to the customer (or over time for long-duration contracts). The trap in A is cash-basis thinking, which doesn't match accrual accounting; B is wrong because signing a contract alone doesn't mean performance has occurred."},
       {q:"Net income is $500M and weighted-average common shares outstanding are 250M. Basic EPS is:",opts:["$0.50","$5.00","$125M","$2.00"],correct:3,explain:"Basic EPS = Net income / weighted-average common shares outstanding = 500 / 250 = $2.00. The trap in A inverts the ratio; C is a dollar amount without division. Diluted EPS would use a larger denominator (including dilutive securities), producing an equal or lower number."},
       {q:"When a company repurchases its own stock, under US GAAP the treasury stock is reported as:",opts:["An asset at cost","A contra-equity account reducing total stockholders' equity","A liability at fair value","A retained earnings adjustment only"],correct:1,explain:"Treasury stock is a CONTRA-EQUITY account — under the cost method (most common in US GAAP), it reduces total stockholders' equity by the repurchase cost. The trap in A treats buybacks as investments, but a company cannot hold its own shares as an asset to itself; C and D misclassify the transaction entirely."},
       {q:"A company issues long-term debt and uses the proceeds to buy equipment. In the cash flow statement, these activities appear in:",opts:["Both in CFO","Both in CFI","Debt issuance in CFI; equipment purchase in CFF","Debt issuance in CFF; equipment purchase in CFI"],correct:3,explain:"Under US GAAP, issuing debt is a FINANCING activity (CFF — raising capital); buying PP&E is an INVESTING activity (CFI — deploying capital). The trap in C reverses the two classifications. CFO captures operating working-capital changes but not capital-raising or capital-deployment transactions."},
       {q:"A company reports inventory under LIFO. Its LIFO reserve rose from $40M to $50M during the year. To convert the year-end BALANCE SHEET inventory to FIFO, an analyst should:",opts:["Add $50M to LIFO inventory","Subtract $50M from LIFO inventory","Add $10M to LIFO inventory","Leave inventory unchanged — LIFO and FIFO produce the same inventory balance"],correct:0,explain:"FIFO inventory = LIFO inventory + LIFO reserve. To convert the year-end balance sheet, add the year-end LIFO reserve of $50M. The trap in C uses the CHANGE in the reserve ($10M) — that's the COGS adjustment for the period, not the inventory balance conversion. This is a classic point-in-time vs period mix-up."},
       {q:"A defined-benefit pension plan reports plan assets of $800M and a projected benefit obligation (PBO) of $900M. On the sponsor's balance sheet, this plan is:",opts:["Reported as a $100M net pension liability","Reported as a $100M asset (at gross)","Not reported — pension plans are off-balance-sheet","Reported at the full PBO of $900M as a liability"],correct:0,explain:"Funded status = Plan assets − PBO = 800 − 900 = −$100M (underfunded), reported as a net pension liability. The trap in B reverses the sign (underfunded ≠ asset); C is incorrect post-SFAS 158, which requires funded-status recognition on the balance sheet. D gross-reports the obligation without netting against plan assets."},
       {q:"A US parent translates its French subsidiary's financial statements. The subsidiary's functional currency is the Euro. Under the current rate method, translation adjustments are reported in:",opts:["Other comprehensive income (OCI), as cumulative translation adjustment","Net income, as a translation gain or loss","Retained earnings, directly","Not reported — they offset each other"],correct:0,explain:"Under the current rate method (used when functional currency = local currency), translation adjustments bypass net income and accumulate in OCI as the cumulative translation adjustment (CTA). The trap in B is the TEMPORAL method's treatment (used when functional = parent's currency), where remeasurement gains/losses DO hit net income — confusion between the two methods is the classic exam trap."},
     ]},
    {id:"equity_val",level:"L1",title:"Equity Valuation",topic:"Equity Investments",
     reading:{title:"Equity Valuation",content:"<h3>Reading Coming in Next Batch</h3>The full reading for this module is being prepared separately. For now, proceed to the Quiz tab (18 questions) to test your knowledge of the Gordon Growth Model, multi-stage DDM, justified P/E and P/B, PEG, EV/EBITDA, FCFE vs FCFF, residual income, relative valuation, and WACC."},
     quiz:[
       {q:"A company paid a dividend of $2.00 last year (D₀), expected to grow at 4% forever. The required return is 10%. Using the Gordon Growth Model, the intrinsic value is:",opts:["$20.00","$33.33","$52.00","$34.67"],correct:3,explain:"Gordon Growth: V₀ = D₁ / (r − g), where D₁ = D₀(1+g) = 2.00 × 1.04 = 2.08. V = 2.08 / (0.10 − 0.04) = 2.08 / 0.06 = $34.67. The trap in B ($33.33) uses D₀ directly instead of D₁ = D₀(1+g) — the model requires the NEXT period's dividend. C divides by g alone instead of (r − g); A ignores growth entirely."},
       {q:"Company A trades at a P/E of 30 while Company B trades at a P/E of 12. Which statement is MOST accurate?",opts:["Company A is more expensive than Company B","Company B has a higher risk of default","Company A is a better investment","Company A has higher expected earnings growth or lower risk (or both) that the market is pricing in"],correct:3,explain:"A higher P/E reflects the market's willingness to pay more per dollar of current earnings, typically due to higher expected growth or lower required return. The trap in A confuses 'higher multiple' with 'more expensive' — on an absolute basis A is richer, but whether it is OVERvalued depends on whether expected growth justifies the multiple. C is a normative judgment the ratio alone cannot support."},
       {q:"Which of the following BEST describes Free Cash Flow to Equity (FCFE)?",opts:["Cash available to all capital providers (equity + debt)","Cash available to equity holders after debt payments and reinvestment needs","Cash received as dividends","Net income"],correct:1,explain:"FCFE = cash flow available specifically to common shareholders after the firm has met debt obligations and reinvestment (capex, working capital) needs. The trap in A describes Free Cash Flow to the Firm (FCFF), which precedes debt servicing. C and D are distribution and accounting concepts, not free-cash-flow measures."},
       {q:"A company with a P/B ratio of 0.7 trades at:",opts:["A premium to book value","Book value plus a 70% markup","Cannot be determined from P/B alone","A discount to book value"],correct:3,explain:"P/B below 1.0 means market price < book value per share, i.e., a discount. P/B = 0.7 implies the market values the firm at 70% of its book value, often signaling distress, low ROE, or asset-impairment concerns. The trap in A reverses the direction; B misreads '0.7' as '70% premium' rather than '70% of book.'"},
       {q:"The required return on equity (r) used in the Gordon Growth Model is typically estimated as:",opts:["Risk-free rate + beta × equity risk premium","Dividend yield only","Growth rate only","Risk-free rate alone"],correct:0,explain:"The required return is typically estimated via CAPM: r = R_f + β × (ERP). The trap in B confuses dividend yield with required return — they happen to relate via r = dividend yield + g in Gordon, but yield alone is not 'required return.' C and D omit the equity risk premium entirely."},
       {q:"A company has a payout ratio of 40%, expected growth of 5%, and required return of 10%. Using the justified trailing P/E formula, trailing P/E equals approximately:",opts:["8.0×","10.0×","12.0×","8.4×"],correct:3,explain:"Justified trailing P/E = [Payout × (1 + g)] / (r − g) = [0.40 × 1.05] / (0.10 − 0.05) = 0.42 / 0.05 = 8.4. The trap in A uses payout without the growth adjustment (0.40 / 0.05 = 8.0) — that's the justified FORWARD P/E, a different formula. B and C are arithmetic errors."},
       {q:"The H-model is used for valuing companies whose growth pattern is BEST described as:",opts:["Constant perpetual growth","Growth declining linearly from an initial high rate to a sustainable long-term rate","Two distinct stages of constant growth","Zero dividends"],correct:1,explain:"The H-model approximates a scenario where growth declines linearly over a transition period (2H years) from the initial rate g_high to the long-term rate g_long. The trap in A describes the Gordon model; C is the two-stage DDM; D rules out dividend discount models entirely. H-model is specifically the linear-decline shortcut."},
       {q:"Company X has a forward P/E of 18. The industry median forward P/E is 22. If X and its peers have similar risk and growth profiles, X is MOST likely:",opts:["Overvalued relative to peers","Fairly valued","Cannot be compared","Undervalued relative to peers"],correct:3,explain:"When risk and growth are similar, a lower P/E suggests the stock is cheap relative to peers on a multiples basis. The trap in A reverses the relationship; a LOWER multiple on equivalent fundamentals typically means undervalued, not overvalued. B is incorrect when the multiple differs meaningfully from the median."},
       {q:"When valuing a firm using FCFF, the appropriate discount rate is:",opts:["The cost of equity (r_e)","The risk-free rate","The weighted average cost of capital (WACC)","The after-tax cost of debt"],correct:2,explain:"FCFF represents cash available to ALL capital providers, so the appropriate discount rate reflects both equity and debt — WACC. FCFE alone would use the cost of equity. The trap in A confuses the two models; FCFE → r_e, FCFF → WACC is the standard pairing tested on exams."},
       {q:"A company has book value per share of $20, ROE of 15%, and required return on equity of 10%. The annual residual income per share is:",opts:["$1.00","$2.00","$3.00","$5.00"],correct:0,explain:"Residual income = (ROE − r) × Book Value = (0.15 − 0.10) × 20 = 0.05 × 20 = $1.00. The trap in C ($3.00) uses ROE × BV — that's EPS, not residual income. Residual income measures EXCESS return above the required return, so r must be subtracted from ROE first."},
       {q:"A stock trades at $50, expected to pay a $2.50 dividend next year. The required return is 10%. Assuming Gordon Growth holds, the implied long-term growth rate is:",opts:["5%","10%","15%","20%"],correct:0,explain:"From Gordon: P = D₁ / (r − g), rearranging gives g = r − D₁/P = 0.10 − (2.50 / 50) = 0.10 − 0.05 = 5%. The trap in B reports the required return (10%) as the growth rate — a common confusion; the equation r − g = D₁/P tells you the SPREAD between the two, not that g equals r. C adds instead of subtracts."},
       {q:"A company has a P/E of 24 and expected earnings growth of 12%. Its PEG ratio is:",opts:["0.5","1.0","2.0","3.0"],correct:2,explain:"PEG = P/E ÷ g(%) = 24 / 12 = 2.0. A PEG near 1.0 is often considered fairly valued in simplified heuristics; PEG > 1 suggests the multiple is high relative to growth. The trap in A inverts the ratio (12/24 = 0.5); B is the rule-of-thumb 'fair' answer that doesn't apply when the math gives something else."},
       {q:"In a 5-year DCF model with a perpetual-growth terminal value, the terminal value typically:",opts:["Represents less than 20% of total enterprise value","Represents roughly 50% of total enterprise value","Represents 70–90% of total enterprise value for most businesses","Is irrelevant because it is far in the future"],correct:2,explain:"In typical DCF models for mature businesses, the terminal value accounts for 70–90% of total enterprise value because cash flows beyond year 5 continue indefinitely while the explicit forecast covers only 5 years. The trap in D reflects naive present-value intuition; discounting reduces but doesn't eliminate far-future cash flows. A and B dramatically underestimate the tail."},
       {q:"Compared to P/E, EV/EBITDA is OFTEN preferred for comparing companies because:",opts:["It is easier to calculate","It is independent of capital structure and accounting depreciation policies","It incorporates growth directly","It always produces the same answer as P/E"],correct:1,explain:"EV/EBITDA abstracts from capital structure (uses enterprise value, not market cap) and from depreciation choices (uses EBITDA, not net income), making cross-company comparisons cleaner — particularly across firms with different leverage or asset ages. The trap in C confuses it with the PEG ratio, which explicitly embeds growth; EV/EBITDA does not."},
       {q:"Using the justified P/B formula with sustainable ROE, which of the following relationships holds?",opts:["Justified P/B = (r − g) / (ROE − g)","Justified P/B = (ROE − g) / (r − g)","Justified P/B = ROE × r","Justified P/B = 1 / (r − g)"],correct:1,explain:"Justified P/B = (ROE − g) / (r − g). When ROE > r, P/B > 1 (value creation above cost of equity); when ROE < r, P/B < 1 (value destruction). The trap in A inverts numerator and denominator, a common algebraic error. D omits ROE entirely."},
       {q:"A company just paid a dividend of $1.00 (D₀). Dividends will grow at 15% per year for the next 3 years, then at 4% per year thereafter. Required return is 10%. The two-stage DDM intrinsic value is approximately:",opts:["$3.28","$19.17","$23.09","$29.64"],correct:2,explain:"Two-stage DDM: sum the PVs of high-growth dividends plus the PV of the terminal value at end of year 3. D₁=1.15, D₂=1.3225, D₃=1.5209; D₄ = D₃×1.04 = 1.5817. Discrete PVs: 1.15/1.10 + 1.3225/1.21 + 1.5209/1.331 = $3.28. Terminal V₃ = 1.5817 / 0.06 = $26.36; PV(V₃) = 26.36/1.331 = $19.81. Total ≈ $23.09. The trap in A omits the terminal value entirely (the dominant error — typically 85%+ of two-stage DDM value sits in the terminal). B applies Gordon with long-term growth only, skipping the high-growth stage; D uses the undiscounted terminal value."},
       {q:"A firm has book value per share of $30, ROE of 14%, required return of 10%, and is expected to maintain this indefinitely with zero growth. Using the single-stage residual income model, intrinsic value per share is:",opts:["$30.00","$34.00","$42.00","$60.00"],correct:2,explain:"Single-stage RIM with g=0: V = BV + residual income capitalized at r = BV + (ROE − r) × BV / r = 30 + (0.04)(30)/0.10 = 30 + 12 = $42. Equivalently, V = BV × (ROE / r) = 30 × 1.4 = $42. The trap in A reports book value alone, ignoring the excess-return value created when ROE > r; the key RIM insight is that value decomposes into book value plus the present value of excess returns."},
       {q:"A firm has a target capital structure of 60% equity and 40% debt. Cost of equity = 12%, pre-tax cost of debt = 7%, tax rate = 25%. WACC is:",opts:["8.2%","9.3%","10.0%","7.9%"],correct:1,explain:"WACC = (E/V)(r_e) + (D/V)(r_d)(1 − t) = 0.60(0.12) + 0.40(0.07)(1 − 0.25) = 0.072 + 0.40 × 0.0525 = 0.072 + 0.021 = 9.3%. The trap in C (10.0%) omits the tax shield on debt — uses pre-tax 0.07 directly. D (7.9%) multiplies by the tax rate (0.25) instead of (1 − tax rate = 0.75). A applies the tax shield to the wrong side (equity)."},
     ]},
    {id:"fixed_income",level:"L1",title:"Fixed Income",topic:"Fixed Income",
     reading:{title:"Fixed Income",content:"<h3>Reading Coming in Next Batch</h3>The full reading for this module is being prepared separately. For now, proceed to the Quiz tab (18 questions) to test your knowledge of bond pricing, premium/discount relationships, the three duration measures (Macaulay, Modified, Effective), convexity adjustments, yield curve analysis, spot and forward rates, and classical immunization."},
     quiz:[
       {q:"A bond with a 6% coupon is priced at 95.5% of par. The bond's YTM is:",opts:["Less than 6% (bond trades at premium)","Less than 6% (bond trades at discount)","Greater than 6% (bond trades at discount)","Exactly 6%"],correct:2,explain:"When a bond's price is below par (95.5 < 100), investors pay less than face value, so YTM must EXCEED the coupon rate to compensate; this is a DISCOUNT bond. Rule: Price < Par ↔ Coupon < YTM (discount); Price > Par ↔ Coupon > YTM (premium); Price = Par ↔ Coupon = YTM. The trap in B correctly identifies the bond as a discount but reverses the yield relationship — discounts carry HIGHER YTM than coupon, not lower."},
       {q:"A bond with a $1,000 face value pays an annual coupon of $50 and trades at $950. The current yield is:",opts:["5.00%","5.50%","4.75%","5.26%"],correct:3,explain:"Current yield = Annual coupon / Current price = $50 / $950 = 5.26%. The trap in A uses face value instead of market price (50/1000 = 5.00%) — that's the COUPON rate, not current yield. Current yield captures the income return at the price you pay; YTM additionally captures capital gain to maturity."},
       {q:"A zero-coupon bond's price relative to its face value is:",opts:["Always equal to face value","Always above face value","Always below face value (except at maturity)","Determined by the coupon rate"],correct:2,explain:"Zero-coupon bonds pay no periodic interest; investors earn their return by buying below face value and receiving face value at maturity. The trap in A confuses zeros with par bonds; B would mean a negative yield. D is contradictory — zeros have no coupon, so there is no coupon rate to determine price."},
       {q:"The 'dirty price' of a bond equals:",opts:["The quoted (clean) price","The clean price minus accrued interest","The face value plus coupon","The clean price plus accrued interest"],correct:3,explain:"Dirty price (or invoice price) = Clean price + Accrued interest. Quoted prices in bond markets are typically clean, but the buyer actually pays dirty — compensating the seller for coupon earned since the last payment date. The trap in B reverses the adjustment; accrued interest is ADDED by the buyer, not subtracted."},
       {q:"A bond with a longer maturity, all else equal, has:",opts:["Lower interest rate risk","Higher interest rate risk (longer duration)","No interest rate sensitivity","Higher coupon rate"],correct:1,explain:"Longer-maturity bonds have longer duration and thus greater sensitivity to interest rate changes — a 1% rate move produces a larger price change. The trap in A reverses the relationship. D confuses maturity with coupon; duration depends on both, but the question isolates maturity as the variable changing."},
       {q:"A bond has Macaulay duration of 7.2 years. Its yield to maturity is 6% with annual compounding. Modified duration is:",opts:["6.79","7.63","7.20","6.00"],correct:0,explain:"Modified duration = Macaulay duration / (1 + y) = 7.2 / 1.06 = 6.79. The trap in C reports Macaulay duration unchanged, skipping the conversion; the two are distinct — Macaulay is a weighted average time (years), while Modified expresses percentage price change per 1% yield change. B multiplies instead of dividing."},
       {q:"Effective duration, rather than Modified duration, should be used for:",opts:["Plain-vanilla fixed-coupon bonds","Zero-coupon bonds only","Bonds with embedded options (callable, putable, mortgage-backed)","Any bond with positive convexity"],correct:2,explain:"Effective duration accounts for changes in expected cash flows when rates move — essential for bonds with embedded options where exercise depends on rates (callables get called when rates fall; MBS prepay). Effective uses a curve-shift approach rather than assuming fixed cash flows. The trap in A is that Modified duration works fine for plain vanilla bonds (Effective gives the same answer there, but isn't required). D is unrelated — convexity sign doesn't determine the duration measure."},
       {q:"A bond has Modified duration of 5.5. If yields rise by 50 basis points, the bond's price will approximately:",opts:["Rise by 2.75%","Fall by 2.75%","Fall by 5.50%","Fall by 0.55%"],correct:1,explain:"Price change estimate: ΔP/P ≈ -ModDur × Δy = -5.5 × 0.005 = -0.0275 = -2.75%. Yields and prices move inversely, so a rise in yields produces a fall in price. The trap in A gets magnitude right but reverses the direction; C misapplies duration as the percentage change directly without scaling by Δy."},
       {q:"A bond has Modified duration of 6.0 and convexity of 75. If yields FALL by 100 basis points, the estimated price change including the convexity adjustment is:",opts:["+5.625%","+6.000%","+6.375%","+7.125%"],correct:2,explain:"Full estimate: ΔP/P ≈ -ModDur × Δy + 0.5 × Convexity × (Δy)² = -6.0 × (-0.01) + 0.5 × 75 × (0.01)² = 0.060 + 0.00375 = +6.375%. The convexity adjustment is ALWAYS POSITIVE because (Δy)² is non-negative — it always ADDS to the duration estimate regardless of yield direction. The trap in A (+5.625%) subtracts the convexity adjustment, an extremely common sign error. B ignores convexity entirely."},
       {q:"A callable bond exhibits 'negative convexity' when yields fall below the coupon rate because:",opts:["The bond cannot be called","Price appreciation is capped by the call price","Interest rate risk disappears","The bond becomes a perpetuity"],correct:1,explain:"Below the coupon rate, the issuer will exercise the call option to refinance at lower rates, so the bond's market price cannot rise much above the call price — capping upside. This flattens the price-yield curve into negative convexity. The trap in A reverses the call-exercise logic; callable bonds get called precisely when rates fall. C ignores that callable bonds still have (asymmetric) duration risk."},
       {q:"A corporate bond yields 6.5% while a comparable-maturity Treasury yields 4.0%. The credit spread is:",opts:["2.5% (250 bps)","10.5%","-2.5%","Cannot be determined"],correct:0,explain:"Credit spread = Corporate yield − Treasury yield = 6.5% − 4.0% = 2.5% = 250 basis points. The spread compensates investors for credit risk above the (approximately) risk-free Treasury. The trap in B adds instead of subtracting; C reverses the sign, which would imply the corporate is safer than Treasury — economically implausible for a standard comparison."},
       {q:"The 1-year spot rate is 3% and the 2-year spot rate is 4%. Under pure expectations theory, the 1-year forward rate starting in 1 year is approximately:",opts:["3.00%","4.00%","5.00%","7.00%"],correct:2,explain:"From (1 + s₂)² = (1 + s₁)(1 + f₁,₂): (1.04)² = (1.03)(1 + f), so 1 + f = 1.0816 / 1.03 = 1.0501, giving f ≈ 5.00%. The forward rate must 'top up' the short spot to reach the longer spot's compound return. The trap in A simply echoes s₁; D adds the two spots (3+4=7) rather than compounding correctly."},
       {q:"An 'inverted' yield curve is characterized by:",opts:["Long-term yields above short-term yields","Short-term yields above long-term yields","Flat yields across all maturities","Yields rising monotonically with maturity"],correct:1,explain:"An inverted yield curve has short-term yields EXCEEDING long-term yields — unusual because investors normally demand a term premium for longer duration. Historically, inversions have frequently preceded recessions. The trap in A describes a NORMAL curve (not inverted); D is also a normal curve."},
       {q:"A 'barbell' bond portfolio strategy is BEST described as:",opts:["Holding bonds concentrated at a single maturity point","Holding short- and long-maturity bonds but nothing in the middle","Holding a ladder of equally-spaced maturities","Holding only floating-rate notes"],correct:1,explain:"A barbell holds bonds at the short and long ends of the curve but avoids the intermediate section — betting on changes in curve shape (barbells typically outperform bullets when the curve moves in specific ways, because of their convexity profile). The trap in A describes a BULLET strategy; C describes a LADDER. Both are alternatives to the barbell."},
       {q:"A semi-annual coupon bond pays $30 every six months. Exactly 2 months have passed since the last coupon payment. Accrued interest per bond is:",opts:["$10.00","$20.00","$30.00","$5.00"],correct:0,explain:"Accrued interest = Period coupon × (days elapsed / days in period) = $30 × (2/6) = $10.00. The trap in B uses days REMAINING (4/6) instead of days elapsed (2/6); the buyer compensates the seller only for the portion of the coupon period already accrued, not the remainder. D halves incorrectly."},
       {q:"A 3-year, 5% annual-coupon bond with face value $1,000 is priced to yield 4% annually. The bond price is:",opts:["$950.00","$1,000.00","$1,027.75","$1,150.00"],correct:2,explain:"P = Σ CF_t / (1 + y)^t = 50/1.04 + 50/(1.04)² + 1050/(1.04)³ = 48.08 + 46.23 + 933.44 = $1,027.75. Since coupon (5%) > YTM (4%), the bond trades at a PREMIUM (price > $1,000), consistent with the premium/discount rule. The trap in A reverses the premium/discount direction; B incorrectly assumes par, which would require coupon = YTM."},
       {q:"A bond is priced at $980 currently. If yields rise 50 bps the price falls to $952; if yields fall 50 bps the price rises to $1,010. Effective duration is:",opts:["5.92","11.84","2.96","6.07"],correct:0,explain:"Effective duration = (P₋ − P₊) / (2 × P₀ × Δy) = (1010 − 952) / (2 × 980 × 0.005) = 58 / 9.80 = 5.92. The formula uses the symmetric price response to ±Δy and divides by TWICE the base price times the yield change. The trap in B omits the factor of 2 in the denominator, doubling the answer; C reverses numerator and denominator scaling. Effective duration is the right measure when cash flows may change with yields (embedded options, MBS)."},
       {q:"A pension fund has liabilities with a Macaulay duration of 12 years. To immunize against parallel yield curve shifts using a single bond portfolio, the fund should construct an asset portfolio with:",opts:["Modified duration of 12 years","Duration of 0 (cash only)","Macaulay duration exceeding 12 years to ensure safety","Macaulay duration of 12 years and PV equal to liabilities' PV"],correct:3,explain:"Classical immunization against parallel curve shifts requires MATCHING the Macaulay duration of assets and liabilities AND matching their present values — duration matching alone isn't sufficient if PVs differ. The trap in A substitutes Modified for Macaulay, which differ by the factor (1 + y); classical immunization theory is specified in Macaulay terms. C reflects an intuitive but wrong 'safety margin' idea — overshooting duration actually INCREASES rate risk, leaving the fund over-hedged in one direction."},
     ]},
    {id:"risk_return",level:"L1",title:"Risk and Return",topic:"Portfolio Management",
     reading:{title:"Understanding Portfolio Risk and Return",content:"<h3>Expected Return</h3>\n\nPortfolio expected return is the weighted average of individual asset returns:\n<h4>E(Rp) = Σ wi × E(Ri)</h4>\n\nThis is straightforward — if AAPL is 30% of your portfolio and you expect 20% return, AAPL contributes 6% to portfolio return.\n\n<h3>Portfolio Risk — Where It Gets Interesting</h3>\n\nPortfolio risk is NOT the weighted average of individual risks. This is the single most important insight in Modern Portfolio Theory.\n\n<h4>σp² = Σ Σ wi × wj × σi × σj × ρij</h4>\n\nThe correlation term (ρij) is what creates the 'free lunch' of diversification. When assets aren't perfectly correlated (ρ < 1), portfolio volatility is LESS than the weighted average of individual volatilities.\n\n<h3>The Sharpe Ratio</h3>\n\n<h4>S = (Rp − Rf) / σp</h4>\n\nThis measures excess return per unit of total risk. It's the most widely used risk-adjusted performance metric. In Quantex, every portfolio you build shows a real-time Sharpe ratio computed from the full covariance matrix.\n\n<h3>The Efficient Frontier</h3>\n\nFor any given return level, there exists a portfolio with minimum risk. The set of all such portfolios forms the efficient frontier. Every portfolio below this curve is suboptimal — you can get the same return with less risk, or more return with the same risk.\n\nThe Frontier tab in Quantex shows this visually. Your portfolio appears as a triangle — if it's below the curve, the optimizer can improve it."},
     quiz:[
       {q:"A portfolio is 60% stocks (expected return 12%, vol 20%) and 40% bonds (expected return 4%, vol 6%). What is the expected portfolio return?",opts:["8.8%","8.0%","9.2%","7.6%"],correct:0,explain:"E(Rp) = 0.60 × 12% + 0.40 × 4% = 7.2% + 1.6% = 8.8%"},
       {q:"If two assets have a correlation of -1.0, what is theoretically possible?",opts:["Zero portfolio risk","Maximum diversification","Infinite return","Negative beta"],correct:0,explain:"With ρ = -1, you can theoretically construct a portfolio with zero volatility by choosing the right weights. This is the extreme case of diversification benefit."},
       {q:"Your portfolio has a return of 15%, risk-free rate is 4%, and volatility is 22%. What is the Sharpe ratio?",opts:["0.50","0.68","0.41","0.75"],correct:0,explain:"Sharpe = (15% − 4%) / 22% = 11% / 22% = 0.50"},
       {q:"Which statement about the efficient frontier is TRUE?",opts:["Portfolios on the frontier have the highest return for each risk level","All portfolios on the frontier have the same Sharpe ratio","The frontier is a straight line","Diversification has no effect on the frontier"],correct:0,explain:"The efficient frontier is the set of optimal portfolios — for each risk level, no portfolio exists with higher expected return."},
       {q:"A portfolio has three equally likely annual return outcomes: +15%, +5%, and -5%. The standard deviation of annual returns is approximately:",opts:["5.00%","10.00%","20.00%","8.16%"],correct:3,explain:"Step 1: E(R) = (15+5−5)/3 = 5%. Step 2: Variance = [(15−5)² + (5−5)² + (−5−5)²]/3 = [100+0+100]/3 = 66.67. Step 3: SD = √66.67 ≈ 8.16%. The trap in B (10%) uses simple range/mean intuition; C (20%) uses the absolute range as if it were SD, ignoring the averaging step entirely."},
       {q:"Asset A has expected return 8% and standard deviation 12%. Asset B has expected return 12% and standard deviation 15%. On a coefficient-of-variation basis, the LESS risky asset per unit of return is:",opts:["A (lower SD means less risk)","Both equal","Cannot compare with different expected returns","B (lower risk per unit of return)"],correct:3,explain:"CV = SD / E(R). A: CV = 12/8 = 1.50; B: CV = 15/12 = 1.25. Lower CV = less risk per unit of expected return, so Asset B is less risky on this normalized basis. The trap in A judges by absolute SD without adjusting for return — useful only when expected returns match. CV normalizes risk to the return base, which is why it's preferred for comparing assets with different return profiles."},
       {q:"A portfolio holds 70% in Asset X (σ_X = 20%) and 30% in Asset Y (σ_Y = 10%). The correlation between X and Y is 0.4. Portfolio standard deviation is approximately:",opts:["17.00%","22.00%","15.45%","14.00%"],correct:2,explain:"Portfolio variance = w_X²σ_X² + w_Y²σ_Y² + 2·w_X·w_Y·ρ·σ_X·σ_Y = 0.49(0.04) + 0.09(0.01) + 2(0.7)(0.3)(0.4)(0.20)(0.10) = 0.0196 + 0.0009 + 0.00336 = 0.02386. SD = √0.02386 ≈ 15.45%. The trap in A (17.00%) is the weighted average of SDs (0.7×20% + 0.3×10%) — that would be correct ONLY if ρ = 1. Because ρ = 0.4 < 1, diversification lowers portfolio SD below the weighted average — the free-lunch insight of MPT."},
       {q:"Two assets: σ_A = 20%, σ_B = 10%, correlation = 0. The weight of Asset A in the minimum-variance portfolio is:",opts:["20%","50%","80%","33%"],correct:0,explain:"For two assets with zero correlation, min-variance weight for A: w_A = σ_B² / (σ_A² + σ_B²) = 0.01 / 0.05 = 20%. The lower-volatility asset (B at 10%) gets the higher weight (80%) because concentrating in the less-risky asset minimizes total variance. The trap in B (50%) is equal weighting, which ignores the unequal volatilities; D (33%) inversely weights by volatility rather than by variance."},
       {q:"The Sortino ratio differs from the Sharpe ratio in that Sortino:",opts:["Uses total variance rather than downside variance","Does not require a risk-free rate","Uses downside deviation instead of total standard deviation, penalizing only adverse volatility","Always exceeds the Sharpe ratio"],correct:2,explain:"Sortino uses DOWNSIDE deviation (volatility of returns below a target, usually the risk-free rate or zero) instead of total standard deviation — it doesn't penalize upside volatility, which is what investors actually want. Particularly relevant for asymmetric strategies. The trap in A reverses the definition; D is usually true but not always — Sortino ≥ Sharpe in typical cases because downside deviation ≤ total SD, with equality when returns are symmetric; 'always' overstates."},
       {q:"A portfolio has return 12%, beta 1.2, risk-free rate 3%. The Treynor ratio is:",opts:["0.075","0.100","0.090","0.144"],correct:0,explain:"Treynor = (R_p − R_f) / β_p = (0.12 − 0.03) / 1.2 = 0.09 / 1.2 = 0.075. This measures excess return per unit of SYSTEMATIC risk (beta), as opposed to Sharpe which uses total risk (SD). The trap in B (0.100) divides total return by beta without subtracting the risk-free rate — overstates the ratio; Treynor measures EXCESS return, not raw return. C is just the numerator (excess return) with no beta division."},
       {q:"As the number of securities in a well-diversified portfolio increases, what happens to unsystematic (company-specific) risk?",opts:["It grows linearly with N","It stays constant","It increases because of portfolio complexity","It asymptotically approaches zero"],correct:3,explain:"Adding uncorrelated or imperfectly correlated securities progressively eliminates company-specific (unsystematic) risk; by roughly 25–30 stocks, most unsystematic risk has been diversified away. Systematic (market-wide) risk remains regardless of N. The trap in B imagines risk is invariant to holdings; C misreads operational complexity as financial risk — distinct concepts."},
       {q:"A portfolio earns +50% in year 1 and -30% in year 2. Which statement is CORRECT about the mean return?",opts:["Arithmetic mean (10%) equals cumulative return","Arithmetic mean is 10% and geometric mean is 2.47%, reflecting volatility drag","Arithmetic mean (10%) and geometric mean (10%) are equal","Geometric mean is 10% and arithmetic is 2.47%"],correct:1,explain:"Arithmetic mean = (50 − 30)/2 = 10%. Geometric mean = [(1.50)(0.70)]^(1/2) − 1 = 1.05^0.5 − 1 = 2.47%. Arithmetic overstates actual compound growth when returns are volatile; geometric (CAGR) captures the actual dollar experience ($100 → $150 → $105 is a 5% total gain over 2 years = 2.47% CAGR). The trap in A conflates arithmetic mean with cumulative return; D reverses the two means. Over multi-period horizons, geometric mean is the correct measure of realized growth."},
     ]},
    {id:"capm",level:"L1",title:"CAPM and Beta",topic:"Portfolio Management",
     reading:{title:"The Capital Asset Pricing Model",content:"<h3>Systematic vs. Unsystematic Risk</h3>\n\nTotal risk = Systematic risk + Unsystematic risk\n\nSystematic risk (market risk) cannot be diversified away — it affects all assets. Think: recessions, interest rate changes, geopolitical events.\n\nUnsystematic risk (specific risk) CAN be diversified away. Think: a CEO departure, a product recall, an earnings miss at one company.\n\n<h3>Beta (β)</h3>\n\n<h4>βi = Cov(Ri, Rm) / Var(Rm)</h4>\n\nBeta measures an asset's sensitivity to market movements. β = 1.0 means the asset moves with the market. β > 1.0 amplifies market moves. β < 1.0 dampens them. β < 0 moves opposite to the market (rare, but gold and some bonds exhibit this).\n\nIn Quantex, your portfolio beta is the weighted average of individual betas. The Metrics dashboard shows this in real time.\n\n<h3>The CAPM Equation</h3>\n\n<h4>E(Ri) = Rf + βi × [E(Rm) − Rf]</h4>\n\nThis says: the expected return of any asset equals the risk-free rate plus a risk premium proportional to its beta. An asset with β = 1.5 should earn 1.5× the market risk premium.\n\n<h3>Alpha</h3>\n\n<h4>α = Actual Return − CAPM Expected Return</h4>\n\nPositive alpha means the portfolio outperformed what CAPM predicted given its beta. This is the definition of 'skill' in active management. The Metrics tab shows your alpha as part of Return Attribution."},
     quiz:[
       {q:"A stock has beta of 1.3, the risk-free rate is 4%, and the market risk premium is 8%. What is the expected return per CAPM?",opts:["14.4%","12.0%","16.4%","10.8%"],correct:0,explain:"E(R) = 4% + 1.3 × 8% = 4% + 10.4% = 14.4%"},
       {q:"If a portfolio returns 18% with beta 1.2, risk-free rate 4%, and market return 12%, what is the alpha?",opts:["4.4%","6.0%","2.4%","8.0%"],correct:0,explain:"CAPM expected = 4% + 1.2 × (12% − 4%) = 4% + 9.6% = 13.6%. Alpha = 18% − 13.6% = 4.4%."},
       {q:"Which type of risk does beta measure?",opts:["Systematic risk","Unsystematic risk","Total risk","Credit risk"],correct:0,explain:"Beta measures systematic (market) risk only. It tells you how sensitive the asset is to broad market movements."},
       {q:"Adding more stocks to a portfolio primarily reduces:",opts:["Unsystematic risk","Systematic risk","Both equally","Neither"],correct:0,explain:"Diversification eliminates unsystematic (company-specific) risk. Systematic risk remains regardless of how many stocks you hold."},
       {q:"A portfolio is 40% Stock A (β=0.8), 30% Stock B (β=1.5), and 30% Stock C (β=1.2). Portfolio beta is:",opts:["1.13","1.17","1.25","0.83"],correct:0,explain:"Portfolio beta = Σ w_i × β_i = 0.4(0.8) + 0.3(1.5) + 0.3(1.2) = 0.32 + 0.45 + 0.36 = 1.13. Beta is one of the few portfolio statistics that's a simple weighted average — unlike volatility, which requires covariance. The trap in B (1.17) averages the betas unweighted ((0.8+1.5+1.2)/3 = 1.17); C and D use wrong arithmetic."},
       {q:"The Security Market Line (SML) differs from the Capital Market Line (CML) in that the SML:",opts:["Is drawn in return-vs-total-risk space; CML uses return-vs-beta","Is drawn in return-vs-beta space; CML uses return-vs-total-standard-deviation","Applies only to efficient portfolios; CML applies to all securities","Describes debt instruments only"],correct:1,explain:"SML plots expected return on the y-axis against beta (systematic risk) on the x-axis; CML plots return against total risk (σ) and applies only to efficient portfolios that are combinations of the market portfolio and the risk-free asset. The trap in A reverses the two axes. C reverses applicability — SML applies to ALL securities under CAPM, while CML is restricted to efficient portfolios."},
       {q:"A stock with beta 1.0 has an expected return of 10%, while CAPM predicts 8%. Under the SML framework, this stock is:",opts:["Overvalued and plots below the SML","Fairly valued and plots on the SML","Cannot be evaluated without knowing its price","Undervalued and plots above the SML"],correct:3,explain:"When a stock's expected return EXCEEDS the CAPM-predicted return, it plots ABOVE the SML, suggesting it offers excess return for its systematic risk — undervalued relative to CAPM. The trap in A reverses the direction: above SML = attractive, not overvalued. C is wrong — the SML framework works directly off expected return and beta, not price."},
       {q:"Arbitrage Pricing Theory (APT) differs from CAPM PRIMARILY in that APT:",opts:["Requires a specific market portfolio as a risk factor","Assumes no arbitrage is possible","Allows for multiple systematic risk factors beyond a single market factor","Only applies to fixed-income securities"],correct:2,explain:"APT posits that expected return is explained by exposure to MULTIPLE systematic factors (e.g., inflation, growth, term spread) rather than only the single market factor in CAPM. The trap in A reverses the core distinction — APT is flexible about factor choice. B is a CONDITION of APT (derived from no-arbitrage) rather than a distinguishing feature from CAPM; both models rule out arbitrage."},
       {q:"An analyst estimates a stock's beta using 5 years of monthly returns, then re-estimates using the most recent 2 years. The betas differ significantly. This is BEST interpreted as:",opts:["A calculation error in one of the regressions","Proof that CAPM is invalid","Evidence that beta can be unstable over time, reflecting changes in the company's business or leverage","An arbitrage opportunity"],correct:2,explain:"Betas are known to be unstable — they shift as a company's operating mix, leverage, or macro sensitivity changes. Shorter estimation windows capture recent conditions but are noisier; longer windows average over older data that may no longer represent the business. Practitioners use Blume's adjustment (β_adj = 2/3 β_hist + 1/3 × 1.0) to account for mean reversion. The trap in A assumes computational error when the underlying phenomenon is real; B overreaches — instability complicates inputs, it doesn't invalidate the model."},
       {q:"A stock has a raw historical beta of 1.40. Using Blume's adjusted beta formula, the adjusted beta is:",opts:["1.27","1.00","1.33","1.40"],correct:0,explain:"Blume's adjustment: β_adj = (2/3) × β_raw + (1/3) × 1.0 = 0.6667(1.40) + 0.3333(1.0) = 0.9333 + 0.3333 = 1.27. The adjustment recognizes that betas tend to mean-revert toward 1.0 over time; using raw historical beta may overstate future beta for high-beta stocks. The trap in D (1.40) reports the unadjusted historical beta — the whole point of the adjustment is to move it toward 1.0. B (1.00) over-adjusts to the mean."},
       {q:"In Black's zero-beta CAPM (Black, 1972), the role of the risk-free asset is replaced by:",opts:["A zero-coupon bond of long duration","A portfolio uncorrelated with the market (beta = 0) that lies on the efficient frontier","The minimum-variance portfolio","A portfolio of Treasury bills only"],correct:1,explain:"Black's zero-beta CAPM relaxes the assumption of a riskless borrowing/lending rate, replacing it with a zero-beta portfolio — a portfolio uncorrelated with the market portfolio (β = 0) that still lies on the efficient frontier. This generalizes CAPM to markets where investors cannot freely borrow at the risk-free rate. The trap in A confuses duration with correlation to the market; D merely describes a low-risk asset, not one specifically uncorrelated with the market."},
       {q:"Theoretically, the 'market portfolio' in CAPM consists of:",opts:["The S&P 500 index only","All publicly traded US stocks","The single highest-Sharpe portfolio among all equity indices","All risky assets in the world weighted by market value, including stocks, bonds, real estate, and human capital"],correct:3,explain:"In CAPM theory, the market portfolio includes ALL risky assets held by investors, weighted by market value — equities, bonds, commodities, real estate, and even human capital. Roll (1977) famously critiqued CAPM tests for using narrow proxies (like the S&P 500) that can't represent the true market portfolio. The trap in A and B are such proxies — practical approximations, not the theoretical definition. C is unrelated."},
     ]},
    {id:"var_risk",level:"L2",title:"VaR and Risk Management",topic:"Risk Management",
     reading:{title:"Value at Risk and Beyond",content:"<h3>Value at Risk (VaR)</h3>\n\nVaR answers one question: 'What is the maximum expected loss over a given period at a given confidence level?'\n\n<h4>Parametric VaR₉₅ = −(μ − 1.645σ)</h4>\n\nA daily VaR₉₅ of 2.1% means: 'On 95% of days, the portfolio won't lose more than 2.1% of its value.' Equivalently: 'On about 1 out of 20 trading days, losses could exceed 2.1%.'\n\n<h3>Limitations of VaR</h3>\n\nVaR doesn't tell you HOW BAD things get in the worst cases. A VaR of 2.1% could mean the worst-case loss is 2.5% or 25% — VaR doesn't distinguish.\n\n<h3>Conditional VaR (CVaR / Expected Shortfall)</h3>\n\n<h4>CVaR₉₅ = E[Loss | Loss > VaR₉₅]</h4>\n\nCVaR answers: 'When we DO exceed VaR, what's the average loss?' This captures tail risk that VaR misses. Regulators increasingly prefer CVaR over VaR for this reason.\n\nIn Quantex, both VaR₉₅ and CVaR₉₅ are computed from your portfolio's volatility and displayed in the Metrics dashboard. The (?) icon next to each shows the formula with your actual numbers."},
     quiz:[
       {q:"A portfolio has daily VaR₉₅ of $15,000 on a $1M portfolio. What does this mean?",opts:["95% of days, loss won't exceed $15K","The portfolio will lose exactly $15K","Maximum possible loss is $15K","The portfolio always loses $15K"],correct:0,explain:"VaR₉₅ = $15,000 means on 95% of trading days, the loss will be $15,000 or less. On 5% of days (about 1 per month), it could be worse."},
       {q:"Why is CVaR considered superior to VaR?",opts:["It measures the average loss in the tail","It's easier to compute","It's always smaller than VaR","It ignores extreme events"],correct:0,explain:"CVaR (Expected Shortfall) tells you the average loss when VaR is exceeded. It captures tail risk severity, not just the threshold."},
       {q:"For a normal distribution, VaR₉₉ uses a z-score of approximately:",opts:["2.326","1.645","1.960","2.576"],correct:0,explain:"VaR₉₉ uses z = 2.326 (99th percentile one-tailed). VaR₉₅ uses z = 1.645."},
