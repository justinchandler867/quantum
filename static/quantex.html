<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantex — Portfolio Intelligence Platform</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:#0a0e1a;color:#c8d2e0;font-size:13px;-webkit-font-smoothing:antialiased}
#root{height:100vh;display:flex;flex-direction:column}
/* Topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:linear-gradient(180deg,#0f1424 0%,#0b0f1e 100%);border-bottom:1px solid rgba(99,102,241,.12);flex-shrink:0}
.logo{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700;letter-spacing:4px;background:linear-gradient(135deg,#818cf8 0%,#6366f1 50%,#a78bfa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.mkt{display:flex;gap:16px}
.mkt-item{display:flex;flex-direction:column;align-items:center;gap:1px}
.mkt-lbl{font-size:9px;color:#475569;font-weight:500;letter-spacing:.5px}
.mkt-val{font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace}
.chip{display:flex;gap:6px;align-items:center;padding:5px 14px;background:rgba(99,102,241,.08);border-radius:20px;font-size:11px;cursor:pointer;border:1px solid rgba(99,102,241,.2);color:#c8d2e0;transition:all .2s;font-weight:500}
.chip:hover{border-color:rgba(99,102,241,.5);background:rgba(99,102,241,.14)}
/* Stats bar */
.sbar{display:flex;overflow-x:auto;background:rgba(15,20,36,.6);border-bottom:1px solid rgba(99,102,241,.08);flex-shrink:0;backdrop-filter:blur(10px)}
.sb-item{display:flex;flex-direction:column;align-items:center;padding:6px 16px;border-right:1px solid rgba(99,102,241,.06);flex-shrink:0}
.sb-lbl{font-size:8px;color:#4a5568;letter-spacing:1px;font-weight:600;text-transform:uppercase}
.sb-val{font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace}
.up{color:#34d399}.dn{color:#f87171}.wa{color:#fbbf24}
/* Nav */
.nav{display:flex;background:rgba(15,20,36,.8);border-bottom:1px solid rgba(99,102,241,.08);overflow-x:auto;flex-shrink:0;gap:2px;padding:0 8px;backdrop-filter:blur(10px)}
.nav-tab{padding:9px 16px;font-size:11px;color:#4a5568;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif;white-space:nowrap;font-weight:600;transition:all .2s;letter-spacing:.3px}
.nav-tab:hover{color:#94a3b8;background:rgba(99,102,241,.04)}
.nav-tab.active{color:#a5b4fc;border-bottom-color:#6366f1;background:rgba(99,102,241,.06)}
.nav-tab.locked{color:#1e293b;cursor:not-allowed}
.nav-tab.done{color:#34d399}
/* Layout */
.body{display:flex;flex:1;overflow:hidden}
.main{flex:1;overflow-y:auto;padding:16px;background:linear-gradient(180deg,#0a0e1a 0%,#080c17 100%)}
.side{width:270px;flex-shrink:0;border-left:1px solid rgba(99,102,241,.08);display:flex;flex-direction:column;background:rgba(10,14,26,.95);backdrop-filter:blur(10px)}
/* Cards */
.card{background:rgba(15,20,40,.6);border:1px solid rgba(99,102,241,.1);border-radius:12px;padding:14px;margin-bottom:12px;backdrop-filter:blur(8px);transition:border-color .2s}
.card:hover{border-color:rgba(99,102,241,.18)}
.card-title{font-size:10px;font-weight:700;letter-spacing:1.5px;color:#6366f1;margin-bottom:10px;text-transform:uppercase;font-family:'DM Sans',sans-serif}
/* Buttons */
.btn{padding:7px 16px;border:1px solid rgba(99,102,241,.15);border-radius:8px;background:rgba(15,20,40,.6);color:#94a3b8;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s}
.btn:hover:not([disabled]){background:rgba(99,102,241,.1);color:#e2e8f0;border-color:rgba(99,102,241,.3)}
.btn[disabled]{opacity:.3;cursor:not-allowed}
.btn-p{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;border-color:transparent;box-shadow:0 2px 12px rgba(99,102,241,.25)}
.btn-p:hover:not([disabled]){background:linear-gradient(135deg,#818cf8,#6366f1);box-shadow:0 4px 20px rgba(99,102,241,.35)}
.btn-s{background:rgba(16,185,129,.1);color:#6ee7b7;border-color:rgba(16,185,129,.25)}
.btn-d{background:rgba(239,68,68,.08);color:#fca5a5;border-color:rgba(239,68,68,.2)}
.btn-g{background:none;border-color:transparent;color:#475569}
.btn-g:hover{color:#94a3b8}
.btn-sm{padding:4px 10px;font-size:10px}
.btn-xs{padding:3px 8px;font-size:9px;border-radius:6px}
.btn-full{width:100%}
/* Onboard */
.ow{max-width:620px;margin:0 auto;padding:12px 0}
.prog{display:flex;align-items:center;margin-bottom:24px}
.prog-dot{width:24px;height:24px;border-radius:50%;border:1px solid rgba(99,102,241,.2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;transition:all .3s}
.prog-step{display:flex;align-items:center;gap:6px;font-size:11px;color:#4a5568;font-weight:500}
.prog-step.active .prog-dot{background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;border-color:transparent;box-shadow:0 2px 12px rgba(99,102,241,.4)}
.prog-step.active{color:#a5b4fc}
.prog-step.done .prog-dot{background:linear-gradient(135deg,#059669,#34d399);color:#fff;border-color:transparent}
.prog-step.done{color:#34d399}
.prog-line{flex:1;height:2px;background:rgba(99,102,241,.1);margin:0 10px;border-radius:1px}
.prog-line.done{background:linear-gradient(90deg,#059669,#34d399)}
.step-card{background:rgba(15,20,40,.6);border:1px solid rgba(99,102,241,.12);border-radius:16px;padding:28px;backdrop-filter:blur(8px)}
.step-title{font-family:'Outfit',sans-serif;font-size:22px;font-weight:700;color:#f1f5f9;margin-bottom:6px}
.step-sub{font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.7}
.goal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.goal-card{padding:16px;background:rgba(10,14,26,.6);border:1px solid rgba(99,102,241,.1);border-radius:12px;cursor:pointer;transition:all .2s}
.goal-card:hover{border-color:rgba(99,102,241,.3);transform:translateY(-1px)}
.goal-card.selected{border-color:#6366f1;background:rgba(99,102,241,.08);box-shadow:0 0 20px rgba(99,102,241,.15)}
.goal-icon{font-size:22px;margin-bottom:8px}
.goal-name{font-size:14px;font-weight:600;color:#f1f5f9;margin-bottom:4px}
.goal-desc{font-size:11px;color:#64748b;line-height:1.5}
.q-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.q-item{display:flex;flex-direction:column;gap:5px}
.q-label{font-size:9px;font-weight:700;color:#6366f1;letter-spacing:1px}
.q-sel{padding:8px 10px;background:rgba(10,14,26,.6);border:1px solid rgba(99,102,241,.12);border-radius:8px;color:#c8d2e0;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;width:100%;transition:border-color .2s}
.q-sel:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.profile-result{background:rgba(10,14,26,.6);border-radius:12px;padding:20px;border:1px solid rgba(99,102,241,.1)}
.score-big{font-family:'Outfit',sans-serif;font-size:48px;font-weight:800;line-height:1}
.score-cat{font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;margin:4px 0 16px}
.alloc-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.alloc-lbl{font-size:10px;color:#64748b;width:85px;flex-shrink:0;font-weight:500}
.alloc-bar{flex:1;height:7px;background:rgba(15,20,40,.6);border-radius:4px;overflow:hidden}
.alloc-fill{height:100%;border-radius:4px}
.alloc-pct{font-size:10px;font-weight:700;width:30px;text-align:right;font-family:'JetBrains Mono',monospace}
.elig-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:12px}
.elig-box{padding:7px 9px;background:rgba(15,20,40,.4);border-radius:6px;border:1px solid rgba(99,102,241,.06)}
.elig-lbl{font-size:9px;color:#4a5568;margin-bottom:2px;font-weight:500}
.elig-val{font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace}
.elig-yes{color:#34d399}.elig-no{color:#f87171}
.flag-box{background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.2);border-radius:8px;padding:8px 10px;font-size:11px;color:#fbbf24;line-height:1.5;margin-top:6px}
.step-nav{display:flex;justify-content:space-between;margin-top:20px}
/* Discovery */
.type-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.type-tab{padding:4px 12px;border:1px solid rgba(99,102,241,.1);border-radius:20px;font-size:10px;cursor:pointer;background:none;color:#4a5568;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s}
.type-tab:hover{color:#94a3b8;border-color:rgba(99,102,241,.3)}
.type-tab.active{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(99,102,241,.3)}
.search-input{padding:8px 12px;background:rgba(15,20,40,.6);border:1px solid rgba(99,102,241,.1);border-radius:8px;color:#c8d2e0;font-size:12px;font-family:'DM Sans',sans-serif;width:100%;outline:none;transition:all .2s}
.search-input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.search-wrap{position:relative}
.search-dropdown{position:absolute;top:100%;left:0;right:0;background:#0b0f1e;border:1px solid rgba(99,102,241,.15);border-radius:10px;margin-top:4px;max-height:360px;overflow-y:auto;z-index:500;box-shadow:0 10px 30px rgba(0,0,0,.4)}
.search-dd-item{padding:8px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;border-bottom:1px solid rgba(99,102,241,.05)}
.search-dd-item:last-child{border-bottom:none}
.search-dd-item:hover{background:rgba(99,102,241,.08)}
.search-dd-sym{font-family:'JetBrains Mono',monospace;font-weight:700;color:#a5b4fc;min-width:64px}
.search-dd-name{color:#94a3b8;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.search-dd-exch{font-size:9px;padding:2px 6px;background:rgba(99,102,241,.1);color:#818cf8;border-radius:4px;flex-shrink:0}
.search-dd-fetch{font-size:10px;color:#34d399;flex-shrink:0}
.search-dd-custom{background:rgba(99,102,241,.04);border-top:1px solid rgba(99,102,241,.1)}
.search-dd-custom:hover{background:rgba(99,102,241,.10)}
.search-dd-empty{padding:14px;color:#64748b;text-align:center;font-size:11px}
.search-dd-loading{color:#818cf8;font-size:11px;padding:10px 12px}
.search-dd-error{background:rgba(239,68,68,.08);color:#fca5a5;font-size:11px;padding:10px 12px;cursor:default}
.tbl-wrap{overflow-x:auto;overflow-y:auto;max-height:460px;border:1px solid rgba(99,102,241,.08);border-radius:10px}
.dtbl{width:100%;border-collapse:collapse;font-size:12px}
.dtbl th{font-size:9px;font-weight:700;color:#6366f1;padding:8px 10px;border-bottom:1px solid rgba(99,102,241,.1);text-align:left;white-space:nowrap;cursor:pointer;background:rgba(15,20,40,.8);position:sticky;top:0;letter-spacing:.5px;backdrop-filter:blur(8px)}
.dtbl th:hover{color:#a5b4fc}
.dtbl td{padding:7px 10px;border-bottom:1px solid rgba(99,102,241,.04);white-space:nowrap;font-family:'JetBrains Mono',monospace;font-size:11px}
.dtbl tr:hover td{background:rgba(99,102,241,.04)}
.fit-badge{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:10px;font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace}
.fit-high{background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.3)}
.fit-mid{background:rgba(251,191,36,.08);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}
.fit-low{background:rgba(248,113,113,.08);color:#f87171;border:1px solid rgba(248,113,113,.2)}
.type-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:9px;font-weight:600;font-family:'DM Sans',sans-serif}
/* Builder */
.builder-layout{display:flex;gap:14px}
.builder-left{width:260px;flex-shrink:0}
.builder-right{flex:1;min-width:0}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.stat-box{background:rgba(15,20,40,.5);border:1px solid rgba(99,102,241,.08);border-radius:10px;padding:10px 12px;transition:all .2s;position:relative}
.stat-box:hover{border-color:rgba(99,102,241,.2);background:rgba(15,20,40,.7)}
.stat-lbl{font-size:9px;color:#6366f1;letter-spacing:.8px;margin-bottom:3px;font-weight:600;display:flex;align-items:center}
.stat-val{font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace}
.w-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.w-tick{font-size:12px;font-weight:700;width:55px;flex-shrink:0;font-family:'JetBrains Mono',monospace}
.w-pct{font-size:12px;font-weight:700;width:32px;text-align:right;flex-shrink:0;font-family:'JetBrains Mono',monospace}
.alloc-strip{display:flex;height:10px;border-radius:5px;overflow:hidden;gap:1px;margin-bottom:8px}
.alloc-seg{height:100%}
.alloc-legend{display:flex;flex-wrap:wrap;gap:6px;font-size:10px;color:#64748b}
.leg-dot{width:8px;height:8px;border-radius:3px;display:inline-block;margin-right:3px}
/* Metrics */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-lbl{font-size:10px;color:#64748b;width:95px;text-align:right;flex-shrink:0;font-weight:500}
.bar-bg{flex:1;height:7px;background:rgba(15,20,40,.5);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.bar-val{font-size:10px;font-weight:700;width:40px;text-align:right;font-family:'JetBrains Mono',monospace}
.data-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(99,102,241,.04);font-size:12px}
.data-row:last-child{border-bottom:none}
.data-key{color:#64748b;font-weight:500}.data-val{font-weight:700;font-family:'JetBrains Mono',monospace}
/* Corr */
.corr-cell{display:inline-flex;align-items:center;justify-content:center;height:26px;font-size:10px;font-weight:700;border-radius:4px;font-family:'JetBrains Mono',monospace}
/* Trade */
.trade-card{background:rgba(10,14,26,.5);border:1px solid rgba(99,102,241,.08);border-radius:10px;padding:12px;margin-bottom:10px;transition:border-color .2s}
.trade-card:hover{border-color:rgba(99,102,241,.15)}
.act-badge{font-size:10px;padding:3px 10px;border-radius:6px;font-weight:700;font-family:'DM Sans',sans-serif;letter-spacing:.3px}
.act-buy{background:rgba(52,211,153,.1);color:#34d399}
.act-sell{background:rgba(248,113,113,.08);color:#f87171}
.act-hold{background:rgba(251,191,36,.08);color:#fbbf24}
.price-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-top:8px}
.price-box{background:rgba(15,20,40,.4);border-radius:6px;padding:6px 8px}
.price-lbl{font-size:9px;color:#4a5568;font-weight:500}
.price-val{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
/* Compare */
.cmp-hdr{display:flex;gap:10px;margin-bottom:10px}
.cmp-port{flex:1;background:rgba(15,20,40,.5);border:1px solid rgba(99,102,241,.08);border-radius:10px;padding:12px;text-align:center}
.cmp-row{display:flex;border-bottom:1px solid rgba(99,102,241,.04)}
.cmp-lbl{width:150px;flex-shrink:0;padding:7px 10px;font-size:11px;color:#64748b;border-right:1px solid rgba(99,102,241,.04);font-weight:500}
.cmp-cell{flex:1;padding:7px 10px;text-align:center;font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace}
.cmp-win{background:rgba(52,211,153,.06);color:#34d399}
.cmp-sec{font-size:9px;font-weight:700;letter-spacing:1px;color:#6366f1;padding:7px 10px;background:rgba(99,102,241,.04);border-bottom:1px solid rgba(99,102,241,.06);display:flex}
/* Advisor */
.adv-hdr{padding:10px 12px;font-size:10px;font-weight:700;letter-spacing:1.5px;color:#6366f1;border-bottom:1px solid rgba(99,102,241,.08);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.adv-badge{font-size:9px;padding:2px 8px;background:rgba(99,102,241,.12);color:#a5b4fc;border-radius:8px;font-weight:600}
.adv-msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.msg-ai .msg-text{background:rgba(15,20,40,.6);border-radius:10px;padding:9px 11px;line-height:1.7;font-size:12px;color:#94a3b8}
.msg-user .msg-text{background:rgba(99,102,241,.08);border-radius:10px;padding:9px 11px;margin-left:16px;font-size:12px;color:#c4b5fd}
.msg-who{font-size:9px;color:#4a5568;letter-spacing:1px;margin-bottom:3px;font-weight:700}
.quick-btns{display:flex;flex-wrap:wrap;gap:4px;padding:6px 10px;border-top:1px solid rgba(99,102,241,.08)}
.q-btn{font-size:9px;padding:3px 9px;border:1px solid rgba(99,102,241,.12);border-radius:8px;background:none;color:#4a5568;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .2s}
.q-btn:hover{color:#a5b4fc;background:rgba(99,102,241,.06);border-color:rgba(99,102,241,.25)}
.adv-input-row{display:flex;gap:6px;padding:8px 10px;border-top:1px solid rgba(99,102,241,.08);flex-shrink:0}
.adv-input{flex:1;padding:7px 10px;border:1px solid rgba(99,102,241,.12);border-radius:8px;background:rgba(15,20,40,.6);color:#c8d2e0;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;transition:all .2s}
.adv-input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.adv-send{padding:7px 14px;background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .2s}
.adv-send:hover{box-shadow:0 2px 12px rgba(99,102,241,.3)}
.info-box{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.12);border-radius:8px;padding:10px 12px;font-size:11px;color:#93c5fd;line-height:1.6;margin-top:8px}
.warn-box{background:rgba(251,191,36,.04);border:1px solid rgba(251,191,36,.15);border-radius:8px;padding:8px 10px;font-size:11px;color:#fbbf24;line-height:1.5;margin-top:6px}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(99,102,241,.15);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(99,102,241,.3)}
/* Derivatives */
.deriv-grid{display:grid;grid-template-columns:280px 1fr;gap:14px}
.deriv-input{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.deriv-lbl{font-size:9px;font-weight:700;color:#6366f1;letter-spacing:.8px}
.deriv-field{padding:8px 10px;background:rgba(10,14,26,.6);border:1px solid rgba(99,102,241,.12);border-radius:8px;color:#c8d2e0;font-size:12px;font-family:'JetBrains Mono',monospace;width:100%;transition:all .2s}
.deriv-field:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.greek-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(52px,1fr));gap:6px}
.greek-box{background:rgba(10,14,26,.5);border:1px solid rgba(99,102,241,.08);border-radius:8px;padding:8px;text-align:center;transition:all .2s}
.greek-box:hover{border-color:rgba(99,102,241,.2);background:rgba(99,102,241,.04)}
.greek-sym{font-size:15px;font-weight:700;background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

async function apiFetch(path, body, timeout = API_TIMEOUT) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeout);
  try {
    const resp = await fetch(BACKEND_URL + path, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
      signal: controller.signal,
    });
    clearTimeout(timer);
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail || `API error ${resp.status}`);
    }
    return await resp.json();
  } catch (e) {
    clearTimeout(timer);
    if (e.name === "AbortError") throw new Error("Request timed out");
    throw e;
  }
}

function scoreProfile(a){
  let s=50;
  s+=({"18-25":20,"26-35":14,"36-45":8,"46-55":2,"56-65":-6,"65+":-14}[a.age]||0);
  s+=({"<$50K":-6,"$50K-$100K":2,"$100K-$250K":7,"$250K-$500K":11,"$500K+":15}[a.inc]||0);
  s+=({"<$100K":-6,"$100K-$500K":2,"$500K-$1M":7,"$1M-$5M":11,"$5M+":15}[a.nw]||0);
  s+=({"<1 year":-18,"1-3 years":-10,"3-7 years":2,"7-15 years":10,"15+ years":18}[a.hor]||0);
  s+=({"Sell everything":-20,"Sell some":-8,"Hold steady":6,"Buy more":16}[a.los]||0);
  s+=({"None":-10,"Beginner":-4,"Intermediate":5,"Experienced":10,"Professional":15}[a.exp]||0);
  s+=({"High (within 1yr)":-14,"Medium (3-5 yrs)":0,"Low (5+ yrs)":10}[a.liq]||0);
  const ds=({"None":0,"Basic":3,"Traded options":9,"Advanced":15}[a.der]||0);
  s+=ds;
  s=Math.max(5,Math.min(100,s));
  const cat=s>=85?"Aggressive":s>=68?"Mod-Aggressive":s>=48?"Moderate":s>=30?"Mod-Conservative":"Conservative";
  const rb=s>=85?5:s>=68?4:s>=48?3:s>=30?2:1;
  const eq=Math.min(95,Math.max(10,Math.round(s*.88+8)));
  const bd=Math.max(0,Math.round((100-eq)*.70));
  const hy=({"<1 year":.5,"1-3 years":2,"3-7 years":5,"7-15 years":10,"15+ years":20}[a.hor]||5);
  const flags=[];
  if(a.liq==="High (within 1yr)"&&s>50)flags.push("High liquidity need conflicts with aggressive allocation");
  if(a.los==="Sell everything"&&s>30)flags.push("Low loss tolerance — consider more conservative profile");
  return{score:s,cat,rb,eq,bd,alt:100-eq-bd,hy,optElig:s>=50&&ds>=3,futElig:s>=70&&ds>=9,warElig:s>=60,maxPos:s>=70?30:s>=50?20:15,maxBeta:+(0.4+s*0.014).toFixed(2),maxDD:Math.round(s*0.46),goal:a.goal,hor:a.hor,flags};
}

function fitScore(asset,profile){
  if(!profile)return 50;
  if(!asset||!asset.goals||!asset.rb)return 50;
  let s=0;
  if(asset.goals.includes(profile.goal))s+=40;
  else if(asset.goals.some(g=>["Balanced","Growth"].includes(g))&&["Growth","Balanced"].includes(profile.goal))s+=20;
  const[lo,hi]=asset.rb;
  if(profile.rb>=lo&&profile.rb<=hi)s+=30;
  else if(Math.abs(profile.rb-lo)<=1||Math.abs(profile.rb-hi)<=1)s+=15;
  if(profile.hy>=asset.hm)s+=15;else if(profile.hy>=asset.hm*.6)s+=7;
  if(asset.sh>=1.2)s+=10;else if(asset.sh>=.7)s+=6;else if(asset.sh>=.4)s+=3;
  if(asset.t==="Option"&&!profile.optElig)s=Math.min(s,20);
  if(asset.t==="Futures"&&!profile.futElig)s=Math.min(s,20);
  return Math.min(100,Math.round(s));
}

const _cc={};
function getCorr(a,b){
  const k=[a,b].sort().join("|");
  if(!_cc[k]){
    const ta=ASSETS.find(u=>u.id===a)?.t,tb=ASSETS.find(u=>u.id===b)?.t;
    const ba=ASSETS.find(u=>u.id===a)?.beta||1,bb=ASSETS.find(u=>u.id===b)?.beta||1;
    let v;
    if((ta==="Bond"&&(tb==="Stock"||tb==="ETF"))||((ta==="Stock"||ta==="ETF")&&tb==="Bond"))v=-.12+Math.random()*.08;
    else if(ta==="Bond"&&tb==="Bond")v=.70+Math.random()*.08;
    else if(ta===tb)v=.70+Math.random()*.12;
    else v=Math.max(-.4,Math.min(.95,ba*bb*.42+Math.random()*.08-.04));
    _cc[k]=+v.toFixed(2);
  }
  return _cc[k];
}

function calcStats(weights){
  const ks=Object.keys(weights);if(!ks.length)return null;
  const rf=.043;let ret=0,beta=0,vol=0;
  const ws=ks.map(k=>weights[k]/100);
  ks.forEach((k,i)=>{const a=ASSETS.find(u=>u.id===k)||{};ret+=ws[i]*(a.ret||0)/100;beta+=ws[i]*(a.beta||1);});
  for(let i=0;i<ks.length;i++)for(let j=0;j<ks.length;j++){const vi=(ASSETS.find(u=>u.id===ks[i])?.vol||20)/100,vj=(ASSETS.find(u=>u.id===ks[j])?.vol||20)/100;vol+=ws[i]*ws[j]*vi*vj*getCorr(ks[i],ks[j]);}
  vol=Math.sqrt(Math.max(vol,0));
  const sh=vol>0?(ret-rf)/vol:0,so=vol>0?(ret-rf)/(vol*.72):0,tr=beta>0?(ret-rf)/beta:0;
  const divY=ks.reduce((a,k,i)=>a+(ASSETS.find(u=>u.id===k)?.yld||0)*ws[i],0);
  const calmar=ret/Math.max(Math.abs(vol*2.1),.001),infoR=(ret-.242)/Math.max(vol,.001);
  const s08=ks.reduce((a,k,i)=>a+(ASSETS.find(u=>u.id===k)?.s08||0)*ws[i],0);
  const s20=ks.reduce((a,k,i)=>a+(ASSETS.find(u=>u.id===k)?.s20||0)*ws[i],0);
  const s22=ks.reduce((a,k,i)=>a+(ASSETS.find(u=>u.id===k)?.s22||0)*ws[i],0);
  const rc=ks.map((k,i)=>({k,pct:+(ws[i]*(ASSETS.find(u=>u.id===k)?.vol||20)/100/Math.max(vol,.001)*100).toFixed(1)}));
  return{ret:+(ret*100).toFixed(2),vol:+(vol*100).toFixed(2),sh:+sh.toFixed(3),beta:+beta.toFixed(3),so:+so.toFixed(3),tr:+(tr*100).toFixed(3),var95:+(-(ret/252-1.645*vol/Math.sqrt(252))*100).toFixed(2),var99:+(-(ret/252-2.326*vol/Math.sqrt(252))*100).toFixed(2),cvar95:+(-(ret/252-2.063*vol/Math.sqrt(252))*100).toFixed(2),maxDD:+(-(vol*2.1)*100).toFixed(2),divY:+(divY*100).toFixed(2),variance:+(vol*vol*10000).toFixed(1),calmar:+calmar.toFixed(3),infoR:+infoR.toFixed(3),s08:+s08.toFixed(1),s20:+s20.toFixed(1),s22:+s22.toFixed(1),rc};
}

// Local fallback optimizer (250-trial Monte Carlo — used when backend is unavailable)
function optimizeLocal(tickers,goal,maxPos){
  if(!tickers.length)return{};
  if(tickers.length===1)return{[tickers[0]]:100};
  let best=null,bestScore=-Infinity;
  for(let t=0;t<250;t++){
    let ws=tickers.map(()=>Math.random());
    const sum=ws.reduce((a,b)=>a+b,0);ws=ws.map(w=>Math.min(w/sum,(maxPos||30)/100));
    const s2=ws.reduce((a,b)=>a+b,0);ws=ws.map(w=>w/s2);
    const wo={};tickers.forEach((k,i)=>wo[k]=ws[i]*100);
    const s=calcStats(wo);if(!s)continue;
    const sc=goal==="sharpe"?s.sh:goal==="return"?s.ret:goal==="minvol"?-s.vol:-s.vol/Math.max(s.ret,.001);
    if(sc>bestScore){bestScore=sc;best=[...ws];}
  }
  if(!best)best=tickers.map(()=>1/tickers.length);
  const wo={};tickers.forEach((k,i)=>wo[k]=Math.round(best[i]*100));
  const tot=Object.values(wo).reduce((a,b)=>a+b,0);wo[tickers[0]]+=100-tot;
  return wo;
}

// Backend optimizer (scipy SLSQP via /api/optimize)
async function optimizeBackend(tickers, goal, maxPos, riskScore, currentWeights) {
  const objMap = { sharpe: "max_sharpe", "return": "max_return", minvol: "min_vol", riskparity: "risk_parity" };
  const data = await apiFetch("/api/optimize", {
    tickers,
    objective: objMap[goal] || "max_sharpe",
    risk_score: riskScore || null,
    include_current_weights: currentWeights || null,
  });
  // Convert weights from 0-1 to 0-100 integer percentages
  const wo = {};
  for (const [k, v] of Object.entries(data.weights || {})) {
    wo[k] = Math.round(v * 100);
  }
  // Ensure total = 100
  const tot = Object.values(wo).reduce((a, b) => a + b, 0);
  if (tot > 0 && tot !== 100) {
    const first = Object.keys(wo)[0];
    wo[first] += 100 - tot;
  }
  return { weights: wo, meta: data };
}

// ── Technical Indicators (pure functions — all return same-length arrays,
// with `undefined` at indices where a value cannot be computed) ──────────────
function sma(v,p){const o=v.map(()=>undefined);if(v.length<p)return o;let s=0;for(let i=0;i<p;i++)s+=v[i];o[p-1]=s/p;for(let i=p;i<v.length;i++){s+=v[i]-v[i-p];o[i]=s/p;}return o;}
function ema(v,p){const o=v.map(()=>undefined);if(v.length<p)return o;const k=2/(p+1);let prev=0;for(let i=0;i<p;i++)prev+=v[i];prev/=p;o[p-1]=prev;for(let i=p;i<v.length;i++){prev=v[i]*k+prev*(1-k);o[i]=prev;}return o;}
function macd(v){
  const e12=ema(v,12),e26=ema(v,26);
  const m=v.map((_,i)=>(e12[i]!==undefined&&e26[i]!==undefined)?e12[i]-e26[i]:undefined);
  const firstValid=m.findIndex(x=>x!==undefined);
  const sig=v.map(()=>undefined);
  if(firstValid>=0){
    const sub=m.slice(firstValid).map(x=>x===undefined?0:x);
    const s=ema(sub,9);
    for(let i=0;i<s.length;i++)if(s[i]!==undefined)sig[firstValid+i]=s[i];
  }
  const hist=m.map((x,i)=>(x!==undefined&&sig[i]!==undefined)?x-sig[i]:undefined);
  return{macd:m,signal:sig,histogram:hist};
}
function rsi(v,p=14){
  const o=v.map(()=>undefined);if(v.length<=p)return o;
  let gS=0,lS=0;
  for(let i=1;i<=p;i++){const d=v[i]-v[i-1];if(d>0)gS+=d;else lS-=d;}
  let aG=gS/p,aL=lS/p;
  o[p]=aL===0?100:100-100/(1+aG/aL);
  for(let i=p+1;i<v.length;i++){
    const d=v[i]-v[i-1];const g=d>0?d:0,l=d<0?-d:0;
    aG=(aG*(p-1)+g)/p;aL=(aL*(p-1)+l)/p;
    o[i]=aL===0?100:100-100/(1+aG/aL);
  }
  return o;
}
function bollinger(v,p=20,n=2){
  const mid=sma(v,p);
  const up=v.map(()=>undefined),lo=v.map(()=>undefined);
  for(let i=p-1;i<v.length;i++){
    let s=0;for(let j=i-p+1;j<=i;j++)s+=(v[j]-mid[i])**2;
    const sd=Math.sqrt(s/p);up[i]=mid[i]+n*sd;lo[i]=mid[i]-n*sd;
  }
  return{upper:up,middle:mid,lower:lo};
}
// Approximation: true stochastic uses OHLC; we only have closes, so rolling
// min/max of closes stands in for low/high. Less responsive than real stoch.
function stochastic(v,p=14,sm=3){
  const k=v.map(()=>undefined);
  for(let i=p-1;i<v.length;i++){
    let mn=Infinity,mx=-Infinity;
    for(let j=i-p+1;j<=i;j++){if(v[j]<mn)mn=v[j];if(v[j]>mx)mx=v[j];}
    k[i]=mx===mn?50:((v[i]-mn)/(mx-mn))*100;
  }
  const kFilled=k.map(x=>x===undefined?0:x);
  const dRaw=sma(kFilled,sm);
  const d=v.map((_,i)=>(k[i]!==undefined&&dRaw[i]!==undefined)?dRaw[i]:undefined);
  return{k,d};
}
function roc(v,p=10){const o=v.map(()=>undefined);for(let i=p;i<v.length;i++)if(v[i-p]!==0)o[i]=((v[i]-v[i-p])/v[i-p])*100;return o;}
function vwap(prices,volumes,period=20){
  const o=prices.map(()=>undefined);
  if(!volumes||prices.length!==volumes.length)return o;
  if(period===null){
    let pv=0,vv=0;
    for(let i=0;i<prices.length;i++){pv+=prices[i]*volumes[i];vv+=volumes[i];o[i]=vv>0?pv/vv:undefined;}
  }else{
    for(let i=period-1;i<prices.length;i++){
      let pv=0,vv=0;
      for(let j=i-period+1;j<=i;j++){pv+=prices[j]*volumes[j];vv+=volumes[j];}
      o[i]=vv>0?pv/vv:undefined;
    }
  }
  return o;
}
function polylinePoints(arr,cx,cy){const pts=[];for(let i=0;i<arr.length;i++)if(arr[i]!==undefined)pts.push(cx(i)+","+cy(arr[i]));return pts.join(" ");}

// Axis tick helpers
const MONTH_ABBR=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DOW_ABBR=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
function formatDateTick(dateStr,range){
  const d=new Date(dateStr);
  if(range==="1W")return DOW_ABBR[d.getUTCDay()];
  if(range==="1M")return MONTH_ABBR[d.getUTCMonth()]+" "+d.getUTCDate();
  if(range==="1Q"||range==="1Y")return MONTH_ABBR[d.getUTCMonth()];
  return String(d.getUTCFullYear());
}
function niceStep(rng,targetCount){
  if(rng<=0)return 1;
  const rough=rng/targetCount;
  const mag=Math.pow(10,Math.floor(Math.log10(rough)));
  const norm=rough/mag;
  let nice;
  if(norm<1.5)nice=1;
  else if(norm<3)nice=2;
  else if(norm<7)nice=5;
  else nice=10;
  return nice*mag;
}
function niceTicks(min,max,target=5){
  const step=niceStep(max-min,target);
  const first=Math.ceil(min/step)*step;
  const ticks=[];
  for(let v=first;v<=max+step*1e-6;v+=step)ticks.push(v);
  return ticks;
}
function fmtPrice(v){
  if(v<10)return "$"+v.toFixed(2);
  if(v<1000)return "$"+Math.round(v);
  return "$"+(v/1000).toFixed(1)+"k";
}
function xTickIndices(n,target=6){
  if(n<=target)return Array.from({length:n},(_,i)=>i);
  const out=[];
  for(let i=0;i<target;i++)out.push(Math.round(i*(n-1)/(target-1)));
  return out;
}

  const rsiPanel=sub.rsi?subPanel("RSI (14)",(cx,cy)=>[

    return subPanel("ROC (10)",(cx,cy)=>[

// ── Portfolio Growth Chart ───────────────────────────────────────────────────
function PortfolioChart({weights}){
  const tickers=Object.keys(weights);
  const tKey=tickers.join(",");
  const wKey=JSON.stringify(weights);
  const[range,setRange]=useState("1Y");
  const[data,setData]=useState(null);
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState(null);

  useEffect(()=>{
    if(!tickers.length){setData(null);return;}
    let cancelled=false;
    setLoading(true);setErr(null);
    apiFetch("/api/prices",{tickers,range})
      .then(d=>{if(!cancelled)setData(d);})
      .catch(e=>{if(!cancelled)setErr(e.message||"Failed to load prices");})
      .finally(()=>{if(!cancelled)setLoading(false);});
    return()=>{cancelled=true;};
  },[tKey,range]);

  const series=useMemo(()=>{
    if(!data||!data.dates||!data.dates.length)return null;
    const avail=Object.keys(data.prices);
    const totalW=avail.reduce((s,t)=>s+(weights[t]||0),0)||1;
    return data.dates.map((_,i)=>{
      let g=0;
      for(const t of avail){
        const px=data.prices[t];
        if(!px||!px[0])continue;
        g+=((weights[t]||0)/totalW)*(px[i]/px[0]);
      }
      return g*10000;
    });
  },[data,wKey]);

  if(!tickers.length)return null;

  const chartW=600,chartH=220,pad=36;
  let chart=null;
  if(series&&series.length>1){
    const yMin=Math.min(...series)*0.98,yMax=Math.max(...series)*1.02;
    const cx=i=>pad+i/(series.length-1)*(chartW-pad*2);
    const cy=v=>chartH-pad-(v-yMin)/(yMax-yMin||1)*(chartH-pad*2);
    const last=series[series.length-1];
    const color=last>=10000?"#1D9E75":"#ef4444";
    chart=e("svg",{width:"100%",viewBox:"0 0 "+chartW+" "+chartH,style:{display:"block"}},
      e("line",{x1:pad,y1:cy(10000),x2:chartW-pad,y2:cy(10000),stroke:"#1a2540",strokeWidth:".5",strokeDasharray:"3,3"}),
      e("polyline",{points:series.map((v,i)=>cx(i)+","+cy(v)).join(" "),fill:"none",stroke:color,strokeWidth:"1.5"}),
      e("text",{x:chartW-pad,y:cy(10000)-4,textAnchor:"end",fontSize:8,fill:"#334155"},"$10,000 invested"),
      e("text",{x:chartW-pad,y:16,textAnchor:"end",fontSize:12,fill:color,fontWeight:"bold"},"$"+last.toFixed(0)),
      e("text",{x:pad,y:chartH-10,fontSize:8,fill:"#475569"},data.start_date),
      e("text",{x:chartW-pad,y:chartH-10,textAnchor:"end",fontSize:8,fill:"#475569"},data.end_date)
    );
  }

  const RANGES=[["1W","1W"],["1M","1M"],["1Q","1Q"],["1Y","1Y"],["3Y","3Y"],["5Y","5Y"]];
  return e("div",{className:"card"},
    e("div",{className:"card-title"},"GROWTH: $10,000 INVESTED"+(data?" ON "+data.start_date:"")),
    e("div",{style:{display:"flex",gap:4,marginBottom:8,flexWrap:"wrap"}},
      RANGES.map(([v,l])=>e("button",{key:v,className:"btn btn-xs"+(range===v?" btn-p":""),onClick:()=>setRange(v),style:{fontSize:10}},l)),
      e("button",{key:"10Y",className:"btn btn-xs",disabled:true,title:"Coming soon — requires 10Y data range",style:{fontSize:10,opacity:.4,cursor:"not-allowed"}},"10Y")
    ),
    loading&&e("div",{style:{color:"#475569",fontSize:11,padding:"20px 0",textAlign:"center"}},e("span",{className:"spin"},"◌")," Loading prices..."),
    err&&e("div",{className:"warn-box"},"⚠ "+err),
    chart,
    chart&&e("div",{style:{fontSize:9,color:"#475569",fontStyle:"italic",marginTop:6}},"Assumes portfolio rebalanced to current weights. Actual buy-and-hold may differ."),
    data&&data.skipped&&data.skipped.length>0&&e("div",{style:{fontSize:9,color:"#64748b",marginTop:6}},"Skipped (no price data): "+data.skipped.join(", "))
  );
}

      apiFetch("/api/correlations",{tickers,regime,window:252}),
      apiFetch("/api/correlation-diagnostics",{tickers,weights:Object.values(weights).map(w=>w/100)}),
    ]).then(([corrData,diagData])=>{
      if(cancelled)return;
      setMatrix(corrData.matrix);setMatTickers(corrData.tickers);setDiag(diagData);

  const getVal=(i,j)=>useBackend?matrix[i][j]:getCorr(displayTickers[i],displayTickers[j]);

  const pairs=[];for(let i=0;i<n;i++)for(let j=i+1;j<n;j++)pairs.push({a:displayTickers[i],b:displayTickers[j],r:getVal(i,j)});
  const avg=pairs.reduce((a,p)=>a+p.r,0)/Math.max(pairs.length,1);

        backendOk&&e("div",{style:{display:"flex",gap:3}},
          ["normal","stress","blended"].map(r=>e("button",{key:r,className:"btn btn-xs"+(regime===r?" btn-p":""),onClick:()=>setRegime(r),style:{textTransform:"capitalize",fontSize:9}},r))
        )
      ),
      e("div",{style:{overflowX:"auto"}},
        e("div",{style:{display:"inline-flex",flexDirection:"column",gap:2}},
          e("div",{style:{display:"flex",gap:2}},e("div",{style:{width:56}}),displayTickers.map(t=>e("div",{key:t,style:{width:cw,fontSize:9,textAlign:"center",color:"#334155",overflow:"hidden",textOverflow:"ellipsis"}},t))),
          displayTickers.map((ti,ri)=>e("div",{key:ti,style:{display:"flex",gap:2,alignItems:"center"}},
            e("div",{style:{width:56,fontSize:9,color:"#334155",textAlign:"right",paddingRight:4,overflow:"hidden",textOverflow:"ellipsis"}},ti),
            displayTickers.map((tj,ci)=>{const v=getVal(ri,ci);return e("div",{key:tj,className:"corr-cell",style:{width:cw,...cellStyle(v)}},v.toFixed(2));})
          ))
        )

      diag?e("div",{className:"info-box",style:{marginTop:8}},diag.diversification_message):
      e("div",{className:"info-box",style:{marginTop:8}},"Avg pairwise ρ: "+avg.toFixed(2)+" · High-corr pairs (ρ>0.75): "+pairs.filter(p=>p.r>.75).length+" · Hedging pairs (ρ<0): "+pairs.filter(p=>p.r<-.05).length)
    ),
    diag&&diag.warnings&&diag.warnings.length>0&&e("div",{className:"card"},

    ),
    e("div",{className:"two-col"},

        diag&&diag.high_corr_pairs_stress&&diag.high_corr_pairs_stress.length>0?
          diag.high_corr_pairs_stress.map(p=>e("div",{key:p.ticker_a+p.ticker_b,className:"warn-box",style:{marginBottom:4}},"⚠ "+p.ticker_a+" / "+p.ticker_b+": ρ="+p.correlation.toFixed(2)+" — no diversification in crisis")):
        pairs.filter(p=>p.r>.75).length===0?e("div",{style:{color:"#475569",fontSize:11}},"No high-correlation pairs — good diversification."):
        pairs.filter(p=>p.r>.75).map(p=>e("div",{key:p.a+p.b,className:"warn-box",style:{marginBottom:4}},"⚠ "+p.a+" / "+p.b+": ρ="+p.r.toFixed(2)+" — limited diversification"))

          pairs.filter(p=>p.r<-.05).length===0?e("div",{style:{color:"#475569",fontSize:11}},"No negative-correlation pairs in this portfolio."):
          pairs.filter(p=>p.r<-.05).map(p=>e("div",{key:p.a+p.b,className:"info-box",style:{marginBottom:4}},"✓ "+p.a+" / "+p.b+": ρ="+p.r.toFixed(2)+" — provides hedging benefit"))
        ),
        diag&&diag.reference_hedges&&diag.reference_hedges.length>0&&e("div",{className:"card"},
          e("div",{className:"card-title"},"REFERENCE HEDGES (not in portfolio)"),

              "ρ "+h.avg_corr_normal.toFixed(2)+(h.avg_corr_stress!=null?" → "+h.avg_corr_stress.toFixed(2)+" stress":""))
          ))

      )

  );

// ── Efficient Frontier ────────────────────────────────────────────────────────
function Frontier({weights,profile,backendOk}){
  const tickers=Object.keys(weights);
  const[bkData,setBkData]=useState(null);
  const[loading,setLoading]=useState(false);

  // Fetch from backend
  useEffect(()=>{
    if(tickers.length<2||!backendOk)return;
    let cancelled=false;
    setLoading(true);
    apiFetch("/api/frontier",{
      tickers,risk_score:profile?.score||null,n_points:80,
      current_weights:Object.fromEntries(tickers.map(t=>[t,weights[t]])),
    }).then(data=>{
      if(!cancelled)setBkData(data);
    }).catch(()=>{}).finally(()=>{if(!cancelled)setLoading(false);});
    return()=>{cancelled=true;};
  },[tickers.join(","),backendOk]);

  if(tickers.length<2)return e("div",{className:"card",style:{textAlign:"center",padding:32}},e("div",{style:{color:"#475569"}},"Add at least 2 assets to compute the efficient frontier."));

  // Local fallback Monte Carlo
  const localPts=useMemo(()=>{
    if(bkData)return null; // skip if backend data available
    const arr=[];
    for(let t=0;t<150;t++){
      let ws=tickers.map(()=>Math.random());const sum=ws.reduce((a,b)=>a+b,0);ws=ws.map(w=>w/sum);
      const wo={};tickers.forEach((k,i)=>wo[k]=ws[i]*100);const s=calcStats(wo);if(s)arr.push({x:s.vol,y:s.ret,sh:s.sh});
    }
    return arr;
  },[tickers.join(","),bkData]);

  const cs=calcStats(weights);

  // Determine data source
  let pts,maxSh,minVol,source;
  if(bkData&&bkData.frontier&&bkData.frontier.length>0){
    pts=bkData.frontier.map(p=>({x:+(p["return"]!=null?p.volatility*100:p.volatility),y:+(p["return"]!=null?p["return"]*100:p.ret),sh:p.sharpe||0}));
    // Handle both percentage and decimal formats from backend
    if(pts[0]&&pts[0].x<1)pts=bkData.frontier.map(p=>({x:p.volatility*100,y:p["return"]*100,sh:p.sharpe||0}));
    maxSh={x:bkData.max_sharpe.volatility*100,y:bkData.max_sharpe["return"]*100,sh:bkData.max_sharpe.sharpe};
    minVol={x:bkData.min_vol.volatility*100,y:bkData.min_vol["return"]*100,sh:bkData.min_vol.sharpe};
    source="SLSQP";
  }else if(localPts&&localPts.length>0){
    pts=localPts;
    maxSh=pts.reduce((a,b)=>b.sh>a.sh?b:a,pts[0]);
    minVol=pts.reduce((a,b)=>b.x<a.x?b:a,pts[0]);
    source="Monte Carlo";
  }else{
    return e("div",{className:"card"},e("div",{style:{color:"#475569"}},loading?e("span",null,e("span",{className:"spin"},"◌")," Computing efficient frontier via SLSQP..."):"Computing..."));
  }

  if(!cs)return e("div",{className:"card"},e("div",{style:{color:"#475569"}},"Computing..."));
  const xs=pts.map(p=>p.x),ys=pts.map(p=>p.y);
  const xMin=Math.min(...xs,cs.vol)-1,xMax=Math.max(...xs,cs.vol)+1;
  const yMin=Math.min(...ys,cs.ret)-2,yMax=Math.max(...ys,cs.ret)+2;
  const px=x=>50+((x-xMin)/(xMax-xMin||1))*490;
  const py=y=>230-((y-yMin)/(yMax-yMin||1))*210;
  return e("div",null,
    e("div",{className:"card"},
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}},
        e("div",{className:"card-title",style:{marginBottom:0}},"EFFICIENT FRONTIER — RISK / RETURN"),
        e("span",{style:{fontSize:9,color:"#334155",padding:"2px 7px",background:"#0d1228",borderRadius:6}},source==="SLSQP"?"⚡ SLSQP Optimizer":"⚠ Monte Carlo (250 trials)")
      ),
      e("div",{style:{overflowX:"auto"}},
        e("svg",{width:"100%",viewBox:"0 0 550 250",style:{display:"block"}},
          e("line",{x1:50,y1:230,x2:545,y2:230,stroke:"#1a2540",strokeWidth:".5"}),
          e("line",{x1:50,y1:10,x2:50,y2:230,stroke:"#1a2540",strokeWidth:".5"}),
          e("text",{x:297,y:247,textAnchor:"middle",fontSize:9,fill:"#475569"},"Volatility (%)"),
          e("text",{x:12,y:125,textAnchor:"middle",fontSize:9,fill:"#475569",transform:"rotate(-90 12 125)"},"Return (%)"),
          pts.map((p,i)=>e("circle",{key:i,cx:px(p.x),cy:py(p.y),r:3,fill:p.sh>=1?"rgba(29,158,117,.5)":p.sh>=.5?"rgba(245,158,11,.4)":"rgba(239,68,68,.25)"})),
          e("circle",{cx:px(maxSh.x),cy:py(maxSh.y),r:6,fill:"#1D9E75",stroke:"#05080f",strokeWidth:"1.5"}),
          e("circle",{cx:px(minVol.x),cy:py(minVol.y),r:6,fill:"#f59e0b",stroke:"#05080f",strokeWidth:"1.5"}),
          e("polygon",{points:px(cs.vol)+","+(py(cs.ret)-7)+" "+(px(cs.vol)-6)+","+(py(cs.ret)+5)+" "+(px(cs.vol)+6)+","+(py(cs.ret)+5),fill:"#818cf8",stroke:"#05080f",strokeWidth:"1"}),
          e("text",{x:540,y:16,textAnchor:"end",fontSize:9,fill:"#818cf8"},"▲ Your Portfolio"),
          e("text",{x:540,y:28,textAnchor:"end",fontSize:9,fill:"#1D9E75"},"● Max Sharpe"),
          e("text",{x:540,y:40,textAnchor:"end",fontSize:9,fill:"#f59e0b"},"● Min Volatility")
        )
      ),
      e("div",{className:"info-box",style:{marginTop:6}},"Your portfolio: Return "+cs.ret+"% · Vol "+cs.vol+"% · Sharpe "+cs.sh+" · "+(cs.sh>=(maxSh?.sh*.9)?"Near optimal ✓":"Consider optimizing in Portfolio Builder"))
    ),
    e("div",{className:"card"},
      e("div",{className:"card-title"},"KEY FRONTIER POINTS"),
      e("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:11}},
        e("thead",null,e("tr",{style:{borderBottom:"1px solid #1a2540"}},
          ["PORTFOLIO","RETURN","VOLATILITY","SHARPE"].map(h=>e("th",{key:h,style:{padding:"4px 7px",textAlign:"left",fontSize:9,color:"#475569",fontWeight:"bold"}},h))
        )),
        e("tbody",null,
          [["Your Portfolio",cs.ret,cs.vol,cs.sh,"#818cf8"],["Max Sharpe",+maxSh.y.toFixed(2),+maxSh.x.toFixed(2),+maxSh.sh.toFixed(3),"#1D9E75"],["Min Volatility",+minVol.y.toFixed(2),+minVol.x.toFixed(2),+minVol.sh.toFixed(3),"#f59e0b"]].map(([l,r,v,sh,c])=>
            e("tr",{key:l,style:{borderBottom:"1px solid #06090f"}},
              e("td",{style:{padding:"5px 7px",fontWeight:"bold",color:c}},l),
              e("td",{style:{padding:"5px 7px"},className:r>=0?"up":"dn"},(r>0?"+":"")+r+"%"),
              e("td",{style:{padding:"5px 7px"}},v+"%"),
              e("td",{style:{padding:"5px 7px",color:sh>=1?"#1D9E75":sh>=.5?"#f59e0b":"#ef4444",fontWeight:"bold"}},sh)
            )
          )
        )
      )
    )
  );
}

          e("div",{className:"price-box"},e("div",{className:"price-lbl"},"TARGET"),e("div",{className:"price-val up"},tr.tgt?"$"+tr.tgt:"—")),

// ── Paper Trading ─────────────────────────────────────────────────────────────
function PaperTrading({backendOk}){
  const[cash,setCash]=useState(100000);
  const[positions,setPositions]=useState({});  // ticker → {shares, avgCost, firstBought}
  const[txLog,setTxLog]=useState([]);
  const[navHistory,setNavHistory]=useState([{t:Date.now(),nav:100000}]);
  const[ticker,setTicker]=useState("");
  const[qty,setQty]=useState(10);
  const[loading,setLoading]=useState(false);
  const[lastMsg,setLastMsg]=useState("");
  const[tab,setPTab]=useState("positions"); // positions, performance, history

  // Persist to localStorage
  useEffect(()=>{try{const s=localStorage.getItem("qx_paper");if(s){const d=JSON.parse(s);setCash(d.cash||100000);setPositions(d.positions||{});setTxLog(d.txLog||[]);setNavHistory(d.navHistory||[{t:Date.now(),nav:100000}]);}}catch(e){}},[]);
  useEffect(()=>{try{localStorage.setItem("qx_paper",JSON.stringify({cash,positions,txLog,navHistory}));}catch(e){}},[cash,positions,txLog,navHistory]);

  const getPrice=(tk)=>{const a=ASSETS.find(x=>x.id===tk);return a?a.ret>0?Math.round(100+a.ret*2):Math.round(80+Math.random()*40):null;};

  const executeTrade=async(side)=>{
    const tk=ticker.toUpperCase().trim();if(!tk||qty<1)return;
    setLoading(true);setLastMsg("");

    let price=null;
    // Try backend first
    if(backendOk){
      try{
        const r=await apiFetch("/api/paper/trade",{ticker:tk,side,quantity:qty});
        if(r.status==="filled"){
          setLastMsg((side==="buy"?"Bought ":"Sold ")+r.quantity+" "+r.ticker+" @ $"+r.price.toFixed(2));
          // Refresh from backend
          try{
            const sum=await fetch(BACKEND_URL+"/api/paper/summary").then(r=>r.json());
            setCash(sum.cash);
          }catch(e){}
          try{
            const pos=await fetch(BACKEND_URL+"/api/paper/positions").then(r=>r.json());
            const p={};pos.forEach(x=>{p[x.ticker]={shares:x.shares,avgCost:x.avg_cost,price:x.current_price,pnl:x.unrealized_pnl,pnlPct:x.unrealized_pnl_pct,weight:x.weight};});
            setPositions(p);
          }catch(e){}
          setTxLog(prev=>[{id:r.id,t:new Date().toLocaleTimeString(),tk:r.ticker,side,qty:r.quantity,price:r.price,total:r.total,status:"filled"},...prev].slice(0,100));
          setLoading(false);return;
        }else{
          setLastMsg("Rejected: "+r.reason);setLoading(false);return;
        }
      }catch(e){/* fall through to local */}
    }

    // Local execution
    price=getPrice(tk);
    if(!price){
      // Try to find in ASSETS by partial match
      const match=ASSETS.find(a=>a.id.startsWith(tk));
      if(match)price=Math.round(100+match.ret*1.5);
    }
    if(!price){price=Math.round(50+Math.random()*200);} // fallback random for unknown tickers

    if(side==="buy"){
      const total=price*qty;
      if(total>cash){setLastMsg("Insufficient cash. Need $"+total.toLocaleString()+", have $"+cash.toLocaleString());setLoading(false);return;}
      setCash(c=>c-total);
      setPositions(prev=>{
        const p={...prev};
        if(p[tk]){
          const oldShares=p[tk].shares;const oldCost=p[tk].avgCost;
          p[tk]={...p[tk],shares:oldShares+qty,avgCost:(oldShares*oldCost+qty*price)/(oldShares+qty),price};
        }else{
          p[tk]={shares:qty,avgCost:price,price,pnl:0,pnlPct:0,weight:0,firstBought:new Date().toISOString()};
        }
        return p;

    setTxLog(prev=>[{id:Math.random().toString(36).slice(2,8),t:new Date().toLocaleTimeString(),tk,side,qty,price,total:price*qty,status:"filled"},...prev].slice(0,100));
    // Record NAV
    const posVal=Object.entries(positions).reduce((a,[k,v])=>a+v.shares*(v.price||v.avgCost),0);
    setNavHistory(prev=>[...prev,{t:Date.now(),nav:cash+posVal}].slice(-500));

  // Compute totals
  const posVal=Object.entries(positions).reduce((a,[k,v])=>a+v.shares*(v.price||v.avgCost),0);
  const nav=cash+posVal;
  const totalReturn=nav-100000;

  const totalUnrealized=Object.values(positions).reduce((a,v)=>a+(v.price-v.avgCost)*v.shares,0);
  const posCount=Object.keys(positions).length;

  // Performance stats
  const navs=navHistory.map(h=>h.nav);
  const dailyRets=[];for(let i=1;i<navs.length;i++)if(navs[i-1]>0)dailyRets.push(navs[i]/navs[i-1]-1);
  const avgRet=dailyRets.length>0?dailyRets.reduce((a,b)=>a+b,0)/dailyRets.length:0;
  const stdRet=dailyRets.length>1?Math.sqrt(dailyRets.reduce((a,r)=>a+(r-avgRet)**2,0)/(dailyRets.length-1)):0;
  const sharpe=stdRet>0?(avgRet-0.043/252)/stdRet*Math.sqrt(252):0;
  let peak=100000,maxDD=0;navs.forEach(n=>{if(n>peak)peak=n;const dd=(n-peak)/peak;if(dd<maxDD)maxDD=dd;});
  const winTrades=txLog.filter(t=>t.side==="sell"&&t.status==="filled").length;
  const totalTrades=txLog.filter(t=>t.status==="filled").length;

  const resetAccount=()=>{if(!confirm("Reset paper trading account to $100,000?"))return;setCash(100000);setPositions({});setTxLog([]);setNavHistory([{t:Date.now(),nav:100000}]);setLastMsg("Account reset to $100,000");};

  // NAV chart
  const chartW=500,chartH=120,pad=30;
  const navPts=navHistory.slice(-100);
  const navMin=Math.min(...navPts.map(h=>h.nav))*0.998;

  const cx=i=>pad+i/(navPts.length-1||1)*(chartW-pad*2);
  const cy=v=>chartH-pad-(v-navMin)/(navMax-navMin||1)*(chartH-pad*2);

  return e("div",{className:"pt-layout"},
    // Left: Trade Ticket + Account
    e("div",null,
      e("div",{className:"card"},
        e("div",{className:"card-title"},"TRADE TICKET"),

        e("div",{className:"deriv-input"},e("div",{className:"deriv-lbl"},"QUANTITY"),e("input",{className:"pt-qty",type:"number",value:qty,onChange:ev=>setQty(Math.max(1,+ev.target.value)),min:1})),
        e("div",{style:{display:"flex",gap:6,marginTop:8}},

        ),
        lastMsg&&e("div",{style:{marginTop:8,fontSize:10,padding:"6px 8px",background:lastMsg.includes("Bought")||lastMsg.includes("Sold")&&!lastMsg.includes("Insufficient")?"#0d2818":"#1c0a00",borderRadius:5,color:lastMsg.includes("Insufficient")||lastMsg.includes("Rejected")?"#fcd34d":"#6ee7b7"}},lastMsg),
        loading&&e("div",{style:{marginTop:6,fontSize:10,color:"#818cf8"}},e("span",{className:"spin"},"◌")," Executing...")
      ),
      e("div",{className:"card"},
        e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
          e("div",{className:"card-title",style:{marginBottom:0}},"ACCOUNT"),

        e("div",{className:"pt-nav",style:{color:totalReturn>=0?"#1D9E75":"#ef4444",marginTop:6}},"$"+nav.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})),
        e("div",{style:{fontSize:11,color:totalReturn>=0?"#1D9E75":"#ef4444",marginBottom:8}},(totalReturn>=0?"+":"")+totalReturn.toFixed(2)+" ("+(totalReturnPct>=0?"+":"")+totalReturnPct.toFixed(2)+"%)"),
        [["Cash","$"+cash.toLocaleString(undefined,{minimumFractionDigits:2})],["Invested","$"+posVal.toLocaleString(undefined,{minimumFractionDigits:2})],["Positions",posCount],["Unrealized",(totalUnrealized>=0?"+$":"-$")+Math.abs(totalUnrealized).toFixed(2)],["Trades",totalTrades]].map(([l,v])=>
          e("div",{key:l,style:{display:"flex",justifyContent:"space-between",fontSize:10,padding:"3px 0",borderBottom:"1px solid #0a0f1c"}},e("span",{style:{color:"#475569"}},l),e("span",{style:{fontWeight:"bold"}},v))
        ),

        navPts.length>2&&e("div",{style:{marginTop:8}},

            e("line",{x1:pad,y1:cy(100000),x2:chartW-pad,y2:cy(100000),stroke:"#1a2540",strokeWidth:".5",strokeDasharray:"3,3"}),

            e("text",{x:chartW-pad,y:cy(100000)-4,textAnchor:"end",fontSize:7,fill:"#334155"},"$100K start")
          )
        )
      ),
      e("div",{className:"card"},
        e("div",{className:"card-title"},"PERFORMANCE",e("span",{className:"cfa-tag",style:{marginLeft:6}},"CFA L1")),
        [["Sharpe Ratio",sharpe.toFixed(3),sharpe>=1?"up":sharpe>=0.5?"wa":"dn"],
         ["Max Drawdown",(maxDD*100).toFixed(2)+"%","dn"],
         ["Win Rate",totalTrades>0?(winTrades/totalTrades*100).toFixed(0)+"%":"—",""],
         ["Total Trades",totalTrades,""],
        ].map(([l,v,cls])=>e("div",{key:l,style:{display:"flex",justifyContent:"space-between",fontSize:10,padding:"3px 0",borderBottom:"1px solid #0a0f1c"}},e("span",{style:{color:"#475569"}},l),e("span",{className:cls,style:{fontWeight:"bold"}},v)))
      )
    ),

    // Right: Positions + History
    e("div",null,
      e("div",{style:{display:"flex",gap:4,marginBottom:8}},
        ["positions","history"].map(t=>e("button",{key:t,className:"btn btn-xs"+(tab===t?" btn-p":""),onClick:()=>setPTab(t),style:{textTransform:"capitalize"}},t))
      ),

      tab==="positions"&&e("div",{className:"card"},
        e("div",{className:"card-title"},"POSITIONS ("+posCount+")"),
        posCount===0?e("div",{style:{color:"#475569",fontSize:11,padding:16,textAlign:"center"}},"No positions yet. Enter a ticker and click BUY to start."):
        e("div",{style:{overflowX:"auto"}},
          e("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:11}},
            e("thead",null,e("tr",{style:{borderBottom:"1px solid #1a2540"}},
              ["TICKER","SHARES","AVG COST","PRICE","MKT VALUE","P&L","P&L %","WT %"].map(h=>e("th",{key:h,style:{padding:"4px 6px",textAlign:"left",fontSize:9,color:"#334155",fontWeight:"bold"}},h))
            )),
            e("tbody",null,Object.entries(positions).sort((a,b)=>b[1].shares*(b[1].price||b[1].avgCost)-a[1].shares*(a[1].price||a[1].avgCost)).map(([tk,pos])=>{
              const mv=pos.shares*(pos.price||pos.avgCost);
              const pnl=(pos.price-pos.avgCost)*pos.shares;
              const pnlPct=pos.avgCost>0?((pos.price||pos.avgCost)/pos.avgCost-1)*100:0;
              const wt=nav>0?mv/nav*100:0;
              return e("tr",{key:tk,style:{borderBottom:"1px solid #06090f"}},
                e("td",{style:{padding:"5px 6px",fontWeight:"bold",color:"#818cf8"}},tk),
                e("td",{style:{padding:"5px 6px"}},pos.shares),
                e("td",{style:{padding:"5px 6px"}},"$"+pos.avgCost.toFixed(2)),
                e("td",{style:{padding:"5px 6px"}},"$"+(pos.price||pos.avgCost).toFixed(2)),
                e("td",{style:{padding:"5px 6px",fontWeight:"bold"}},"$"+mv.toFixed(0)),
                e("td",{style:{padding:"5px 6px",color:pnl>=0?"#1D9E75":"#ef4444",fontWeight:"bold"}},(pnl>=0?"+":"")+pnl.toFixed(2)),

        posCount>0&&e("div",{className:"info-box",style:{marginTop:8}},"Portfolio: "+posCount+" positions · $"+posVal.toFixed(0)+" invested · $"+cash.toFixed(0)+" cash ("+(cash/nav*100).toFixed(0)+"% cash)")
      ),

            ),

              e("span",{style:{fontWeight:"bold"}},"$"+tx.total.toFixed(0)),

            )
          ))

      ),

      // CFA concepts
      e("div",{className:"card"},
        e("div",{className:"card-title"},"CFA EXAM CONCEPTS IN PLAY",e("span",{className:"cfa-tag",style:{marginLeft:6}},"L1-L3")),
        e("div",{style:{fontSize:10,color:"#94a3b8",lineHeight:1.8}},
          "This paper trading account tracks concepts tested across CFA Levels I-III:",
          e("div",{style:{marginTop:6}},
            [["TWR vs MWR","L1","Time-weighted return measures strategy skill. Money-weighted measures your actual experience including timing."],
             ["Sharpe Ratio","L1","Your portfolio's excess return per unit of risk. Computed from your actual daily NAV changes."],
             ["Max Drawdown","L1","The worst peak-to-trough decline. Your pain tolerance in real numbers."],
             ["VWAC Cost Basis","L1","Volume-weighted average cost. Each buy updates this — critical for tax lot accounting."],
             ["Position Sizing","L3","Your weight per position reflects concentration risk. >10% in one stock = concentrated."],
             ["Realized vs Unrealized","L1","Selling crystallizes gains/losses. Unrealized P&L is mark-to-market, not yet taxable."],
            ].map(([concept,level,desc])=>e("div",{key:concept,style:{padding:"4px 0",borderBottom:"1px solid #0a0f1c"}},
              e("span",{style:{fontWeight:"bold",color:"#f1f5f9"}},concept),e("span",{className:"cfa-tag",style:{marginLeft:4}},level),

            ))

// Client-side BSM for instant feedback; backend for IV surface
function _normcdf(x){const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;const s=x<0?-1:1;x=Math.abs(x)/Math.sqrt(2);const t=1/(1+p*x);const y=1-((((a5*t+a4)*t+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);return 0.5*(1+s*y);}
function _normpdf(x){return Math.exp(-0.5*x*x)/Math.sqrt(2*Math.PI);}
function _bsm(S,K,T,r,sig,type){
  if(T<=0||sig<=0)return{price:Math.max(type==="call"?S-K:K-S,0),delta:type==="call"?1:-1,gamma:0,theta:0,vega:0,rho:0,pitm:type==="call"?(S>K?100:0):(K>S?100:0)};
  const d1=(Math.log(S/K)+(r+0.5*sig*sig)*T)/(sig*Math.sqrt(T));
  const d2=d1-sig*Math.sqrt(T);
  let price,delta,pitm;
  if(type==="call"){price=S*_normcdf(d1)-K*Math.exp(-r*T)*_normcdf(d2);delta=_normcdf(d1);pitm=_normcdf(d2)*100;}
  else{price=K*Math.exp(-r*T)*_normcdf(-d2)-S*_normcdf(-d1);delta=_normcdf(d1)-1;pitm=_normcdf(-d2)*100;}
  const gamma=_normpdf(d1)/(S*sig*Math.sqrt(T));
  const theta=-(S*_normpdf(d1)*sig)/(2*Math.sqrt(T))/365;
  const vega=S*_normpdf(d1)*Math.sqrt(T)/100;
  const rho=type==="call"?K*T*Math.exp(-r*T)*_normcdf(d2)/100:-K*T*Math.exp(-r*T)*_normcdf(-d2)/100;
  return{price,delta,gamma,theta,vega,rho,pitm};
}

function DerivativesSandbox({backendOk}){
  // Option pricer state
  const[spot,setSpot]=useState(250);
  const[strike,setStrike]=useState(260);
  const[tte,setTte]=useState(0.25);
  const[vol,setVol]=useState(0.30);
  const[rate,setRate]=useState(0.043);
  const[optType,setOptType]=useState("call");
  const[ticker,setTicker]=useState("AAPL");
  const[fetchingPrice,setFetchingPrice]=useState(false);

  // Strategy state
  const[strat,setStrat]=useState("covered_call");
  const STRATS=[
    {id:"covered_call",l:"Covered Call",desc:"Own stock + sell call. Income strategy, caps upside."},
    {id:"protective_put",l:"Protective Put",desc:"Own stock + buy put. Portfolio insurance."},
    {id:"collar",l:"Collar",desc:"Own stock + buy put + sell call. Zero-cost hedge."},
    {id:"bull_call_spread",l:"Bull Call Spread",desc:"Buy lower call + sell higher call. Defined-risk bullish."},
    {id:"bear_put_spread",l:"Bear Put Spread",desc:"Buy higher put + sell lower put. Defined-risk bearish."},
    {id:"straddle",l:"Straddle",desc:"Buy call + put at same strike. Bet on big move, any direction."},
    {id:"strangle",l:"Strangle",desc:"Buy OTM call + OTM put. Cheaper vol bet, wider breakevens."},
  ];

  // Compute option price locally
  const opt=useMemo(()=>_bsm(spot,strike,tte,rate,vol,optType),[spot,strike,tte,rate,vol,optType]);
  const intrinsic=optType==="call"?Math.max(spot-strike,0):Math.max(strike-spot,0);

  // Compute strategy payoff locally
  const payoff=useMemo(()=>{
    const prices=[];for(let p=spot*0.7;p<=spot*1.3;p+=spot*0.006)prices.push(p);
    const callK=Math.round(spot*1.05*100)/100;
    const putK=Math.round(spot*0.95*100)/100;
    const c=_bsm(spot,callK,tte,rate,vol,"call");
    const p2=_bsm(spot,putK,tte,rate,vol,"put");
    const atm=_bsm(spot,spot,tte,rate,vol,"call");
    const atmP=_bsm(spot,spot,tte,rate,vol,"put");

    let curve,maxP,maxL,be,desc,legs;
    if(strat==="covered_call"){
      curve=prices.map(p=>(Math.min(p,callK)-spot)*100+c.price*100);
      maxP=(callK-spot)*100+c.price*100;maxL=-(spot-c.price)*100;be=[spot-c.price];
      desc="Sell a "+callK+" call for $"+c.price.toFixed(2)+"/share. You collect premium but cap upside at $"+callK+".";
      legs=[{t:"Stock",s:"Long",k:"-",prem:spot.toFixed(2)},{t:"Call",s:"Short",k:callK,prem:c.price.toFixed(2)}];
    }else if(strat==="protective_put"){
      curve=prices.map(p=>(Math.max(p,putK)-spot)*100-p2.price*100);
      maxP=999999;maxL=-(spot-putK+p2.price)*100;be=[spot+p2.price];
      desc="Buy a "+putK+" put for $"+p2.price.toFixed(2)+"/share. Floor your losses at $"+putK+" but pay premium.";
      legs=[{t:"Stock",s:"Long",k:"-",prem:spot.toFixed(2)},{t:"Put",s:"Long",k:putK,prem:p2.price.toFixed(2)}];
    }else if(strat==="collar"){
      const net=c.price-p2.price;
      curve=prices.map(p=>(Math.min(Math.max(p,putK),callK)-spot)*100+net*100);
      maxP=(callK-spot+net)*100;maxL=-(spot-putK-net)*100;be=[spot-net];
      desc="Buy "+putK+" put ($"+p2.price.toFixed(2)+"), sell "+callK+" call ($"+c.price.toFixed(2)+"). Net cost: $"+(p2.price-c.price).toFixed(2)+"/share.";
      legs=[{t:"Stock",s:"Long",k:"-",prem:spot.toFixed(2)},{t:"Put",s:"Long",k:putK,prem:p2.price.toFixed(2)},{t:"Call",s:"Short",k:callK,prem:c.price.toFixed(2)}];
    }else if(strat==="bull_call_spread"){
      const lc=_bsm(spot,putK,tte,rate,vol,"call");const sc=_bsm(spot,callK,tte,rate,vol,"call");const nd=lc.price-sc.price;
      curve=prices.map(p=>(Math.min(Math.max(p-putK,0),callK-putK)-nd)*100);
      maxP=(callK-putK-nd)*100;maxL=-nd*100;be=[putK+nd];
      desc="Buy "+putK+" call ($"+lc.price.toFixed(2)+"), sell "+callK+" call ($"+sc.price.toFixed(2)+"). Net debit: $"+nd.toFixed(2)+"/share.";
      legs=[{t:"Call",s:"Long",k:putK,prem:lc.price.toFixed(2)},{t:"Call",s:"Short",k:callK,prem:sc.price.toFixed(2)}];
    }else if(strat==="bear_put_spread"){
      const lp=_bsm(spot,callK,tte,rate,vol,"put");const sp=_bsm(spot,putK,tte,rate,vol,"put");const nd=lp.price-sp.price;
      curve=prices.map(p=>(Math.min(Math.max(callK-p,0),callK-putK)-nd)*100);
      maxP=(callK-putK-nd)*100;maxL=-nd*100;be=[callK-nd];
      desc="Buy "+callK+" put ($"+lp.price.toFixed(2)+"), sell "+putK+" put ($"+sp.price.toFixed(2)+"). Net debit: $"+nd.toFixed(2)+"/share.";
      legs=[{t:"Put",s:"Long",k:callK,prem:lp.price.toFixed(2)},{t:"Put",s:"Short",k:putK,prem:sp.price.toFixed(2)}];
    }else if(strat==="straddle"){
      const tp=atm.price+atmP.price;
      curve=prices.map(p=>(Math.max(p-spot,0)+Math.max(spot-p,0)-tp)*100);
      maxP=999999;maxL=-tp*100;be=[spot-tp,spot+tp];
      desc="Buy ATM call ($"+atm.price.toFixed(2)+") + ATM put ($"+atmP.price.toFixed(2)+"). Total cost: $"+tp.toFixed(2)+"/share. Profit if stock moves more than $"+tp.toFixed(2)+" in either direction.";
      legs=[{t:"Call",s:"Long",k:spot,prem:atm.price.toFixed(2)},{t:"Put",s:"Long",k:spot,prem:atmP.price.toFixed(2)}];
    }else{
      const tp=c.price+p2.price;
      curve=prices.map(p=>(Math.max(p-callK,0)+Math.max(putK-p,0)-tp)*100);
      maxP=999999;maxL=-tp*100;be=[putK-tp,callK+tp];
      desc="Buy "+callK+" call ($"+c.price.toFixed(2)+") + "+putK+" put ($"+p2.price.toFixed(2)+"). Total cost: $"+tp.toFixed(2)+"/share.";
      legs=[{t:"Call",s:"Long",k:callK,prem:c.price.toFixed(2)},{t:"Put",s:"Long",k:putK,prem:p2.price.toFixed(2)}];
    }
    return{prices,curve,maxP,maxL,be,desc,legs};
  },[spot,strike,tte,rate,vol,strat]);

  // Fetch live price for ticker
  const fetchSpot=async()=>{
    if(!ticker)return;setFetchingPrice(true);
    try{
      if(backendOk){
        const r=await apiFetch("/api/derivatives/price",{spot:100,strike:100,tte:0.25,volatility:0.3,option_type:"call"});
        // Just testing backend - use yfinance via a dedicated endpoint would be better
      }
      // For now, use the ASSETS data if available
      const a=ASSETS.find(x=>x.id===ticker.toUpperCase());
      if(a&&a.mktCap){/* we don't have live price in ASSETS easily */}
    }catch(e){}
    setFetchingPrice(false);
  };

  // Payoff SVG chart
  const chartW=500,chartH=200,pad=40;
  const minP=payoff.prices[0],maxPr=payoff.prices[payoff.prices.length-1];
  const minY=Math.min(...payoff.curve,-100),maxY=Math.max(...payoff.curve,100);
  const px=v=>pad+(v-minP)/(maxPr-minP)*(chartW-pad*2);
  const py=v=>chartH-pad-(v-minY)/(maxY-minY||1)*(chartH-pad*2);

  return e("div",null,
    e("div",{className:"deriv-grid"},

            e("div",{key,className:"deriv-input"},

              e("div",{style:{fontSize:12,fontWeight:"bold",color:"#cbd5e1",padding:"4px 0"}},val)
            )

            e("div",{className:"deriv-lbl"},"VOLATILITY"),
            e("input",{type:"range",min:5,max:100,value:Math.round(vol*100),onChange:ev=>setVol(ev.target.value/100),style:{width:"100%",accentColor:"#6366f1"}}),
          ),
          e("div",{style:{fontSize:18,fontWeight:"bold",color:optType==="call"?"#1D9E75":"#ef4444",textAlign:"center",margin:"10px 0"}},"$"+opt.price.toFixed(2),
            e("div",{style:{fontSize:10,color:"#475569",fontWeight:"normal"}},"Intrinsic $"+intrinsic.toFixed(2)+" + Time $"+(opt.price-intrinsic).toFixed(2))
          ),
          e("div",{style:{fontSize:10,color:"#475569",textAlign:"center"}},"P(ITM): "+opt.pitm.toFixed(1)+"% · P(OTM): "+(100-opt.pitm).toFixed(1)+"%")
        ),
        e("div",{className:"card"},
          e("div",{className:"card-title"},"THE GREEKS",e("span",{className:"cfa-tag",style:{marginLeft:6}},"CFA L2")),
          e("div",{className:"greek-grid"},
            [["Δ",opt.delta.toFixed(3),"Delta","Price sensitivity"],["Γ",opt.gamma.toFixed(5),"Gamma","Delta sensitivity"],["Θ",opt.theta.toFixed(3),"Theta","Daily decay"],["V","$"+(opt.vega).toFixed(3),"Vega","Vol sensitivity"],["ρ",opt.rho.toFixed(3),"Rho","Rate sensitivity"]].map(([sym,val,name,tip])=>
              e("div",{key:name,className:"greek-box",title:tip},e("div",{className:"greek-sym"},sym),e("div",{className:"greek-val"},val),e("div",{className:"greek-name"},name))
            )
          )
        )
      ),
      // Right panel: Strategy Sandbox
      e("div",null,
        e("div",{className:"card"},
          e("div",{className:"card-title"},"STRATEGY SANDBOX",e("span",{className:"cfa-tag",style:{marginLeft:6}},"CFA L3")),

            STRATS.map(s=>e("button",{key:s.id,className:"strat-btn"+(strat===s.id?" active":""),onClick:()=>setStrat(s.id),title:s.desc},s.l))
          ),
          e("div",{style:{fontSize:11,color:"#94a3b8",lineHeight:1.6,marginBottom:10,padding:"8px 10px",background:"#06090f",borderRadius:6}},payoff.desc),
          // Payoff chart
          e("div",{style:{overflowX:"auto"}},
            e("svg",{width:"100%",viewBox:"0 0 "+chartW+" "+chartH,style:{display:"block"}},
              // Zero line
              e("line",{x1:pad,y1:py(0),x2:chartW-pad,y2:py(0),stroke:"#1a2540",strokeWidth:"1",strokeDasharray:"4,4"}),
              // Axes
              e("line",{x1:pad,y1:pad,x2:pad,y2:chartH-pad,stroke:"#1a2540",strokeWidth:".5"}),
              e("line",{x1:pad,y1:chartH-pad,x2:chartW-pad,y2:chartH-pad,stroke:"#1a2540",strokeWidth:".5"}),
              // Spot price vertical
              e("line",{x1:px(spot),y1:pad,x2:px(spot),y2:chartH-pad,stroke:"#818cf8",strokeWidth:"1",strokeDasharray:"3,3"}),
              e("text",{x:px(spot),y:pad-4,textAnchor:"middle",fontSize:8,fill:"#818cf8"},"Spot $"+spot),
              // Payoff curve
              e("polyline",{points:payoff.prices.map((p,i)=>px(p)+","+py(payoff.curve[i])).join(" "),fill:"none",stroke:payoff.curve[payoff.curve.length-1]>0?"#1D9E75":"#ef4444",strokeWidth:"2"}),
              // Fill profit area
              e("polygon",{points:[...payoff.prices.map((p,i)=>payoff.curve[i]>0?px(p)+","+py(payoff.curve[i]):"").filter(Boolean),px(payoff.prices[payoff.prices.length-1])+","+py(0),px(payoff.prices[0])+","+py(0)].join(" "),fill:"rgba(29,158,117,0.08)"}),
              // Breakeven markers
              ...payoff.be.map((b,i)=>e("circle",{key:i,cx:px(b),cy:py(0),r:4,fill:"#f59e0b",stroke:"#05080f",strokeWidth:"1"})),
              ...payoff.be.map((b,i)=>e("text",{key:"t"+i,x:px(b),y:py(0)+14,textAnchor:"middle",fontSize:8,fill:"#f59e0b"},"BE $"+b.toFixed(0))),
              // Labels
              e("text",{x:chartW/2,y:chartH-4,textAnchor:"middle",fontSize:8,fill:"#475569"},"Underlying Price at Expiration"),
              e("text",{x:8,y:chartH/2,textAnchor:"middle",fontSize:8,fill:"#475569",transform:"rotate(-90 8 "+(chartH/2)+")"},"P&L ($)")
            )
          ),
          // Strategy legs table
          e("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:10,marginTop:8}},
            e("thead",null,e("tr",{style:{borderBottom:"1px solid #1a2540"}},

            [["Max Profit",payoff.maxP>=999999?"Unlimited":"$"+payoff.maxP.toFixed(0),payoff.maxP>0],
             ["Max Loss","$"+payoff.maxL.toFixed(0),false],
             ["Breakeven",payoff.be.map(b=>"$"+b.toFixed(2)).join(" / "),""],
             ["Risk/Reward",payoff.maxP>=999999?"∞":(Math.abs(payoff.maxP/payoff.maxL)||0).toFixed(2)+"x",""],
            ].map(([l,v,pos])=>e("div",{key:l,className:"payoff-stat"},e("span",{className:"data-key"},l),e("span",{className:"data-val "+(pos===true?"up":pos===false?"dn":"")},v)))
          ),
          e("div",{className:"card"},
            e("div",{className:"card-title"},"CFA EXAM CONCEPTS"),
            e("div",{style:{fontSize:10,color:"#94a3b8",lineHeight:1.8}},
              strat==="covered_call"?"Covered call = long stock + short call. Max profit when stock closes at strike. You sacrifice upside for income (theta collection). Tested on CFA L3 — know the payoff diagram shape and when to use it.":
              strat==="protective_put"?"Protective put = long stock + long put. Floor on losses, unlimited upside. Cost is the put premium (theta drag). Think of it as portfolio insurance. CFA L3 tests cost-benefit analysis.":
              strat==="collar"?"Collar = long stock + long put + short call. The call premium funds the put. If net premium ≈ 0, it's a 'zero-cost collar.' Know: you give up upside beyond call strike. CFA L3 favorite.":
              strat==="bull_call_spread"?"Bull call spread = long lower-strike call + short higher-strike call. Defined risk + defined reward. Net debit strategy. CFA L2/L3 tests: max profit = strike diff minus debit, max loss = debit paid.":
              strat==="bear_put_spread"?"Bear put spread = long higher-strike put + short lower-strike put. Bearish defined-risk. Net debit. Mirror of bull call spread. Max profit = strike diff minus debit.":
              strat==="straddle"?"Long straddle = long call + long put at same strike. Pure volatility bet — you profit if the stock moves MORE than the total premium in either direction. CFA tests: know that this is delta-neutral at entry.":
              "Long strangle = long OTM call + long OTM put. Cheaper than straddle but needs a bigger move. Two breakevens. CFA tests: compare cost/breakevens to straddle."
            )
          )
        )
      )
    )
  );
}

function LoginGate({children}){
  const[user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem("qx_user"));}catch(e){return null;}});
  const[name,setName]=useState("");
  const[email,setEmail]=useState("");
  const[pass,setPass]=useState("");
  const[mode,setMode]=useState("login"); // login, signup, guest
  const[showForm,setShowForm]=useState(false);

  useEffect(()=>{
    if(!showForm)return;
    const h=ev=>{if(ev.key==="Escape")setShowForm(false);};
    const prev=document.body.style.overflow;
    document.body.style.overflow="hidden";
    document.addEventListener("keydown",h);
    return()=>{
      document.body.style.overflow=prev;
      document.removeEventListener("keydown",h);
    };
  },[showForm]);

  const save=(u)=>{localStorage.setItem("qx_user",JSON.stringify(u));setUser(u);};

  if(user)return typeof children==="function"?children(user,()=>{localStorage.removeItem("qx_user");setUser(null);}):children;

  const submit=()=>{
    if(mode==="signup"&&!name.trim())return;
    if(!email.trim())return;
    save({name:name.trim()||email.split("@")[0],email:email.trim(),joined:new Date().toISOString(),plan:"free"});
  };
  const guest=()=>save({name:"Guest",email:"guest@quantex.app",joined:new Date().toISOString(),plan:"guest"});

  return e(React.Fragment,null,
    e("div",{className:"landing-wrap"},
      e("button",{className:"landing-signin-topright",onClick:()=>{setMode("login");setShowForm(true);}},"Sign in"),
      e("div",{className:"landing-container"},
        e("div",{className:"landing-hero"},
          e("div",{className:"landing-brand"},"Quantex"),
          e("div",{className:"landing-headline"},"Portfolio analysis with driver modes"),
          e("div",{className:"landing-tag"},"Quantitative rigor. Qualitative judgment. Both in one tool.")

            e("div",{className:"value-icon"},"🟢"),
            e("div",{className:"value-title"},"Beginner Mode"),
            e("div",{className:"value-body"},"Guided portfolio analysis in plain language. Learn what your numbers mean without a finance degree.")
          ),
          e("div",{className:"value-card"},
            e("div",{className:"value-icon"},"🟡"),
            e("div",{className:"value-title"},"Track Mode"),
            e("div",{className:"value-body"},"Real portfolio tools — correlations, optimization, risk metrics — with fundamental and technical analysis explained through CFA and MBA curricula.")
          ),
          e("div",{className:"value-card"},
            e("div",{className:"value-icon"},"🔴"),
            e("div",{className:"value-title"},"Full Pro Mode"),
            e("div",{className:"value-body"},"Professional analysis: Ledoit-Wolf shrinkage, stress testing, efficient frontiers, fundamental and technical indicators, strategic context. Full depth on demand.")
          )
        ),
        e("div",{className:"landing-cta"},
          e("button",{className:"landing-signup-btn",onClick:()=>{setMode("signup");setShowForm(true);}},"Sign Up Free"),
          e("button",{className:"landing-guest-link",onClick:guest},"Try as guest first")
        ),
        e("div",{className:"landing-footer"},"Quantex — educational tool, not investment advice")
      )
    ),
    showForm&&e("div",{onClick:()=>setShowForm(false),style:{position:"fixed",inset:0,background:"rgba(0,0,0,.72)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
      e("div",{onClick:ev=>ev.stopPropagation(),style:{position:"relative"}},
        e("button",{onClick:()=>setShowForm(false),title:"Close (Esc)",style:{position:"absolute",top:10,right:12,background:"none",border:"none",color:"#94a3b8",fontSize:20,cursor:"pointer",padding:"2px 8px",lineHeight:1,zIndex:2}},"✕"),
        e("div",{className:"login-card"},
          e("div",{className:"login-logo"},"QUANTEX"),
          e("div",{className:"login-sub"},"Portfolio Intelligence Platform",e("br",null),"CFA Exam Prep · Paper Trading · AI Advisory"),
          mode==="signup"&&e("input",{className:"login-field",placeholder:"Full Name",value:name,onChange:ev=>setName(ev.target.value)}),
          e("input",{className:"login-field",placeholder:"Email",type:"email",value:email,onChange:ev=>setEmail(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&submit()}),
          e("input",{className:"login-field",placeholder:"Password",type:"password",value:pass,onChange:ev=>setPass(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&submit()}),
          e("button",{className:"login-btn",onClick:submit},mode==="signup"?"Create Account":"Sign In"),

// ── Factor Sliders ───────────────────────────────────────────────────────────
function FactorSliders({weights,onChange,goal}){
  const FACTORS=[
    {id:"momentum",label:"Momentum",desc:"Recent price trend strength and consistency"},
    {id:"quality",label:"Quality",desc:"Risk-adjusted return quality (Sharpe ratio)"},
    {id:"value",label:"Value",desc:"Valuation relative to earnings and growth"},
    {id:"low_vol",label:"Low Volatility",desc:"Preference for lower-risk assets"},
    {id:"yield",label:"Dividend Yield",desc:"Income generation from dividends"},
  ];
  const total=Object.values(weights).reduce((a,b)=>a+b,0);
  return e("div",{className:"factor-panel"},
    e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
      e("div",{className:"card-title",style:{margin:0}},"FACTOR WEIGHTS",e("span",{className:"cfa-tag",style:{marginLeft:6}},"Customize")),
      e("div",{style:{fontSize:9,color:Math.abs(total-100)<1?"#34d399":"#f87171",fontWeight:700}},Math.round(total)+"%")
    ),
    FACTORS.map(f=>e("div",{key:f.id},
      e("div",{className:"factor-row"},
        e("div",{className:"factor-name"},f.label),
        e("input",{className:"factor-slider",type:"range",min:0,max:50,value:Math.round((weights[f.id]||0)*100),onChange:ev=>{
          const newW={...weights,[f.id]:ev.target.value/100};
          const sum=Object.values(newW).reduce((a,b)=>a+b,0);
          if(sum>0){const norm={};Object.keys(newW).forEach(k=>norm[k]=newW[k]/sum);onChange(norm);}
        }}),
        e("div",{className:"factor-pct"},Math.round((weights[f.id]||0)*100)+"%")
      ),
      e("div",{className:"factor-desc"},f.desc)
    )),
    e("button",{className:"btn btn-xs",style:{marginTop:4},onClick:()=>{
      const defaults={Growth:{momentum:.35,quality:.25,value:.15,low_vol:.10,yield:.15},Income:{momentum:.10,quality:.20,value:.15,low_vol:.20,yield:.35},Preservation:{momentum:.10,quality:.25,value:.15,low_vol:.35,yield:.15},Balanced:{momentum:.20,quality:.25,value:.20,low_vol:.20,yield:.15}};
      onChange(defaults[goal]||defaults.Balanced);
    }},"↺ Reset to "+goal+" defaults")
  );
}

// ── Course Hub ───────────────────────────────────────────────────────────────
function CourseHub({profile,ports,activePort}){
  const[activeMod,setActiveMod]=useState(0);
  const[activeSection,setActiveSection]=useState("reading");
  const[quizState,setQuizState]=useState({});
  const[progress,setProgress]=useState(()=>{try{return JSON.parse(localStorage.getItem("qx_course")||"{}") }catch(e){return{};}});
  useEffect(()=>{try{localStorage.setItem("qx_course",JSON.stringify(progress));}catch(e){}},[progress]);

  const markRead=(modId,section)=>{
    setProgress(prev=>{const p={...prev};if(!p[modId])p[modId]={};p[modId][section]=true;return p;});
  };

  const MODULES=[
    {id:"ethics",level:"L1",title:"Ethics and Professional Standards",topic:"Ethics",
     reading:{title:"Ethics and Professional Standards",content:"<h3>Reading Coming in Next Batch</h3>The full reading for this module is being prepared separately. For now, proceed to the Quiz tab (15 questions) to test your knowledge of the CFA Code of Ethics and Standards of Professional Conduct."},
     quiz:[
       {q:"Which statement is MOST accurate regarding the CFA Institute Code of Ethics?",opts:["Members may prioritize personal interests when legally permitted","Members must place client interests above their own but below employer interests","Members are expected to maximize client returns regardless of risk tolerance","Members must place the integrity of the profession and client interests above personal interests"],correct:3,explain:"The Code explicitly requires placing the integrity of the investment profession and client interests above personal interests — both rank above the member's own. The trap in B inserts employer interests ahead of clients, but Standard III.A makes clients paramount even over employers."},
       {q:"A CFA charterholder works in a jurisdiction where local law permits front-running, but the CFA Code prohibits it. What should the charterholder do?",opts:["Follow local law since the Code defers to jurisdictional regulations","Follow the stricter of the two — the CFA Code","Choose whichever approach maximizes client outcomes","Seek written permission from the employer to front-run"],correct:1,explain:"Standard I(A) Knowledge of the Law requires members to comply with the more strict of applicable law or the Code when no conflict of law exists. The trap in A is assuming local law always wins; the Code overrides weaker local rules."},
