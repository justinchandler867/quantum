       {q:"Which of the following BEST distinguishes the three main VaR calculation methods?",opts:["Parametric uses σ × z-score from an assumed distribution; historical replays past returns; Monte Carlo simulates scenarios from a specified stochastic model","All three methods produce identical VaR estimates when the portfolio is diversified","Historical simulation requires substantially more computing power than Monte Carlo","Parametric VaR is the only method that accounts for fat tails"],correct:0,explain:"Parametric (variance-covariance) VaR is fast and analytic but WRONG under non-normality. Historical simulation captures realized past behavior including nonlinearities but only events that actually happened in the window. Monte Carlo is flexible enough to model jumps, regime switches, and fat tails but is compute-heavy and model-dependent. Trap B is false — the methods diverge exactly when it matters (crisis periods, fat tails). Trap C reverses compute load — MC is the heavier method. Trap D is backwards: parametric (normal) IGNORES fat tails, which is its main weakness."},
       {q:"A portfolio's 1-day VaR₉₅ is $10,000. Under the square-root-of-time rule, the 10-day VaR₉₅ is approximately:",opts:["$100,000","$31,623","$10,000","$3,162"],correct:1,explain:"Under the square-root-of-time rule, VaR scales with √T because standard deviation scales with √T for i.i.d. returns: σ_T = σ_1 × √T. VaR_10d = VaR_1d × √10 = 10,000 × 3.162 ≈ $31,623. Trap A ($100,000) multiplies by T linearly — correct for variance or total expected return, but VaR is a σ-like quantity. Trap C fails to scale at all. Trap D inverts the formula (divides instead of multiplies). The rule assumes i.i.d. returns and breaks down under autocorrelation, volatility clustering, or mean-reversion — all of which are empirically present in asset returns."},
       {q:"A bank uses a 99% 1-day VaR model and observes 12 VaR breaches (exceedances) over the past 250 trading days. This result is:",opts:["Consistent with expectations — approximately the expected number of breaches","Better than expected — fewer breaches means a conservative model","Irrelevant — VaR models don't require backtesting","Well above the ~2-3 breaches expected under a correctly calibrated 99% VaR model; the model likely UNDERSTATES tail risk and should be recalibrated (Basel traffic-light framework places 10+ breaches in the 'red' zone)"],correct:3,explain:"A correctly calibrated 99% VaR expects 1% breach frequency = 2.5 breaches per 250 trading days (the Kupiec unconditional coverage test). Twelve breaches is ~5× the expected rate — strong evidence the model understates tail risk. The Basel traffic-light framework: green (0-4 breaches, multiplier 3.0), yellow (5-9, multipliers 3.4-3.85), red (10+, multiplier 4.0 and model rejection). Trap A misreads the expected frequency. Trap B reverses the judgment — this bank has TOO MANY breaches, not too few. Trap C is false: regulators require regular backtesting."},
       {q:"Marginal VaR (MVaR) of a position within a portfolio measures:",opts:["The total VaR of the portfolio excluding this position","The expected loss under a stress scenario","The change in portfolio VaR per unit change in that position's weight (∂VaR/∂w_i)","The standard deviation of the position's returns"],correct:2,explain:"MVaR = ∂VaR/∂w_i captures the sensitivity of portfolio VaR to a small change in position i's weight — the risk contribution of the NEXT dollar added to the position. Component VaR (CVaR_i = MVaR_i × w_i) decomposes total portfolio VaR additively: Σ CVaR_i = Portfolio VaR. Together they are the standard tools for identifying which positions drive portfolio risk and allocating risk budgets. Trap A describes an 'incremental VaR by exclusion' metric, not MVaR. Trap B describes stress-test output. Trap D is the position's standalone σ, ignoring portfolio context (correlations), which is precisely what MVaR is designed to incorporate."},
       {q:"Stress testing is typically used ALONGSIDE VaR because:",opts:["Stress tests always produce lower loss estimates than VaR","Stress tests can capture extreme, low-probability scenarios (e.g., 1987 Black Monday, 2008 crisis, March 2020 COVID) that historical or parametric VaR models may miss","Stress tests use the same distributional assumptions as parametric VaR","VaR models have been banned by regulators"],correct:1,explain:"Stress testing asks 'what if this specific extreme scenario occurred?' — applying historical crises (1987 crash, 1998 LTCM/Russia, 2008 GFC, 2020 COVID) or hypothetical scenarios (rates +200bp, equity −30%, correlations → 1) to the current portfolio. Unlike VaR, stress tests aren't probability-weighted — they focus on severity conditional on a scenario, complementing VaR's frequency view. Fed CCAR and Basel regulatory frameworks require both. Trap A reverses direction — stress tests typically produce HIGHER losses than VaR (that's the point). Trap C is false — stress tests are scenario-based, not distributional. Trap D is factually wrong."},
       {q:"A risk measure ρ is said to be 'subadditive' if for any two portfolios A and B:",opts:["ρ(A + B) ≤ ρ(A) + ρ(B), reflecting the benefit of diversification","ρ(A + B) ≥ ρ(A) + ρ(B)","ρ(A + B) = ρ(A) × ρ(B)","ρ(A + B) = ρ(A) − ρ(B)"],correct:0,explain:"Subadditivity says combining portfolios can only REDUCE (or at best preserve) risk — a formal expression of diversification benefit. It is one of the four Artzner-Delbaen-Eber-Heath axioms for a COHERENT risk measure (monotonicity, subadditivity, positive homogeneity, translation invariance). CVaR (Expected Shortfall) is coherent; VaR is NOT — VaR can violate subadditivity, so combining two portfolios can paradoxically INCREASE VaR. This is a central theoretical argument for CVaR over VaR in modern regulatory frameworks (Basel III's shift from VaR to Expected Shortfall). Trap B reverses the inequality. Traps C and D describe meaningless relations for risk measures."},
       {q:"Liquidity-adjusted VaR (LVaR) modifies standard VaR by:",opts:["Using a longer confidence interval","Excluding illiquid positions entirely","Assuming all positions can be sold instantly at mid-market","Adding the expected cost of unwinding positions (bid-ask spread, market impact) over the assumed liquidation horizon"],correct:3,explain:"Standard VaR assumes positions can be exited at mid-market prices at the end of the holding period — an assumption that breaks down during stress when bid-ask spreads widen dramatically (2008 corporate bonds, 2020 Treasury-market dislocation, 2022 LDI-crisis gilt selling). LVaR adds an explicit liquidity-cost component: LVaR = VaR + 0.5 × Position × (spread + market-impact), often extended with a longer liquidation horizon for illiquid assets. Trap A confuses confidence level with liquidity adjustment. Trap B is the opposite — LVaR INCLUDES illiquid positions with an adjustment, rather than excluding them. Trap C describes the naïve VaR assumption that LVaR explicitly corrects."},
       {q:"A parametric VaR model using a normal distribution systematically UNDERSTATES true tail risk primarily because:",opts:["Normal distributions are computationally unstable","Parametric VaR always overstates risk by ignoring correlations","Asset returns have fatter tails (kurtosis > 3) than the normal distribution, so extreme losses occur more often than the normal assumes","Portfolio volatility can never be estimated accurately"],correct:2,explain:"Empirical asset returns exhibit EXCESS KURTOSIS (fatter tails than normal), NEGATIVE SKEW, and volatility clustering — features the normal distribution cannot represent. Events that would be 'essentially impossible' under normality (1987's Black Monday was ~22σ under then-current normal assumptions) occur far more often than the normal model predicts. Remedies include: t-distributions or GED for fat tails, extreme value theory (EVT) fit to the tail only, historical simulation, or Monte Carlo with fat-tailed shocks. Trap A is false — the normal is the most computationally tractable distribution, not unstable. Trap B reverses the direction (parametric normal typically UNDERstates, not overstates). Trap D overstates the estimation problem."},
       {q:"Decomposing portfolio VaR into contributions by RISK FACTOR (rather than by position) is MOST useful for:",opts:["Computing exact trade tickets to rebalance","Identifying which market drivers (rates, equity, credit spreads, FX) carry the most risk, enabling hedging decisions at the factor level rather than the position level","Replacing VaR with tracking error","Satisfying accounting requirements"],correct:1,explain:"Factor-based decomposition (Barra, Axioma, or internal multi-factor models) expresses each position's exposure as a bundle of factor sensitivities (βs to rates, equity, credit, FX, commodity, style factors), then aggregates VaR contributions by factor. This is far more actionable for hedging: if rates contribute 60% of portfolio VaR, a rates hedge (futures, swaps) addresses the problem more cheaply than selling individual positions. Position-level and factor-level decompositions are complements, not substitutes. Trap A confuses risk attribution with execution. Trap C is unrelated — tracking error is a different metric entirely. Trap D is not a primary driver of risk decomposition."},
     ]},
    {id:"derivatives",level:"L2",title:"Options Pricing",topic:"Derivatives",
     reading:{title:"Black-Scholes and the Greeks",content:"<h3>Black-Scholes-Merton Model</h3>\n\n<h4>C = S₀N(d₁) − Ke^(−rT)N(d₂)</h4>\n\nFive inputs determine an option's price: spot price (S), strike price (K), time to expiration (T), risk-free rate (r), and volatility (σ). Of these, volatility is the only one not directly observable — it must be estimated or implied from market prices.\n\n<h3>The Greeks</h3>\n\nDelta (Δ): How much the option price changes per $1 move in the stock. A call with Δ = 0.60 gains $0.60 when the stock rises $1.\n\nGamma (Γ): How fast delta changes. High gamma means delta is unstable — the option's behavior changes rapidly near the strike.\n\nTheta (Θ): Daily time decay. All else equal, options lose value every day. Theta accelerates as expiration approaches.\n\nVega (V): Sensitivity to implied volatility. A vega of $0.15 means the option gains $0.15 for each 1% increase in IV.\n\nRho (ρ): Sensitivity to interest rates. Usually small, but matters for LEAPS.\n\n<h3>Try It in Quantex</h3>\n\nThe Derivatives tab has a live Black-Scholes calculator. Adjust the inputs and watch how each Greek responds. The Strategy Sandbox lets you build covered calls, protective puts, straddles, and more with real-time payoff diagrams."},
     quiz:[
       {q:"Which Greek measures the rate of change of delta?",opts:["Gamma","Vega","Theta","Rho"],correct:0,explain:"Gamma = ∂Δ/∂S = ∂²C/∂S². It measures how quickly delta changes as the stock moves. High gamma near the strike means the option's behavior is most sensitive there."},
       {q:"A call option has theta of -$0.05. What happens overnight (all else equal)?",opts:["The option loses $0.05","The option gains $0.05","Nothing changes","Delta increases"],correct:0,explain:"Theta represents daily time decay. A theta of -$0.05 means the option loses $0.05 per day from the passage of time alone."},
       {q:"Which input to Black-Scholes is NOT directly observable?",opts:["Volatility","Stock price","Strike price","Risk-free rate"],correct:0,explain:"Volatility must be estimated or implied from market prices. All other inputs (S, K, T, r) are known quantities."},
       {q:"In a covered call, what is your maximum profit?",opts:["(Strike − Stock Price) + Premium","Unlimited","Premium collected only","Strike price"],correct:0,explain:"Max profit = (K − S) + premium. You own the stock (gains up to strike) plus the premium collected. Upside is capped at the strike."},
       {q:"A European CALL option is deep in-the-money (stock $150, strike $100, 1 month to expiration). Its delta is MOST LIKELY:",opts:["Near 0 — deep ITM calls lose sensitivity to further price moves","Near +1.0 — deep ITM calls behave almost like the underlying stock","Near −1.0 — deep ITM calls have inverted sensitivity","Exactly 0.5 — all calls have delta of 0.5 regardless of moneyness"],correct:1,explain:"A deep ITM call has delta approaching +1.0 — it moves almost dollar-for-dollar with the stock because its payoff at expiration is essentially guaranteed to be (S − K). Delta progression for a CALL: deep OTM ≈ 0 → ATM ≈ 0.5 → deep ITM ≈ 1.0. (For a PUT, the range is −1.0 to 0.) Trap A reverses the sensitivity relationship — deep ITM is the MOST stock-like, not the least. Trap C applies the put's negative-delta range to a call. Trap D ignores moneyness entirely; delta varies continuously with S/K. A useful heuristic: delta ≈ N(d₁) in BSM is the risk-neutral probability the call ends ITM."},
       {q:"A European call and put share strike $100 and expire in 1 year. The stock trades at $105, risk-free rate is 0% (for simplicity), and the call costs $10. By put-call parity, the put's fair price is:",opts:["$5","$15","$10","$0"],correct:0,explain:"Put-call parity for European options: C + PV(K) = P + S. With r = 0, PV(K) = K, so P = C + K − S = 10 + 100 − 105 = $5. This relationship is pure no-arbitrage — if violated, synthetic positions could be assembled more cheaply than the real ones, locking in risk-free profit. Trap B ($15) is a SIGN ERROR on K and S: C − K + S = 10 − 100 + 105 = 15. Trap C reports the call price unchanged. Trap D assumes the put is worthless because the call is ITM, but parity requires a positive put price whenever volatility > 0. Parity holds for European options; American options only satisfy an inequality because of early-exercise optionality."},
       {q:"A trader buys both a call AND a put with the same strike (ATM) and same expiration. This 'long straddle' profits when:",opts:["The stock moves UP by at least the combined premium paid","The stock moves DOWN by at least the combined premium paid","The stock stays near the strike at expiration","The stock moves SHARPLY in EITHER direction — enough to cover the combined premium. The trader is betting on volatility, not direction"],correct:3,explain:"A long straddle is a pure LONG VOLATILITY trade — direction-agnostic. Max loss = combined premium (stock ends at strike). Max gain = unlimited on upside, very large on downside (to zero). Common use: around binary events (earnings, FDA approvals, central-bank meetings) where direction is unknown but large moves are likely. Trap A/B each identify profitability in only ONE direction, missing the symmetric nature of the strategy. Trap C describes the WORST outcome for a long straddle — both legs expire worthless or near-worthless. Note: the trader is long volatility, but ALSO long theta-decay — a straddle bleeds value every day if the stock doesn't move, making timing critical."},
       {q:"A trader buys a $50 call and simultaneously sells a $60 call (same expiration, same underlying) for a net debit of $3. Maximum profit at expiration is:",opts:["$3","$10","$7","Unlimited"],correct:2,explain:"Bull call spread = long lower-strike call + short higher-strike call. Max profit = (K_high − K_low) − net debit = (60 − 50) − 3 = $7, reached at stock ≥ $60. Max loss = net debit = $3, at stock ≤ $50. The short call CAPS the upside at $60 in exchange for partially offsetting the long call's cost — a debit spread with limited risk AND limited reward. Name matches directional view: 'bull' = bullish, bought at a debit, profits on up moves. Trap A reports the net debit (max LOSS, not max profit). Trap B reports strike width without subtracting the debit. Trap D forgets that the short call caps the upside — the position is NOT equivalent to a naked long call."},
       {q:"An investor holds 100 shares of stock at $50 and buys 1 put with strike $45 for a premium of $1 per share ('protective put'). This position:",opts:["Guarantees a profit regardless of stock direction","Is equivalent to a covered call","Has unlimited upside and a maximum loss of $600 = 100 × (($50 − $45) + $1)","Eliminates all risk including the option premium"],correct:2,explain:"A protective put acts as insurance: below the strike ($45), the put offsets further stock losses. Per share: max loss = (Stock cost − Strike) + premium = ($50 − $45) + $1 = $6, so $600 across 100 shares. Upside remains unlimited (less the $1 premium per share). This is the OPPOSITE of a covered call (which caps upside and provides only premium-sized downside protection). Trap A is false — the premium is a guaranteed cost. Trap B inverts the payoff profile. Trap D ignores the premium, which is a sunk cost regardless of whether the put is exercised. Note: long underlying + long put = 'protective put' (downside protection); long underlying + short call = 'covered call' (yield enhancement)."},
       {q:"Which of the following statements about VEGA and RHO is CORRECT?",opts:["Vega measures sensitivity to interest rates; rho measures sensitivity to implied volatility","Vega measures sensitivity to implied volatility; rho measures sensitivity to the risk-free rate","Both vega and rho measure time decay","Vega is always zero for European options; rho is always zero for American options"],correct:1,explain:"Vega = ∂C/∂σ — option-price sensitivity to a 1-percentage-point change in IMPLIED VOLATILITY. Long calls and long puts both have POSITIVE vega (higher σ widens the expected price distribution, increasing optionality). Rho = ∂C/∂r — sensitivity to the RISK-FREE RATE. Long calls have POSITIVE rho (higher r lowers PV of the strike payment, which benefits the holder); long puts have NEGATIVE rho. Vega matters most for longer-dated options around volatile events; rho matters most for LEAPS and in high-rate environments. Trap A swaps the two Greeks — the most common confusion. Trap C describes theta (time decay), not vega or rho. Trap D is factually false."},
       {q:"A stock trades at $100 today. The 6-month risk-free rate is 4% (annualized, continuous compounding), and the stock pays no dividends over the 6 months. The no-arbitrage 6-month FORWARD price is approximately:",opts:["$100.00","$104.00","$98.02","$102.02"],correct:3,explain:"No-arbitrage forward pricing (cost-of-carry model with no dividends): F = S × e^(rT) = 100 × e^(0.04×0.5) = 100 × e^0.02 ≈ 100 × 1.0202 = $102.02. Intuition: a forward seller must finance/hold the stock until delivery and is compensated by the risk-free rate. With dividends or income: F = S × e^((r−q)T). Trap A ignores cost of carry entirely. Trap B uses the full annual rate (100 × 1.04 = 104) without scaling to 0.5 years. Trap C reverses the sign — the forward is HIGHER than spot when r > 0 with no income. If the forward diverged from S × e^(rT), an arbitrageur would execute cash-and-carry (or reverse cash-and-carry) for a risk-free profit."},
       {q:"An investor wants to create a SYNTHETIC LONG STOCK position using options and cash. Which combination achieves this payoff at expiration?",opts:["Long call + short put (same strike) + invest PV(K) in a risk-free zero-coupon bond that pays K at expiration","Long call + long put (same strike)","Short call + short put (same strike)","Long put + short call (same strike)"],correct:0,explain:"Rearranging put-call parity: S = C − P + PV(K). The right-hand side constructs a stock: long one call, short one put (both strike K, same expiration), and invest PV(K) in a risk-free zero-coupon bond paying K at expiration. At expiration the call+bond pays max(S, K), the short put pays −max(K−S, 0), and the sum equals S for any terminal stock price. Trap B (long call + long put) is a LONG STRADDLE — bets on VOLATILITY, not direction. Trap C (short call + short put) is a SHORT STRADDLE — bets AGAINST volatility. Trap D (long put + short call) is SYNTHETIC SHORT stock — the OPPOSITE of what was asked. Synthetics let traders replicate positions using the cheaper leg when prices temporarily diverge from parity."},
     ]},
    {id:"portfolio_opt",level:"L2",title:"Portfolio Optimization",topic:"Portfolio Management",
     reading:{title:"Mean-Variance Optimization and Beyond",content:"<h3>Markowitz Mean-Variance Optimization</h3>\n\nThe goal: find the portfolio weights that maximize return for a given level of risk (or minimize risk for a given return).\n\n<h4>Minimize: σp² = wᵀΣw</h4>\n<h4>Subject to: wᵀμ = target return, wᵀ1 = 1</h4>\n\nThis is a quadratic programming problem solved by algorithms like SLSQP. The Quantex optimizer runs this with your actual portfolio tickers and the regime-aware covariance matrix.\n\n<h3>Constraints Matter</h3>\n\nUnconstrained optimization often produces extreme portfolios (200% in one stock, -100% in another). Real portfolios need constraints: maximum position size, no short selling, sector limits, beta caps. These come from your investor profile in Quantex.\n\n<h3>Risk Parity</h3>\n\nInstead of equal-weighting by capital, risk parity equal-weights by risk contribution. Each position contributes the same amount of risk to the portfolio. This means volatile assets get smaller weights and stable assets get larger weights.\n\n<h4>Target: RC₁ = RC₂ = ... = RCn = 1/n</h4>\n\nThe Risk Parity challenge in the Challenges tab asks you to build this yourself."},
     quiz:[
       {q:"What does the efficient frontier represent?",opts:["Maximum return portfolios for each risk level","All possible portfolios","Only stock portfolios","Minimum return portfolios"],correct:0,explain:"The efficient frontier is the set of portfolios offering the highest expected return for each level of risk. Portfolios below it are suboptimal."},
       {q:"In risk parity, a high-volatility stock should receive:",opts:["A smaller weight than a low-volatility stock","An equal weight","A larger weight","No allocation"],correct:0,explain:"Risk parity allocates inversely to volatility so each position contributes equal risk. High-vol assets get smaller capital weights."},
       {q:"Why is the covariance matrix crucial for optimization?",opts:["It captures how assets move together","It measures individual returns","It predicts future prices","It calculates dividends"],correct:0,explain:"The covariance matrix Σ captures pairwise relationships between all assets. Without it, you can't compute true portfolio variance — you'd overestimate risk by ignoring diversification."},
       {q:"A portfolio holds 60% in Asset A (σ = 20%) and 40% in Asset B (σ = 30%). The correlation between A and B is 0.3. The portfolio's standard deviation is approximately:",opts:["19.4%","24.0%","17.0%","3.7%"],correct:0,explain:"σp² = w₁²σ₁² + w₂²σ₂² + 2w₁w₂ρσ₁σ₂ = 0.6²·0.20² + 0.4²·0.30² + 2·0.6·0.4·0.3·0.20·0.30 = 0.0144 + 0.0144 + 0.00864 = 0.03744, so σp = √0.03744 ≈ 19.4%. Trap B (24.0%) reports the weighted AVERAGE of standard deviations (0.6·20 + 0.4·30 = 24%), ignoring the diversification benefit entirely. Trap C (17.0%) assumes zero correlation, overstating diversification. Trap D (3.7%) reports the VARIANCE (0.0374) as if it were standard deviation."},
       {q:"The slope of the Capital Market Line (CML) equals:",opts:["The market's beta","The risk-free rate","The market's expected return","(E(Rm) − Rf) / σm — the market's Sharpe ratio"],correct:3,explain:"CML slope = (E(Rm) − Rf) / σm, the market portfolio's Sharpe ratio — reward per unit of TOTAL risk. Every efficient portfolio (combinations of Rf and the market portfolio) lies on this line. Trap A confuses the CML (uses σ) with the SML (uses β). Traps B and C report individual components rather than the RATIO that determines the slope. Individual securities, by contrast, are priced by the SML using β, not the CML."},
       {q:"Diversification between two risky assets provides the GREATEST risk reduction when their correlation is:",opts:["+1.0","0.0","−1.0","+0.5"],correct:2,explain:"With ρ = −1 (perfect negative correlation), a specific weight combination achieves σp = 0 — the maximum possible diversification benefit. As correlation falls below +1, diversification benefit grows monotonically. Trap A (ρ = +1) provides NO diversification — σp equals the weighted average of σs. Trap B (ρ = 0) gives meaningful diversification but less than ρ = −1. Trap D (+0.5) is a middle value designed to distract — better than +1 but worse than 0 or −1."},
       {q:"A portfolio returns 12% with a standard deviation of 15%. The risk-free rate is 3%. The Sharpe ratio is:",opts:["0.80","0.60","9.00","1.67"],correct:1,explain:"Sharpe = (Rp − Rf) / σp = (12 − 3) / 15 = 9/15 = 0.60. Trap A (0.80) forgets to subtract the risk-free rate: 12/15 = 0.80. Trap C (9.00) reports the excess return without dividing by σ. Trap D (1.67) inverts the ratio: 15/9 = 1.67. Sharpe measures excess return per unit of TOTAL risk — both subtracting Rf and dividing by σ are essential."},
       {q:"The global minimum variance portfolio (GMV) on the efficient frontier is:",opts:["The single portfolio with the lowest achievable standard deviation among all feasible combinations of risky assets","The highest-return portfolio","The portfolio with zero beta","The risk-free asset"],correct:0,explain:"The GMV sits at the leftmost tip of the efficient frontier — the lowest σ achievable using the risky-asset universe. It marks the START of the efficient frontier; feasible portfolios below the GMV (same σ, lower return) are INEFFICIENT. Trap B describes the opposite extreme (top of the frontier). Trap C (zero-beta portfolio) is a different CAPM construct, not the GMV. Trap D (risk-free asset) lies outside the risky-asset efficient frontier entirely."},
       {q:"When a risk-free asset is added to a universe of risky assets, the efficient frontier becomes:",opts:["Unchanged from the risky-asset-only case","A downward-sloping hyperbola","A straight line (the Capital Allocation Line) from Rf tangent to the risky-asset frontier at the tangency portfolio — and every investor holds some combination of Rf and that SAME tangency portfolio regardless of risk tolerance","A convex curve strictly above the old frontier"],correct:2,explain:"Adding a risk-free asset LINEARIZES the efficient frontier. The new frontier is the CAL: a straight line from Rf tangent to the risky-asset frontier at the tangency (market) portfolio. This is the two-fund separation theorem — every investor holds the SAME tangency portfolio, mixed with Rf; only the MIX (how much Rf vs. tangency) depends on individual risk aversion. Above the tangency point, investors can borrow at Rf to lever the tangency portfolio, extending the CAL. Trap A ignores the risk-free asset's effect entirely. Trap B is wrong on two counts — frontiers don't slope down, and the new frontier is linear, not hyperbolic. Trap D gets the shape wrong (straight line, not convex curve)."},
       {q:"The Information Ratio measures:",opts:["Total return per unit of total volatility","Excess return over the risk-free rate per unit of total volatility","Portfolio beta relative to the benchmark","Active return (portfolio − benchmark) per unit of tracking error"],correct:3,explain:"IR = (Rp − Rb) / σ(Rp − Rb): the numerator is ACTIVE return (portfolio minus benchmark, NOT risk-free), and the denominator is TRACKING ERROR (standard deviation of the active-return stream). IR measures active-management skill adjusted for risk taken relative to the benchmark — the natural metric for evaluating active managers. Trap B describes the SHARPE ratio (uses Rf and total σ). Trap A is a misstated Sharpe. Trap C describes active beta, a different measure."},
       {q:"Unconstrained mean-variance optimization often produces extreme portfolio weights (e.g., +200% in one asset, −100% in another) primarily because:",opts:["The Markowitz model is mathematically flawed","Optimizers amplify small errors in expected-return estimates into large allocation changes","Standard deviations cannot be estimated accurately","Correlations are always equal to 1 in the model"],correct:1,explain:"MVO is extremely sensitive to expected-return inputs — tiny estimation errors (±1% in expected return) can flip weights from +100% to −100%, a phenomenon called the 'Markowitz curse' or 'error maximization.' Practical remedies include Black-Litterman (Bayesian blending of views with market-implied equilibrium), resampling, shrinkage estimators like Ledoit-Wolf, and hard constraints (no shorts, max position size). Trap A is too strong — the model is input-sensitive, not flawed. Trap C understates: return estimates matter MORE than σ estimates. Trap D is factually wrong."},
       {q:"Under a 'threshold' (as opposed to 'calendar') rebalancing policy, trades are triggered when:",opts:["A fixed amount of time has elapsed (e.g., quarterly)","The portfolio beats its benchmark","Any holding's weight drifts beyond a preset tolerance band from its target","The VIX exceeds 30"],correct:2,explain:"Threshold rebalancing trades only when a holding's weight drifts outside a tolerance band (e.g., ±5% absolute or ±20% relative to target weight). This trades less during quiet markets and more during volatile periods, aligning trading costs with actual drift. Trap A describes CALENDAR rebalancing (time-based triggers). Traps B and D are not standard rebalancing triggers. The choice trades off operational predictability (calendar) against drift-responsiveness (threshold)."},
     ]},
    {id:"alt_inv",level:"L2",title:"Alternative Investments",topic:"Alternative Investments",
     reading:{title:"Alternative Investments",content:"<h3>Reading Coming in Next Batch</h3>The full reading for this module is being prepared separately. For now, proceed to the Quiz tab (16 questions) to test your knowledge of hedge funds (fees, biases, long/short, market neutral), private equity (J-curve, IRR, MOIC), real estate (REITs, cap rates), commodities (contango, roll yield), venture capital, and infrastructure."},
     quiz:[
       {q:"Compared to traditional stocks and bonds, alternative investments typically feature:",opts:["Higher liquidity and tighter bid-ask spreads","Daily mark-to-market pricing by exchanges","Lower liquidity, longer lock-up periods, and potentially non-normal return distributions","Lower fees and greater regulatory oversight"],correct:2,explain:"Alternatives are characterized by lower liquidity (locked up for quarters or years), infrequent NAV pricing, higher fees, less regulation, and return distributions that often exhibit fat tails, skewness, or serial correlation. The trap in A reverses the liquidity profile; D reverses the fee and regulatory direction — alternatives charge MORE and are LESS regulated, not the opposite."},
       {q:"A hedge fund charges '2 and 20'. This means:",opts:["2% management fee plus 20% performance fee on profits","2% management fee only","20% management fee plus 2% performance fee","No fees below a 2% return hurdle"],correct:0,explain:"The standard '2 and 20' structure means a 2% annual management fee on AUM plus a 20% performance fee on profits (often above a hurdle rate with a high-water mark). The trap in C reverses the two fees. D misreads the structure as a hurdle condition on paying ANY fees, which isn't what the label describes."},
       {q:"A Real Estate Investment Trust (REIT) typically must distribute what percentage of taxable income as dividends to maintain REIT status under US tax law?",opts:["At least 50%","At least 75%","At least 90%","100%"],correct:2,explain:"US REITs must distribute at least 90% of taxable income to shareholders to qualify for REIT tax treatment (pass-through taxation at the entity level). In exchange, the REIT avoids corporate-level tax on distributed income. The trap in B (75%) is close but wrong; D (100%) is overly strict — REITs may retain some income and pay corporate tax on the retained portion."},
       {q:"A commodity futures curve is in 'contango' when:",opts:["Near-term futures prices are higher than longer-term futures prices","Longer-term futures prices are higher than near-term futures prices (and typically higher than spot)","Spot prices equal all futures prices","The commodity has no storage costs"],correct:1,explain:"Contango: longer-dated futures > nearer-dated futures and spot. Common for commodities with significant storage costs (e.g., oil, natural gas at certain times). The trap in A describes BACKWARDATION, the opposite shape, which typically occurs when near-term supply is tight or convenience yield is high. D is unrelated — contango can exist with or without storage-cost nuances."},
       {q:"The 'J-curve' in private equity refers to:",opts:["A hedging strategy using jumbo mortgages","The shape of the fund's management fee schedule","Regulatory disclosures required for PE funds","Negative returns in early years followed by positive returns later as portfolio companies mature"],correct:3,explain:"PE funds typically experience early negative returns due to management fees, organizational costs, and early-stage investments that haven't yet generated exits — producing a shape resembling the letter J. Returns usually turn positive in years 4–8 as investments mature and exits occur. The trap in B confuses performance with fee scheduling; J-curve is a RETURN pattern, not a fee pattern."},
       {q:"A commercial property has net operating income (NOI) of $800K and a purchase price of $10M. The capitalization rate is:",opts:["12.5%","6.0%","80%","8.0%"],correct:3,explain:"Cap rate = NOI / Property value = 800,000 / 10,000,000 = 8.0%. Cap rates serve as a quick valuation metric — they're the inverse of the P/NOI multiple (12.5× here). The trap in A inverts the ratio (reporting 10M/800K = 12.5 as a percent erroneously). Higher cap rates typically signal higher risk or lower expected growth."},
       {q:"A long/short equity hedge fund has $100M long positions and $40M short positions. Its NET exposure is:",opts:["$140M (sum)","$60M short","$100M long (ignore shorts)","$60M long"],correct:3,explain:"Net exposure = Long − Short = $100M − $40M = $60M long. This measures directional market exposure. The trap in A reports GROSS exposure (Long + Short = $140M), which measures total leverage, not directionality. B reverses the sign; C ignores the short side entirely. Both gross and net metrics matter, but they answer different questions."},
       {q:"The 'survivorship bias' in hedge fund return databases causes:",opts:["Reported returns to be understated","Risk to be overstated","Reported returns to be overstated","No material distortion"],correct:2,explain:"Survivorship bias occurs because databases drop failed or closed funds, leaving only surviving (generally better-performing) funds in the index. This causes reported returns to be OVERstated — estimates of the bias range from 2–4% per year depending on the study. The trap in A reverses the direction. Related biases (backfill, self-selection) also tend to inflate reported returns; few biases push downward."},
       {q:"A PE fund invests $100M in year 0 and receives $250M at the end of year 5. The IRR is approximately:",opts:["20.1%","15.0%","30.0%","50.0%"],correct:0,explain:"IRR solves 100 × (1 + IRR)⁵ = 250, so (1 + IRR)⁵ = 2.5 and IRR = 2.5^(1/5) − 1 ≈ 20.1%. This is the 2.5× MOIC annualized over 5 years. The trap in C (30.0%) uses simple-interest annualization (150% total gain / 5 years = 30%), which overstates the annual rate by ignoring compounding; D reports the total return, not annualized."},
       {q:"A commodity futures contract shows a negative 'roll yield' when:",opts:["The market is in backwardation","The market is in contango","Spot prices are rising","Interest rates are falling"],correct:1,explain:"Roll yield is negative in CONTANGO: when an investor rolls expiring contracts forward, they sell lower-priced near futures and buy higher-priced longer-dated futures, losing on each roll. The trap in A reverses this — backwardation produces POSITIVE roll yield. C and D don't directly drive roll yield; the curve shape does."},
       {q:"A 'market-neutral' equity hedge fund targets:",opts:["Gross exposure near zero","Net market exposure near zero (beta ≈ 0)","100% long exposure only","100% short exposure only"],correct:1,explain:"Market neutral means beta ≈ 0 — the fund aims to profit from stock-picking (alpha) with minimal market directionality, typically by matching long and short dollar exposure scaled by beta. The trap in A confuses net with gross exposure; a market-neutral fund may have very HIGH gross exposure (e.g., $100M long + $100M short = $200M gross) even as net is zero. C and D describe directional funds."},
       {q:"The Sharpe ratio may be MISLEADING when applied to hedge funds because:",opts:["Hedge funds never have positive returns","Hedge fund returns often exhibit non-normal distributions (skew, kurtosis) that Sharpe does not capture","The risk-free rate is always zero for hedge funds","Hedge fund fees are tax deductible"],correct:1,explain:"Sharpe ratio assumes normally-distributed returns and penalizes upside volatility equally with downside. Hedge fund strategies (option-writing, merger arbitrage, tail-risk trades) often have asymmetric return profiles — Sharpe understates tail risk. Alternative metrics (Sortino, Calmar) address this. The trap in A is absurd; C and D are wrong on the facts."},
       {q:"The primary drawback of a fund-of-funds (FOF) hedge fund investment is:",opts:["Inability to access any underlying funds","Zero diversification","Double layer of fees (FOF fee on top of underlying manager fees)","Lack of professional management"],correct:2,explain:"FOFs charge their own management and performance fees on top of the underlying hedge fund fees, meaning investors pay two layers — this drag often consumes a meaningful share of returns. The trap in A reverses the proposition (the FOF accesses many underlying funds — that's the whole point); B is the opposite — FOFs are highly diversified across managers. The benefit (access, diligence) must be weighed against the fee drag."},
       {q:"Returns from a diversified venture capital fund portfolio typically exhibit:",opts:["Normally distributed returns similar to public equities","Negatively skewed returns with most investments profitable","Highly positively skewed returns where a small number of 'home runs' drive most of the total return","Uniformly distributed returns"],correct:2,explain:"VC returns are dominated by a few outlier successes (positive skew) — industry studies consistently find that a small handful of investments (often 10–20%) produce the majority of a fund's total return, while many investments return zero or below cost. The trap in B reverses the skew direction; VC is the opposite — most investments disappoint, but the winners win big. A wrongly assumes normality."},
       {q:"Infrastructure investments (toll roads, utilities, airports) are typically valued by investors for:",opts:["Stable, long-duration cash flows often with inflation-linked pricing","Very high short-term returns matching venture capital","High liquidity comparable to public equities","Zero correlation with economic activity"],correct:0,explain:"Infrastructure assets typically generate stable, contracted cash flows over long durations (25–50+ years), often with regulated tariffs or inflation-escalation clauses — attractive for liability-driven investors like pension funds. The trap in B confuses infrastructure with early-stage growth investing; infrastructure is a DEFENSIVE alternative, not a high-return-high-risk one. D overstates the non-correlation — infrastructure has low but non-zero correlation with economic activity."},
       {q:"A PE fund reports a MOIC (multiple on invested capital) of 2.0× over a 10-year hold. Its IRR is approximately:",opts:["10.0%","20.0%","100.0%","7.2%"],correct:3,explain:"IRR = MOIC^(1/years) − 1 = 2.0^(0.1) − 1 ≈ 7.2%. The 2.0× MOIC means the investment doubled; annualized over 10 years this is only ~7.2%, illustrating how long time horizons dramatically reduce annualized returns even for successful investments. The trap in B (20%) misreads '2× over 10 years' as '20% per year' by simple division; C reports the total percentage gain (100%) without annualizing. MOIC and IRR are complementary — MOIC ignores timing, IRR is timing-sensitive."},
     ]},
  ];

  const mod=MODULES[activeMod];
  const modProgress=(modId)=>{const p=progress[modId]||{};const total=3;let done=0;if(p.reading)done++;if(p.quiz)done++;if(p.interactive)done++;return done/total*100;};
  const overallProgress=MODULES.reduce((a,m)=>a+modProgress(m.id),0)/MODULES.length;

  // Quiz logic
  const[qIdx,setQIdx]=useState(0);
  const[selected,setSelected]=useState(null);
  const[showResult,setShowResult]=useState(false);
  const[score,setScore]=useState(0);
  const[qDone,setQDone]=useState(false);

  const resetQuiz=()=>{setQIdx(0);setSelected(null);setShowResult(false);setScore(0);setQDone(false);};
  useEffect(()=>{resetQuiz();},[activeMod]);

  const submitAnswer=()=>{
    if(selected===null)return;
    setShowResult(true);
    if(selected===mod.quiz[qIdx].correct)setScore(s=>s+1);
  };
  const nextQ=()=>{
    if(qIdx+1>=mod.quiz.length){
      setQDone(true);
      markRead(mod.id,"quiz");
    }else{
      setQIdx(i=>i+1);setSelected(null);setShowResult(false);
    }
  };

  return e("div",null,
    // Progress overview
    e("div",{className:"card"},
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
        e("div",null,
          e("div",{className:"card-title",style:{marginBottom:2}},"CFA STUDY PROGRAM"),
          e("div",{style:{fontSize:11,color:"#64748b"}},MODULES.length+" modules · "+MODULES.reduce((a,m)=>a+m.quiz.length,0)+" quiz questions")
        ),
        e("div",{style:{textAlign:"right"}},
          e("div",{style:{fontSize:22,fontWeight:800,fontFamily:"'Outfit',sans-serif",color:"#a5b4fc"}},Math.round(overallProgress)+"%"),
          e("div",{style:{fontSize:9,color:"#4a5568"}},"overall progress")
        )
      ),
      e("div",{className:"ch-prog",style:{marginTop:8}},e("div",{className:"ch-prog-fill",style:{width:overallProgress+"%"}}))
    ),

    e("div",{className:"course-grid"},
      // Module list
      e("div",null,
        MODULES.map((m,i)=>{
          const prog=modProgress(m.id);
          return e("div",{key:m.id,className:"mod-card"+(activeMod===i?" active":""),onClick:()=>setActiveMod(i)},
            e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
              e("div",null,
                e("div",{style:{fontSize:12,fontWeight:700,color:activeMod===i?"#a5b4fc":"#e2e8f0"}},m.title),
                e("div",{style:{display:"flex",gap:4,marginTop:3}},e("span",{className:"cfa-tag"},m.level),e("span",{style:{fontSize:9,color:"#4a5568"}},m.topic))

          );
        })

      // Active module content
      e("div",null,
        e("div",{style:{display:"flex",gap:4,marginBottom:10}},
          ["reading","quiz","video"].map(s=>e("button",{key:s,className:"btn btn-xs"+(activeSection===s?" btn-p":""),onClick:()=>setActiveSection(s),style:{textTransform:"capitalize"}},
            s==="reading"?"📖 Reading":s==="quiz"?"✏️ Quiz ("+mod.quiz.length+")":"🎬 Video"
          ))
        ),

        // Reading
        activeSection==="reading"&&e("div",{className:"card"},

          e("div",{className:"reading-content",dangerouslySetInnerHTML:{__html:mod.reading.content}}),
          !progress[mod.id]?.reading&&e("button",{className:"btn btn-p",style:{marginTop:12},onClick:()=>markRead(mod.id,"reading")},"✓ Mark as Read")
        ),

        // Quiz
        activeSection==="quiz"&&e("div",{className:"card"},
          e("div",{className:"card-title"},"QUIZ — "+mod.title),
          qDone?e("div",null,
            e("div",{style:{textAlign:"center",padding:20}},
              e("div",{style:{fontSize:40,fontWeight:800,fontFamily:"'Outfit',sans-serif",color:score>=mod.quiz.length*.7?"#34d399":"#fbbf24"}},score+"/"+mod.quiz.length),
              e("div",{style:{fontSize:13,color:"#64748b",marginTop:4}},score>=mod.quiz.length*.7?"Great job! You passed.":"Review the material and try again."),
              e("button",{className:"btn btn-p",style:{marginTop:12},onClick:resetQuiz},"Retake Quiz")
            )

            e("div",{style:{fontSize:13,fontWeight:600,color:"#e2e8f0",marginBottom:12,lineHeight:1.6}},mod.quiz[qIdx].q),
            mod.quiz[qIdx].opts.map((opt,i)=>e("button",{key:i,className:"quiz-option"+(selected===i?" selected":"")+(showResult&&i===mod.quiz[qIdx].correct?" correct":"")+(showResult&&selected===i&&i!==mod.quiz[qIdx].correct?" wrong":""),onClick:()=>{if(!showResult)setSelected(i);},disabled:showResult},String.fromCharCode(65+i)+". "+opt)),
            showResult&&e("div",{className:"info-box",style:{marginTop:8}},mod.quiz[qIdx].explain),
            e("div",{style:{display:"flex",justifyContent:"flex-end",gap:6,marginTop:12}},

            e("div",null,"Video content coming soon"),
            e("div",{style:{marginTop:8,fontSize:10}},"In the full version, each module will include"),
            e("div",{style:{fontSize:10}},"curated video lessons from financial education creators")

}

// ── Root App ──────────────────────────────────────────────────────────────────
function App({user,logout}){
  const[profile,setProfile]=useState(()=>{try{const s=localStorage.getItem("qx_profile");return s?JSON.parse(s):null;}catch(e){return null;}});
  const[tab,setTab]=useState("onboard");
  const[ports,setPorts]=useState(()=>{try{const s=localStorage.getItem("qx_ports");return s?JSON.parse(s):{A:{},B:{},C:{}};}catch(e){return{A:{},B:{},C:{}};}});
  const[ap,setAp]=useState("A");
  const[screening,setScreening]=useState(false);
  const[backendOk,setBackendOk]=useState(null); // null=unknown, true/false
  const[optLoading,setOptLoading]=useState(false);
  const[screenError,setScreenError]=useState(null);

  useEffect(()=>{try{if(profile)localStorage.setItem("qx_profile",JSON.stringify(profile));else localStorage.removeItem("qx_profile");}catch(e){}},[profile]);
  useEffect(()=>{try{localStorage.setItem("qx_ports",JSON.stringify(ports));}catch(e){}},[ports]);

  // Check backend health on mount
  useEffect(()=>{
    fetch(BACKEND_URL+"/health",{signal:AbortSignal.timeout(5000)})
      .then(r=>r.json()).then(()=>setBackendOk(true))
      .catch(()=>setBackendOk(false));
  },[]);

  // Screen assets after profile is set (or on mount if profile exists)
  const screenAssets=useCallback(async(p)=>{
    if(!p)return;
    setScreening(true);setScreenError(null);
    const horMap={"<1 year":.75,"1-3 years":2,"3-7 years":5,"7-15 years":10,"15+ years":20};
    try{
      const data=await apiFetch("/api/screen",{
        goal:p.goal,risk_score:p.score,
        time_horizon_years:horMap[p.hor]||7,max_results:40,
      });
      if(data.shortlist&&data.shortlist.length>0){
        ASSETS=data.shortlist.map(mapScreened);
        setBackendOk(true);
      }
    }catch(err){
      console.warn("Screening failed, using fallback assets:",err.message);
      ASSETS=FALLBACK_ASSETS;
      setScreenError(err.message);
      setBackendOk(false);
    }finally{setScreening(false);}
  },[]);

  // Trigger screening when profile exists
  useEffect(()=>{if(profile&&backendOk!==false)screenAssets(profile);},[profile,backendOk]);

  const resetAll=()=>{if(!confirm("Reset all Quantex data? This clears your profile and all portfolios."))return;try{localStorage.removeItem("qx_profile");localStorage.removeItem("qx_ports");}catch(e){}ASSETS=FALLBACK_ASSETS;setProfile(null);setPorts({A:{},B:{},C:{}});setTab("onboard");};

  const onDone=p=>{setProfile(p);setTab("disco");};
  const addToPort=(pn,id)=>{setPorts(prev=>{const w={...prev[pn]};if(w[id]!==undefined)return prev;const n=Object.keys(w).length+1;const each=Math.floor(100/n);const nw={};Object.keys(w).forEach(k=>nw[k]=each);nw[id]=each;nw[Object.keys(nw)[0]]+=100-each*n;return{...prev,[pn]:nw};});};
  const rmFromPort=(pn,id)=>{setPorts(prev=>{const nw={...prev[pn]};delete nw[id];const ks=Object.keys(nw);if(ks.length>0){const each=Math.floor(100/ks.length);ks.forEach(k=>nw[k]=each);nw[ks[0]]+=100-each*ks.length;}return{...prev,[pn]:nw};});};
  const togglePort=(pn,id)=>{
    if(ports[pn]&&ports[pn][id]!==undefined)rmFromPort(pn,id);
    else addToPort(pn,id);
  };
  const updateW=(pn,id,v)=>setPorts(prev=>({...prev,[pn]:{...prev[pn],[id]:v}}));

  // Optimizer: try backend (SLSQP), fall back to local Monte Carlo
  const optPort=async(pn,goal,maxPos)=>{
    const t=Object.keys(ports[pn]);
    if(!t.length)return;
    if(backendOk){
      setOptLoading(true);
      try{
        const result=await optimizeBackend(t,goal,maxPos,profile?.score,ports[pn]);
        setPorts(prev=>({...prev,[pn]:result.weights}));
        setOptLoading(false);return;
      }catch(err){console.warn("Backend optimizer failed, using local:",err.message);}
      setOptLoading(false);
    }
    // Local fallback
    setPorts(prev=>({...prev,[pn]:optimizeLocal(t,goal,maxPos)}));
  };

  const locked=!profile;
  const aw=ports[ap]||{};
  const as=Object.keys(aw).length>0?calcStats(aw):null;

  const TABS=[
    {id:"onboard",l:"① PROFILE"+(profile?" · Saved":""),lk:false,done:!!profile},
    {id:"disco",l:"② DISCOVERY",lk:locked},
    {id:"metrics",l:"METRICS",lk:locked},
    {id:"corr",l:"CORRELATIONS",lk:locked},
    {id:"frontier",l:"FRONTIER",lk:locked},
    {id:"trades",l:"TRADE DESK",lk:locked},
    {id:"deriv",l:"⚡ DERIVATIVES",lk:false},
    {id:"paper",l:"📄 PAPER TRADE",lk:false},
    {id:"challenges",l:"🎯 CHALLENGES",lk:false},
    {id:"course",l:"📚 COURSE",lk:false},
    {id:"compare",l:"⇄ COMPARE",lk:locked},
    {id:"pA",l:"◈ A",lk:locked,pn:"A"},{id:"pB",l:"◈ B",lk:locked,pn:"B"},{id:"pC",l:"◈ C",lk:locked,pn:"C"},
  ];

  const statusDot=backendOk===true?"🟢":backendOk===false?"🔴":"⟳";
  const statusTip=backendOk===true?"Backend connected — real data":"Backend offline — using sample data";

  return e("div",{id:"root"},
    e("div",{className:"topbar"},
      e("div",{className:"logo"},"QUANTEX",e("span",{title:statusTip,style:{fontSize:8,marginLeft:6,cursor:"help"}},statusDot)),
      e("div",{className:"mkt"},Object.entries(MKT).map(([k,v])=>e("div",{key:k,className:"mkt-item"},e("div",{className:"mkt-lbl"},k),e("div",{className:"mkt-val "+(v.ch>=0?"up":"dn")},v.p)))),
      profile?e("div",{style:{display:"flex",alignItems:"center",gap:6}},e("div",{className:"chip",onClick:()=>setTab("onboard"),title:"Update profile"},profile.score+"/100 · "+profile.cat+" · "+profile.goal+" ✎"),e("button",{className:"btn btn-xs",onClick:resetAll,title:"Reset all data",style:{color:"#475569",fontSize:9}},"↺ RESET"),user&&user.name!=="Guest"&&e("span",{style:{fontSize:10,color:"#64748b"}},user.name),logout&&e("button",{className:"btn btn-xs",onClick:logout,style:{color:"#475569",fontSize:9}},"Sign Out")):e("div",{style:{display:"flex",alignItems:"center",gap:6}},e("div",{className:"chip",style:{cursor:"default"}},"Complete ① PROFILE to unlock"),user&&user.name!=="Guest"&&e("span",{style:{fontSize:10,color:"#64748b"}},user.name),logout&&e("button",{className:"btn btn-xs",onClick:logout,style:{color:"#475569",fontSize:9}},"Sign Out"))
    ),
    screening&&e("div",{style:{padding:"8px 16px",background:"#0d1228",borderBottom:"1px solid #1a2540",fontSize:11,color:"#818cf8"}},e("span",{className:"spin"},"◌")," Screening Nasdaq universe — this may take 30-60s on first load..."),
    as&&e("div",{className:"sbar"},
      e("div",{className:"sb-item",style:{borderRight:"1px solid #1a2540"}},e("div",{className:"sb-lbl"},"PORT "+ap),e("div",{className:"sb-val",style:{color:"#818cf8",fontSize:11}},Object.keys(aw).length+" pos.")),
      [["RETURN",(as.ret>0?"+":"")+as.ret+"%",as.ret>=0?"up":"dn"],["VOL σ",as.vol+"%",""],["SHARPE",as.sh,as.sh>=1?"up":as.sh>=.5?"wa":"dn"],["BETA",as.beta,""],["SORTINO",as.so,""],["VAR 95%",as.var95+"%","dn"],["DIV YIELD",as.divY+"%",""]].map(([l,v,cls])=>e("div",{key:l,className:"sb-item"},e("div",{className:"sb-lbl"},l),e("div",{className:"sb-val "+cls},v)))
    ),
    e("div",{className:"nav"},TABS.map(t=>e("button",{key:t.id,className:"nav-tab"+(tab===t.id?" active":"")+(t.lk?" locked":"")+(t.done?" done":""),onClick:()=>{if(t.lk)return;if(t.pn)setAp(t.pn);setTab(t.id);},title:t.lk?"Complete ① PROFILE first":""},t.l))),
    e("div",{className:"body"},
      e("div",{className:"main"},
        screenError&&tab==="disco"&&e("div",{className:"warn-box",style:{margin:"0 0 10px"}},"⚠ Backend: "+screenError+" — showing sample data. Start the backend with: uvicorn app.main:app"),
        tab==="onboard"&&e(Onboard,{onDone,current:profile}),
        tab==="disco"&&e(Discovery,{profile,ports,onAdd:togglePort}),
        tab==="metrics"&&e(Metrics,{weights:aw}),
        tab==="corr"&&e(Correlations,{weights:aw,profile,backendOk}),
        tab==="frontier"&&e(Frontier,{weights:aw,profile,backendOk}),
        tab==="trades"&&e(TradeDeck,{weights:aw,profile}),
        tab==="deriv"&&e(DerivativesSandbox,{backendOk}),
        tab==="paper"&&e(PaperTrading,{backendOk}),
        tab==="challenges"&&e(Challenges,{profile,ports,activePort:ap}),
        tab==="course"&&e(CourseHub,{profile,ports,activePort:ap}),
        tab==="compare"&&e(Compare,{ports}),
        tab==="pA"&&e(PortTab,{name:"Portfolio A",weights:ports.A,profile,onUpdate:(id,v)=>updateW("A",id,v),onRemove:id=>rmFromPort("A",id),onOpt:(goal,mp)=>optPort("A",goal,mp),optLoading}),
        tab==="pB"&&e(PortTab,{name:"Portfolio B",weights:ports.B,profile,onUpdate:(id,v)=>updateW("B",id,v),onRemove:id=>rmFromPort("B",id),onOpt:(goal,mp)=>optPort("B",goal,mp),optLoading}),
        tab==="pC"&&e(PortTab,{name:"Portfolio C",weights:ports.C,profile,onUpdate:(id,v)=>updateW("C",id,v),onRemove:id=>rmFromPort("C",id),onOpt:(goal,mp)=>optPort("C",goal,mp),optLoading})
      ),
      e("div",{className:"side"},e(Advisor,{profile,ports,activePort:ap}))
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(LoginGate,null,(user,logout)=>e(App,{user,logout})));
</script>
