      e("input",{className:"login-field",placeholder:"Email",type:"email",value:email,onChange:ev=>setEmail(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&submit()}),
      e("input",{className:"login-field",placeholder:"Password",type:"password",value:pass,onChange:ev=>setPass(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&submit()}),
      e("button",{className:"login-btn",onClick:submit},mode==="signup"?"Create Account":"Sign In"),
      e("div",{style:{textAlign:"center",marginTop:10}},
        e("button",{style:{background:"none",border:"none",color:"#6366f1",cursor:"pointer",fontSize:11,fontFamily:"'DM Sans',sans-serif"},onClick:()=>setMode(mode==="signup"?"login":"signup")},mode==="signup"?"Already have an account? Sign in":"Don't have an account? Sign up")
      ),
      e("div",{className:"login-divider"},"or"),
      e("button",{style:{width:"100%",padding:11,background:"rgba(99,102,241,.06)",border:"1px solid rgba(99,102,241,.15)",borderRadius:10,color:"#a5b4fc",fontSize:12,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600},onClick:guest},"Continue as Guest"),
      e("div",{style:{textAlign:"center",marginTop:14,fontSize:10,color:"#4a5568",lineHeight:1.6}},"Free tier · No credit card required",e("br",null),"Progress saves locally on this device")
    )
  );
}

      e("div",{className:"factor-row"},
        e("div",{className:"factor-name"},f.label),
        e("input",{className:"factor-slider",type:"range",min:0,max:50,value:Math.round((weights[f.id]||0)*100),onChange:ev=>{
          const newW={...weights,[f.id]:ev.target.value/100};
          const sum=Object.values(newW).reduce((a,b)=>a+b,0);
          if(sum>0){const norm={};Object.keys(newW).forEach(k=>norm[k]=newW[k]/sum);onChange(norm);}
        }}),
        e("div",{className:"factor-pct"},Math.round((weights[f.id]||0)*100)+"%")
      ),
      e("div",{className:"factor-desc"},f.desc)
    )),
    e("button",{className:"btn btn-xs",style:{marginTop:4},onClick:()=>{
      const defaults={Growth:{momentum:.35,quality:.25,value:.15,low_vol:.10,yield:.15},Income:{momentum:.10,quality:.20,value:.15,low_vol:.20,yield:.35},Preservation:{momentum:.10,quality:.25,value:.15,low_vol:.35,yield:.15},Balanced:{momentum:.20,quality:.25,value:.20,low_vol:.20,yield:.15}};
      onChange(defaults[goal]||defaults.Balanced);
    }},"↺ Reset to "+goal+" defaults")
  );
}

// ── Course Hub ───────────────────────────────────────────────────────────────
function CourseHub({profile,ports,activePort}){
  const[activeMod,setActiveMod]=useState(0);
  const[activeSection,setActiveSection]=useState("reading");
  const[quizState,setQuizState]=useState({});
  const[progress,setProgress]=useState(()=>{try{return JSON.parse(localStorage.getItem("qx_course")||"{}") }catch(e){return{};}});
  useEffect(()=>{try{localStorage.setItem("qx_course",JSON.stringify(progress));}catch(e){}},[progress]);

  const markRead=(modId,section)=>{
    setProgress(prev=>{const p={...prev};if(!p[modId])p[modId]={};p[modId][section]=true;return p;});
  };

  const MODULES=[
    {id:"tvm",level:"L1",title:"Time Value of Money",topic:"Quantitative Methods",
     reading:{title:"Understanding Present and Future Value",content:"The Time Value of Money (TVM) is the foundational concept in all of finance. A dollar today is worth more than a dollar tomorrow because of its earning potential.\n\n<h3>Core Principles</h3>\n\nFuture Value (FV) tells you what an investment today will be worth later:\n<h4>FV = PV × (1 + r)^n</h4>\nWhere PV is present value, r is the interest rate per period, and n is the number of periods.\n\nPresent Value (PV) tells you what a future cash flow is worth today:\n<h4>PV = FV / (1 + r)^n</h4>\n\nThis is the basis of all discounted cash flow analysis. When you see a stock valued at $150 using DCF, someone computed the present value of all expected future cash flows.\n\n<h3>Compounding Frequency</h3>\n\nAnnual compounding: FV = PV × (1 + r)^n\nSemi-annual: FV = PV × (1 + r/2)^(2n)\nContinuous: FV = PV × e^(rn)\n\nMore frequent compounding produces higher effective rates. The Effective Annual Rate (EAR) converts any compounding frequency to an annual equivalent:\n<h4>EAR = (1 + r/m)^m − 1</h4>\n\n<h3>Application in Portfolio Management</h3>\n\nEvery metric in Quantex uses TVM implicitly. When we compute expected return, we're projecting future portfolio value. When we discount to find present value, we're answering: 'What is this future return stream worth paying for today?'"},
     quiz:[
       {q:"If you invest $10,000 at 8% annually for 5 years, what is the future value?",opts:["$14,693","$14,000","$15,000","$13,382"],correct:0,explain:"FV = 10,000 × (1.08)^5 = $14,693.28"},
       {q:"What is the present value of $50,000 received in 10 years at a 6% discount rate?",opts:["$27,919","$30,000","$25,000","$32,500"],correct:0,explain:"PV = 50,000 / (1.06)^10 = $27,919.74"},
       {q:"Which compounding frequency produces the highest effective annual rate for a stated 12% rate?",opts:["Annual","Quarterly","Monthly","Continuous"],correct:3,explain:"Continuous compounding: EAR = e^0.12 − 1 = 12.75%. More frequent compounding always produces a higher EAR."},
       {q:"An investment doubles in value over 7 years. What is the approximate annual return?",opts:["10.3%","7.0%","14.3%","8.0%"],correct:0,explain:"Using the Rule of 72: 72/7 ≈ 10.3%. Exact: (2)^(1/7) − 1 = 10.41%."},
     ]},
    {id:"risk_return",level:"L1",title:"Risk and Return",topic:"Portfolio Management",
     reading:{title:"Understanding Portfolio Risk and Return",content:"<h3>Expected Return</h3>\n\nPortfolio expected return is the weighted average of individual asset returns:\n<h4>E(Rp) = Σ wi × E(Ri)</h4>\n\nThis is straightforward — if AAPL is 30% of your portfolio and you expect 20% return, AAPL contributes 6% to portfolio return.\n\n<h3>Portfolio Risk — Where It Gets Interesting</h3>\n\nPortfolio risk is NOT the weighted average of individual risks. This is the single most important insight in Modern Portfolio Theory.\n\n<h4>σp² = Σ Σ wi × wj × σi × σj × ρij</h4>\n\nThe correlation term (ρij) is what creates the 'free lunch' of diversification. When assets aren't perfectly correlated (ρ < 1), portfolio volatility is LESS than the weighted average of individual volatilities.\n\n<h3>The Sharpe Ratio</h3>\n\n<h4>S = (Rp − Rf) / σp</h4>\n\nThis measures excess return per unit of total risk. It's the most widely used risk-adjusted performance metric. In Quantex, every portfolio you build shows a real-time Sharpe ratio computed from the full covariance matrix.\n\n<h3>The Efficient Frontier</h3>\n\nFor any given return level, there exists a portfolio with minimum risk. The set of all such portfolios forms the efficient frontier. Every portfolio below this curve is suboptimal — you can get the same return with less risk, or more return with the same risk.\n\nThe Frontier tab in Quantex shows this visually. Your portfolio appears as a triangle — if it's below the curve, the optimizer can improve it."},
     quiz:[
       {q:"A portfolio is 60% stocks (expected return 12%, vol 20%) and 40% bonds (expected return 4%, vol 6%). What is the expected portfolio return?",opts:["8.8%","8.0%","9.2%","7.6%"],correct:0,explain:"E(Rp) = 0.60 × 12% + 0.40 × 4% = 7.2% + 1.6% = 8.8%"},
       {q:"If two assets have a correlation of -1.0, what is theoretically possible?",opts:["Zero portfolio risk","Maximum diversification","Infinite return","Negative beta"],correct:0,explain:"With ρ = -1, you can theoretically construct a portfolio with zero volatility by choosing the right weights. This is the extreme case of diversification benefit."},
       {q:"Your portfolio has a return of 15%, risk-free rate is 4%, and volatility is 22%. What is the Sharpe ratio?",opts:["0.50","0.68","0.41","0.75"],correct:0,explain:"Sharpe = (15% − 4%) / 22% = 11% / 22% = 0.50"},
       {q:"Which statement about the efficient frontier is TRUE?",opts:["Portfolios on the frontier have the highest return for each risk level","All portfolios on the frontier have the same Sharpe ratio","The frontier is a straight line","Diversification has no effect on the frontier"],correct:0,explain:"The efficient frontier is the set of optimal portfolios — for each risk level, no portfolio exists with higher expected return."},
     ]},
    {id:"capm",level:"L1",title:"CAPM and Beta",topic:"Portfolio Management",
     reading:{title:"The Capital Asset Pricing Model",content:"<h3>Systematic vs. Unsystematic Risk</h3>\n\nTotal risk = Systematic risk + Unsystematic risk\n\nSystematic risk (market risk) cannot be diversified away — it affects all assets. Think: recessions, interest rate changes, geopolitical events.\n\nUnsystematic risk (specific risk) CAN be diversified away. Think: a CEO departure, a product recall, an earnings miss at one company.\n\n<h3>Beta (β)</h3>\n\n<h4>βi = Cov(Ri, Rm) / Var(Rm)</h4>\n\nBeta measures an asset's sensitivity to market movements. β = 1.0 means the asset moves with the market. β > 1.0 amplifies market moves. β < 1.0 dampens them. β < 0 moves opposite to the market (rare, but gold and some bonds exhibit this).\n\nIn Quantex, your portfolio beta is the weighted average of individual betas. The Metrics dashboard shows this in real time.\n\n<h3>The CAPM Equation</h3>\n\n<h4>E(Ri) = Rf + βi × [E(Rm) − Rf]</h4>\n\nThis says: the expected return of any asset equals the risk-free rate plus a risk premium proportional to its beta. An asset with β = 1.5 should earn 1.5× the market risk premium.\n\n<h3>Alpha</h3>\n\n<h4>α = Actual Return − CAPM Expected Return</h4>\n\nPositive alpha means the portfolio outperformed what CAPM predicted given its beta. This is the definition of 'skill' in active management. The Metrics tab shows your alpha as part of Return Attribution."},
     quiz:[
       {q:"A stock has beta of 1.3, the risk-free rate is 4%, and the market risk premium is 8%. What is the expected return per CAPM?",opts:["14.4%","12.0%","16.4%","10.8%"],correct:0,explain:"E(R) = 4% + 1.3 × 8% = 4% + 10.4% = 14.4%"},
       {q:"If a portfolio returns 18% with beta 1.2, risk-free rate 4%, and market return 12%, what is the alpha?",opts:["4.4%","6.0%","2.4%","8.0%"],correct:0,explain:"CAPM expected = 4% + 1.2 × (12% − 4%) = 4% + 9.6% = 13.6%. Alpha = 18% − 13.6% = 4.4%."},
       {q:"Which type of risk does beta measure?",opts:["Systematic risk","Unsystematic risk","Total risk","Credit risk"],correct:0,explain:"Beta measures systematic (market) risk only. It tells you how sensitive the asset is to broad market movements."},
       {q:"Adding more stocks to a portfolio primarily reduces:",opts:["Unsystematic risk","Systematic risk","Both equally","Neither"],correct:0,explain:"Diversification eliminates unsystematic (company-specific) risk. Systematic risk remains regardless of how many stocks you hold."},
     ]},
    {id:"var_risk",level:"L2",title:"VaR and Risk Management",topic:"Risk Management",
     reading:{title:"Value at Risk and Beyond",content:"<h3>Value at Risk (VaR)</h3>\n\nVaR answers one question: 'What is the maximum expected loss over a given period at a given confidence level?'\n\n<h4>Parametric VaR₉₅ = −(μ − 1.645σ)</h4>\n\nA daily VaR₉₅ of 2.1% means: 'On 95% of days, the portfolio won't lose more than 2.1% of its value.' Equivalently: 'On about 1 out of 20 trading days, losses could exceed 2.1%.'\n\n<h3>Limitations of VaR</h3>\n\nVaR doesn't tell you HOW BAD things get in the worst cases. A VaR of 2.1% could mean the worst-case loss is 2.5% or 25% — VaR doesn't distinguish.\n\n<h3>Conditional VaR (CVaR / Expected Shortfall)</h3>\n\n<h4>CVaR₉₅ = E[Loss | Loss > VaR₉₅]</h4>\n\nCVaR answers: 'When we DO exceed VaR, what's the average loss?' This captures tail risk that VaR misses. Regulators increasingly prefer CVaR over VaR for this reason.\n\nIn Quantex, both VaR₉₅ and CVaR₉₅ are computed from your portfolio's volatility and displayed in the Metrics dashboard. The (?) icon next to each shows the formula with your actual numbers."},
     quiz:[
       {q:"A portfolio has daily VaR₉₅ of $15,000 on a $1M portfolio. What does this mean?",opts:["95% of days, loss won't exceed $15K","The portfolio will lose exactly $15K","Maximum possible loss is $15K","The portfolio always loses $15K"],correct:0,explain:"VaR₉₅ = $15,000 means on 95% of trading days, the loss will be $15,000 or less. On 5% of days (about 1 per month), it could be worse."},
       {q:"Why is CVaR considered superior to VaR?",opts:["It measures the average loss in the tail","It's easier to compute","It's always smaller than VaR","It ignores extreme events"],correct:0,explain:"CVaR (Expected Shortfall) tells you the average loss when VaR is exceeded. It captures tail risk severity, not just the threshold."},
       {q:"For a normal distribution, VaR₉₉ uses a z-score of approximately:",opts:["2.326","1.645","1.960","2.576"],correct:0,explain:"VaR₉₉ uses z = 2.326 (99th percentile one-tailed). VaR₉₅ uses z = 1.645."},
     ]},
    {id:"derivatives",level:"L2",title:"Options Pricing",topic:"Derivatives",
     reading:{title:"Black-Scholes and the Greeks",content:"<h3>Black-Scholes-Merton Model</h3>\n\n<h4>C = S₀N(d₁) − Ke^(−rT)N(d₂)</h4>\n\nFive inputs determine an option's price: spot price (S), strike price (K), time to expiration (T), risk-free rate (r), and volatility (σ). Of these, volatility is the only one not directly observable — it must be estimated or implied from market prices.\n\n<h3>The Greeks</h3>\n\nDelta (Δ): How much the option price changes per $1 move in the stock. A call with Δ = 0.60 gains $0.60 when the stock rises $1.\n\nGamma (Γ): How fast delta changes. High gamma means delta is unstable — the option's behavior changes rapidly near the strike.\n\nTheta (Θ): Daily time decay. All else equal, options lose value every day. Theta accelerates as expiration approaches.\n\nVega (V): Sensitivity to implied volatility. A vega of $0.15 means the option gains $0.15 for each 1% increase in IV.\n\nRho (ρ): Sensitivity to interest rates. Usually small, but matters for LEAPS.\n\n<h3>Try It in Quantex</h3>\n\nThe Derivatives tab has a live Black-Scholes calculator. Adjust the inputs and watch how each Greek responds. The Strategy Sandbox lets you build covered calls, protective puts, straddles, and more with real-time payoff diagrams."},
     quiz:[
       {q:"Which Greek measures the rate of change of delta?",opts:["Gamma","Vega","Theta","Rho"],correct:0,explain:"Gamma = ∂Δ/∂S = ∂²C/∂S². It measures how quickly delta changes as the stock moves. High gamma near the strike means the option's behavior is most sensitive there."},
       {q:"A call option has theta of -$0.05. What happens overnight (all else equal)?",opts:["The option loses $0.05","The option gains $0.05","Nothing changes","Delta increases"],correct:0,explain:"Theta represents daily time decay. A theta of -$0.05 means the option loses $0.05 per day from the passage of time alone."},
       {q:"Which input to Black-Scholes is NOT directly observable?",opts:["Volatility","Stock price","Strike price","Risk-free rate"],correct:0,explain:"Volatility must be estimated or implied from market prices. All other inputs (S, K, T, r) are known quantities."},
       {q:"In a covered call, what is your maximum profit?",opts:["(Strike − Stock Price) + Premium","Unlimited","Premium collected only","Strike price"],correct:0,explain:"Max profit = (K − S) + premium. You own the stock (gains up to strike) plus the premium collected. Upside is capped at the strike."},
     ]},
    {id:"portfolio_opt",level:"L2",title:"Portfolio Optimization",topic:"Portfolio Management",
     reading:{title:"Mean-Variance Optimization and Beyond",content:"<h3>Markowitz Mean-Variance Optimization</h3>\n\nThe goal: find the portfolio weights that maximize return for a given level of risk (or minimize risk for a given return).\n\n<h4>Minimize: σp² = wᵀΣw</h4>\n<h4>Subject to: wᵀμ = target return, wᵀ1 = 1</h4>\n\nThis is a quadratic programming problem solved by algorithms like SLSQP. The Quantex optimizer runs this with your actual portfolio tickers and the regime-aware covariance matrix.\n\n<h3>Constraints Matter</h3>\n\nUnconstrained optimization often produces extreme portfolios (200% in one stock, -100% in another). Real portfolios need constraints: maximum position size, no short selling, sector limits, beta caps. These come from your investor profile in Quantex.\n\n<h3>Risk Parity</h3>\n\nInstead of equal-weighting by capital, risk parity equal-weights by risk contribution. Each position contributes the same amount of risk to the portfolio. This means volatile assets get smaller weights and stable assets get larger weights.\n\n<h4>Target: RC₁ = RC₂ = ... = RCn = 1/n</h4>\n\nThe Risk Parity challenge in the Challenges tab asks you to build this yourself."},
     quiz:[
       {q:"What does the efficient frontier represent?",opts:["Maximum return portfolios for each risk level","All possible portfolios","Only stock portfolios","Minimum return portfolios"],correct:0,explain:"The efficient frontier is the set of portfolios offering the highest expected return for each level of risk. Portfolios below it are suboptimal."},
       {q:"In risk parity, a high-volatility stock should receive:",opts:["A smaller weight than a low-volatility stock","An equal weight","A larger weight","No allocation"],correct:0,explain:"Risk parity allocates inversely to volatility so each position contributes equal risk. High-vol assets get smaller capital weights."},
       {q:"Why is the covariance matrix crucial for optimization?",opts:["It captures how assets move together","It measures individual returns","It predicts future prices","It calculates dividends"],correct:0,explain:"The covariance matrix Σ captures pairwise relationships between all assets. Without it, you can't compute true portfolio variance — you'd overestimate risk by ignoring diversification."},
     ]},
  ];

  const mod=MODULES[activeMod];
  const modProgress=(modId)=>{const p=progress[modId]||{};const total=3;let done=0;if(p.reading)done++;if(p.quiz)done++;if(p.interactive)done++;return done/total*100;};
  const overallProgress=MODULES.reduce((a,m)=>a+modProgress(m.id),0)/MODULES.length;

  // Quiz logic
  const[qIdx,setQIdx]=useState(0);
  const[selected,setSelected]=useState(null);
  const[showResult,setShowResult]=useState(false);
  const[score,setScore]=useState(0);
  const[qDone,setQDone]=useState(false);

  const resetQuiz=()=>{setQIdx(0);setSelected(null);setShowResult(false);setScore(0);setQDone(false);};
  useEffect(()=>{resetQuiz();},[activeMod]);

  const submitAnswer=()=>{
    if(selected===null)return;
    setShowResult(true);
    if(selected===mod.quiz[qIdx].correct)setScore(s=>s+1);
  };
  const nextQ=()=>{
    if(qIdx+1>=mod.quiz.length){
      setQDone(true);
      markRead(mod.id,"quiz");
    }else{
      setQIdx(i=>i+1);setSelected(null);setShowResult(false);
    }
  };

  return e("div",null,
    // Progress overview
    e("div",{className:"card"},
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
        e("div",null,
          e("div",{className:"card-title",style:{marginBottom:2}},"CFA STUDY PROGRAM"),
          e("div",{style:{fontSize:11,color:"#64748b"}},MODULES.length+" modules · "+MODULES.reduce((a,m)=>a+m.quiz.length,0)+" quiz questions")
        ),
        e("div",{style:{textAlign:"right"}},
          e("div",{style:{fontSize:22,fontWeight:800,fontFamily:"'Outfit',sans-serif",color:"#a5b4fc"}},Math.round(overallProgress)+"%"),
          e("div",{style:{fontSize:9,color:"#4a5568"}},"overall progress")
        )
      ),
      e("div",{className:"ch-prog",style:{marginTop:8}},e("div",{className:"ch-prog-fill",style:{width:overallProgress+"%"}}))
    ),

    e("div",{className:"course-grid"},
      // Module list
      e("div",null,
        MODULES.map((m,i)=>{
          const prog=modProgress(m.id);
          return e("div",{key:m.id,className:"mod-card"+(activeMod===i?" active":""),onClick:()=>setActiveMod(i)},
            e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
              e("div",null,
                e("div",{style:{fontSize:12,fontWeight:700,color:activeMod===i?"#a5b4fc":"#e2e8f0"}},m.title),
                e("div",{style:{display:"flex",gap:4,marginTop:3}},e("span",{className:"cfa-tag"},m.level),e("span",{style:{fontSize:9,color:"#4a5568"}},m.topic))
              ),
              e("div",{style:{fontSize:11,fontWeight:700,color:prog>=100?"#34d399":"#64748b"}},Math.round(prog)+"%")
            ),
            e("div",{className:"mod-prog-bar"},e("div",{className:"mod-prog-fill",style:{width:prog+"%"}}))
          );
        })
      ),

      // Active module content
      e("div",null,
        e("div",{style:{display:"flex",gap:4,marginBottom:10}},
          ["reading","quiz","video"].map(s=>e("button",{key:s,className:"btn btn-xs"+(activeSection===s?" btn-p":""),onClick:()=>setActiveSection(s),style:{textTransform:"capitalize"}},
            s==="reading"?"📖 Reading":s==="quiz"?"✏️ Quiz ("+mod.quiz.length+")":"🎬 Video"
          ))
        ),

        // Reading
        activeSection==="reading"&&e("div",{className:"card"},
          e("div",{className:"card-title"},mod.reading.title),
          e("div",{className:"reading-content",dangerouslySetInnerHTML:{__html:mod.reading.content}}),
          !progress[mod.id]?.reading&&e("button",{className:"btn btn-p",style:{marginTop:12},onClick:()=>markRead(mod.id,"reading")},"✓ Mark as Read")
        ),

        // Quiz
        activeSection==="quiz"&&e("div",{className:"card"},
          e("div",{className:"card-title"},"QUIZ — "+mod.title),
          qDone?e("div",null,
            e("div",{style:{textAlign:"center",padding:20}},
              e("div",{style:{fontSize:40,fontWeight:800,fontFamily:"'Outfit',sans-serif",color:score>=mod.quiz.length*.7?"#34d399":"#fbbf24"}},score+"/"+mod.quiz.length),
              e("div",{style:{fontSize:13,color:"#64748b",marginTop:4}},score>=mod.quiz.length*.7?"Great job! You passed.":"Review the material and try again."),
              e("button",{className:"btn btn-p",style:{marginTop:12},onClick:resetQuiz},"Retake Quiz")
            )
          ):e("div",null,
            e("div",{style:{fontSize:10,color:"#4a5568",marginBottom:8}},"Question "+(qIdx+1)+" of "+mod.quiz.length),
            e("div",{style:{fontSize:13,fontWeight:600,color:"#e2e8f0",marginBottom:12,lineHeight:1.6}},mod.quiz[qIdx].q),
            mod.quiz[qIdx].opts.map((opt,i)=>e("button",{key:i,className:"quiz-option"+(selected===i?" selected":"")+(showResult&&i===mod.quiz[qIdx].correct?" correct":"")+(showResult&&selected===i&&i!==mod.quiz[qIdx].correct?" wrong":""),onClick:()=>{if(!showResult)setSelected(i);},disabled:showResult},String.fromCharCode(65+i)+". "+opt)),
            showResult&&e("div",{className:"info-box",style:{marginTop:8}},mod.quiz[qIdx].explain),
            e("div",{style:{display:"flex",justifyContent:"flex-end",gap:6,marginTop:12}},
              !showResult&&e("button",{className:"btn btn-p",onClick:submitAnswer,disabled:selected===null},"Check Answer"),
              showResult&&e("button",{className:"btn btn-p",onClick:nextQ},qIdx+1>=mod.quiz.length?"See Results":"Next →")
            )
          )
        ),

        // Video
        activeSection==="video"&&e("div",{className:"card"},
          e("div",{className:"card-title"},"VIDEO — "+mod.title),
          e("div",{className:"vid-placeholder"},
            e("div",{style:{fontSize:24,marginBottom:8}},"🎬"),
            e("div",null,"Video content coming soon"),
            e("div",{style:{marginTop:8,fontSize:10}},"In the full version, each module will include"),
            e("div",{style:{fontSize:10}},"curated video lessons from financial education creators")
          )
        )
      )
    )
  );
}

// ── Root App ──────────────────────────────────────────────────────────────────
function App({user,logout}){
  const[profile,setProfile]=useState(()=>{try{const s=localStorage.getItem("qx_profile");return s?JSON.parse(s):null;}catch(e){return null;}});
  const[tab,setTab]=useState(()=>{try{return localStorage.getItem("qx_profile")?"disco":"onboard";}catch(e){return "onboard";}});
  const[ports,setPorts]=useState(()=>{try{const s=localStorage.getItem("qx_ports");return s?JSON.parse(s):{A:{},B:{},C:{}};}catch(e){return{A:{},B:{},C:{}};}});
  const[ap,setAp]=useState("A");
  const[screening,setScreening]=useState(false);
  const[backendOk,setBackendOk]=useState(null); // null=unknown, true/false
  const[optLoading,setOptLoading]=useState(false);
  const[screenError,setScreenError]=useState(null);

  useEffect(()=>{try{if(profile)localStorage.setItem("qx_profile",JSON.stringify(profile));else localStorage.removeItem("qx_profile");}catch(e){}},[profile]);
  useEffect(()=>{try{localStorage.setItem("qx_ports",JSON.stringify(ports));}catch(e){}},[ports]);

  // Check backend health on mount
  useEffect(()=>{
    fetch(BACKEND_URL+"/health",{signal:AbortSignal.timeout(5000)})
      .then(r=>r.json()).then(()=>setBackendOk(true))
      .catch(()=>setBackendOk(false));
  },[]);

  // Screen assets after profile is set (or on mount if profile exists)
  const screenAssets=useCallback(async(p)=>{
    if(!p)return;
    setScreening(true);setScreenError(null);
    const horMap={"<1 year":.75,"1-3 years":2,"3-7 years":5,"7-15 years":10,"15+ years":20};
    try{
      const data=await apiFetch("/api/screen",{
        goal:p.goal,risk_score:p.score,
        time_horizon_years:horMap[p.hor]||7,max_results:40,
      });
      if(data.shortlist&&data.shortlist.length>0){
        ASSETS=data.shortlist.map(mapScreened);
        setBackendOk(true);
      }
    }catch(err){
      console.warn("Screening failed, using fallback assets:",err.message);
      ASSETS=FALLBACK_ASSETS;
      setScreenError(err.message);
      setBackendOk(false);
    }finally{setScreening(false);}
  },[]);

  // Trigger screening when profile exists
  useEffect(()=>{if(profile&&backendOk!==false)screenAssets(profile);},[profile,backendOk]);

  const resetAll=()=>{if(!confirm("Reset all Quantex data? This clears your profile and all portfolios."))return;try{localStorage.removeItem("qx_profile");localStorage.removeItem("qx_ports");}catch(e){}ASSETS=FALLBACK_ASSETS;setProfile(null);setPorts({A:{},B:{},C:{}});setTab("onboard");};

  const onDone=p=>{setProfile(p);setTab("disco");};
  const addToPort=(pn,id)=>{setPorts(prev=>{const w={...prev[pn]};if(w[id]!==undefined)return prev;const n=Object.keys(w).length+1;const each=Math.floor(100/n);const nw={};Object.keys(w).forEach(k=>nw[k]=each);nw[id]=each;nw[Object.keys(nw)[0]]+=100-each*n;return{...prev,[pn]:nw};});};
  const rmFromPort=(pn,id)=>{setPorts(prev=>{const nw={...prev[pn]};delete nw[id];const ks=Object.keys(nw);if(ks.length>0){const each=Math.floor(100/ks.length);ks.forEach(k=>nw[k]=each);nw[ks[0]]+=100-each*ks.length;}return{...prev,[pn]:nw};});};
  const updateW=(pn,id,v)=>setPorts(prev=>({...prev,[pn]:{...prev[pn],[id]:v}}));

  // Optimizer: try backend (SLSQP), fall back to local Monte Carlo
  const optPort=async(pn,goal,maxPos)=>{
    const t=Object.keys(ports[pn]);
    if(!t.length)return;
    if(backendOk){
      setOptLoading(true);
      try{
        const result=await optimizeBackend(t,goal,maxPos,profile?.score,ports[pn]);
        setPorts(prev=>({...prev,[pn]:result.weights}));
        setOptLoading(false);return;
      }catch(err){console.warn("Backend optimizer failed, using local:",err.message);}
      setOptLoading(false);
    }
    // Local fallback
    setPorts(prev=>({...prev,[pn]:optimizeLocal(t,goal,maxPos)}));
  };

  const locked=!profile;
  const aw=ports[ap]||{};
  const as=Object.keys(aw).length>0?calcStats(aw):null;

  const TABS=[
    {id:"onboard",l:"① PROFILE",lk:false,done:!!profile},
    {id:"disco",l:"② DISCOVERY",lk:locked},
    {id:"metrics",l:"METRICS",lk:locked},
    {id:"corr",l:"CORRELATIONS",lk:locked},
    {id:"frontier",l:"FRONTIER",lk:locked},
    {id:"trades",l:"TRADE DESK",lk:locked},
    {id:"deriv",l:"⚡ DERIVATIVES",lk:false},
    {id:"paper",l:"📄 PAPER TRADE",lk:false},
    {id:"challenges",l:"🎯 CHALLENGES",lk:false},
    {id:"course",l:"📚 COURSE",lk:false},
    {id:"compare",l:"⇄ COMPARE",lk:locked},
    {id:"pA",l:"◈ A",lk:locked,pn:"A"},{id:"pB",l:"◈ B",lk:locked,pn:"B"},{id:"pC",l:"◈ C",lk:locked,pn:"C"},
  ];

  const statusDot=backendOk===true?"🟢":backendOk===false?"🔴":"⟳";
  const statusTip=backendOk===true?"Backend connected — real data":"Backend offline — using sample data";

  return e("div",{id:"root"},
    e("div",{className:"topbar"},
      e("div",{className:"logo"},"QUANTEX",e("span",{title:statusTip,style:{fontSize:8,marginLeft:6,cursor:"help"}},statusDot)),
      e("div",{className:"mkt"},Object.entries(MKT).map(([k,v])=>e("div",{key:k,className:"mkt-item"},e("div",{className:"mkt-lbl"},k),e("div",{className:"mkt-val "+(v.ch>=0?"up":"dn")},v.p)))),
      profile?e("div",{style:{display:"flex",alignItems:"center",gap:6}},e("div",{className:"chip",onClick:()=>setTab("onboard"),title:"Update profile"},profile.score+"/100 · "+profile.cat+" · "+profile.goal+" ✎"),e("button",{className:"btn btn-xs",onClick:resetAll,title:"Reset all data",style:{color:"#475569",fontSize:9}},"↺ RESET"),user&&user.name!=="Guest"&&e("span",{style:{fontSize:10,color:"#64748b"}},user.name),logout&&e("button",{className:"btn btn-xs",onClick:logout,style:{color:"#475569",fontSize:9}},"Sign Out")):e("div",{style:{display:"flex",alignItems:"center",gap:6}},e("div",{className:"chip",style:{cursor:"default"}},"Complete ① PROFILE to unlock"),user&&user.name!=="Guest"&&e("span",{style:{fontSize:10,color:"#64748b"}},user.name),logout&&e("button",{className:"btn btn-xs",onClick:logout,style:{color:"#475569",fontSize:9}},"Sign Out"))
    ),
    screening&&e("div",{style:{padding:"8px 16px",background:"#0d1228",borderBottom:"1px solid #1a2540",fontSize:11,color:"#818cf8"}},e("span",{className:"spin"},"◌")," Screening Nasdaq universe — this may take 30-60s on first load..."),
    as&&e("div",{className:"sbar"},
      e("div",{className:"sb-item",style:{borderRight:"1px solid #1a2540"}},e("div",{className:"sb-lbl"},"PORT "+ap),e("div",{className:"sb-val",style:{color:"#818cf8",fontSize:11}},Object.keys(aw).length+" pos.")),
      [["RETURN",(as.ret>0?"+":"")+as.ret+"%",as.ret>=0?"up":"dn"],["VOL σ",as.vol+"%",""],["SHARPE",as.sh,as.sh>=1?"up":as.sh>=.5?"wa":"dn"],["BETA",as.beta,""],["SORTINO",as.so,""],["VAR 95%",as.var95+"%","dn"],["DIV YIELD",as.divY+"%",""]].map(([l,v,cls])=>e("div",{key:l,className:"sb-item"},e("div",{className:"sb-lbl"},l),e("div",{className:"sb-val "+cls},v)))
    ),
    e("div",{className:"nav"},TABS.map(t=>e("button",{key:t.id,className:"nav-tab"+(tab===t.id?" active":"")+(t.lk?" locked":"")+(t.done?" done":""),onClick:()=>{if(t.lk)return;if(t.pn)setAp(t.pn);setTab(t.id);},title:t.lk?"Complete ① PROFILE first":""},t.l))),
    e("div",{className:"body"},
      e("div",{className:"main"},
        screenError&&tab==="disco"&&e("div",{className:"warn-box",style:{margin:"0 0 10px"}},"⚠ Backend: "+screenError+" — showing sample data. Start the backend with: uvicorn app.main:app"),
        tab==="onboard"&&e(Onboard,{onDone}),
        tab==="disco"&&e(Discovery,{profile,ports,onAdd:addToPort}),
        tab==="metrics"&&e(Metrics,{weights:aw}),
        tab==="corr"&&e(Correlations,{weights:aw,profile,backendOk}),
        tab==="frontier"&&e(Frontier,{weights:aw,profile,backendOk}),
        tab==="trades"&&e(TradeDeck,{weights:aw,profile}),
        tab==="deriv"&&e(DerivativesSandbox,{backendOk}),
        tab==="paper"&&e(PaperTrading,{backendOk}),
        tab==="challenges"&&e(Challenges,{profile,ports,activePort:ap}),
        tab==="course"&&e(CourseHub,{profile,ports,activePort:ap}),
        tab==="compare"&&e(Compare,{ports}),
        tab==="pA"&&e(PortTab,{name:"Portfolio A",weights:ports.A,profile,onUpdate:(id,v)=>updateW("A",id,v),onRemove:id=>rmFromPort("A",id),onOpt:(goal,mp)=>optPort("A",goal,mp),optLoading}),
        tab==="pB"&&e(PortTab,{name:"Portfolio B",weights:ports.B,profile,onUpdate:(id,v)=>updateW("B",id,v),onRemove:id=>rmFromPort("B",id),onOpt:(goal,mp)=>optPort("B",goal,mp),optLoading}),
        tab==="pC"&&e(PortTab,{name:"Portfolio C",weights:ports.C,profile,onUpdate:(id,v)=>updateW("C",id,v),onRemove:id=>rmFromPort("C",id),onOpt:(goal,mp)=>optPort("C",goal,mp),optLoading})
      ),
      e("div",{className:"side"},e(Advisor,{profile,ports,activePort:ap}))
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(LoginGate,null,(user,logout)=>e(App,{user,logout})));
</script>
</body>
</html>
